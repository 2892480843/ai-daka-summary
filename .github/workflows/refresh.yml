name: refresh-daka

on:
  schedule:
    - cron: "*/30 * * * *"   # 每 30 分钟（UTC；GitHub 可能延迟几分钟）
  workflow_dispatch:           # 支持手动一键刷新

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: python -m pip install --quiet pillow
      - name: Rebuild from gitlink (text + screenshots)
        run: python build.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "auto refresh: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            git push
          else
            echo "no changes"
          fi
