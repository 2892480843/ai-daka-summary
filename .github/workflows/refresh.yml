name: refresh-daka

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"   # 兜底：万一自循环中断，定时(尽力)重新拉起

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-loop
  cancel-in-progress: false   # 同组至多 1 个运行 + 1 个排队，不会堆叠

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: python -m pip install --quiet pillow
      - name: Live loop — rebuild every ~60s, commit only on change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for i in $(seq 1 40); do
            python build.py || true
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit -m "auto refresh: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')" || true
              git push origin HEAD:main || { git pull --rebase --autostash -X ours origin main && git push origin HEAD:main; } || true
            fi
            sleep 60
          done
      - name: Re-dispatch next loop (keeps it continuous)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run refresh.yml -R ${{ github.repository }} || true
