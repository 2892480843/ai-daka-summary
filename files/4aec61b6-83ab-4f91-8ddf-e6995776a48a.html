{id:"f1-1-1-1",n:"函数定义",f:"$$y = f(x),\\quad x \\in D_f$$",im:2,el:"general",tg:["final"],py:"hsdy",cd:"x在定义域D_f内，f(x)有唯一确定的值",cp:"建立自变量与因变量的对应关系",ct:"函数是两个集合之间的对应关系，具有三要素：定义域、对应法则、值域。",ex:"函数的表示方法有解析法、图像法和列表法。定义域注意分母不为零、根号下非负、对数真数大于零。",eg:"f(x)=2x+1，求f(3)。解：f(3)=2×3+1=7",wr:["注意定义域的确定","注意对应关系的唯一性"],tp:["求函数值","求函数定义域","判断函数性质"],rt:[{id:"f1-1-1-2",n:"反函数"},{id:"f1-1-1-3",n:"复合函数"}],ch:1,sn:"1.1",gn:"函数定义与性质"},

{id:"f1-2-2-1",n:"常用等价无穷小",f:"$$\\begin{aligned}&\\sin x \\sim x,\\; \\tan x \\sim x,\\; \\arcsin x \\sim x\\\\ &\\arctan x \\sim x,\\; \\ln(1+x) \\sim x\\\\ &e^x-1 \\sim x,\\; 1-\\cos x \\sim \\frac{x^2}{2},\\; (1+x)^a-1 \\sim ax\\end{aligned}$$",im:5,el:"mustknow",tg:["final","pg"],py:"djwqx",cd:"x→0，只能在乘除运算中使用，不能在加减运算中直接替换",cp:"快速简化极限计算，提高解题效率",ct:"当x→0时，若lim(β/α)=1，则α~β互为等价无穷小。核心规则：乘除可替换，加减不可直接替换。",ex:"典型错误：lim(x→0)(tanx-sinx)/x³不能直接替换为0/x³！需先变形再处理。",eg:"lim(x→0)(sin2x)/(3x)=2/3",wr:["不能在加减法中直接替换","必须是x→0","替换后极限必须等价"],tp:["无穷小替换","极限化简"],rt:[{id:"f1-2-1-1",n:"重要极限I"},{id:"f1-2-3-1",n:"洛必达法则"}],ch:1,sn:"1.2",gn:"等价无穷小替换"},
{id:"f1-2-3-1",n:"洛必达法则",f:"$$\\lim_{x \\to a} \\frac{f(x)}{g(x)} = \\lim_{x \\to a} \\frac{f'(x)}{g'(x)}$$",im:5,el:"mustknow",tg:["final","pg"],py:"lbdfz",cd:"0/0型或∞/∞型未定式；f,g可导；g'(x)≠0；极限lim(f'/g')存在",cp:"求解未定式极限的最强工具",ct:"通过分别对分子分母求导来计算未定式极限。可重复使用直到得到确定结果。",ex:"适用条件严格：必须是0/0或∞/∞型；函数在去心邻域可导；分母导数不为零。",eg:"lim(x→0)(1-cosx)/x²=lim(sinx/2x)=lim(cosx/2)=1/2",wr:["只适用于0/0和∞/∞型","验证条件是否满足","可能需多次使用"],dr:"基于柯西中值定理证明",tp:["洛必达法则","0/0型","∞/∞型"],rt:[{id:"f1-2-1-1",n:"重要极限I"},{id:"f3-1-1-3",n:"柯西中值定理"}],ch:1,sn:"1.2",gn:"极限运算法则"},
{id:"f1-2-4-1",n:"夹逼定理",f:"$$g(x) \\leq f(x) \\leq h(x),\\; \\lim g = \\lim h = A \\Rightarrow \\lim f = A$$",im:4,el:"core",tg:["final","pg"],py:"jbdl",cd:"在x→a的某邻域内g(x)≤f(x)≤h(x)成立，且lim g=lim h=A",cp:"证明极限存在，处理无法直接用常规方法求解的极限",ct:"如果函数被两个有相同极限的函数夹在中间，则该函数的极限也相同。常用于证明重要极限。",ex:"常用：lim(n→∞)n/2^n=0（0<n/2^n<n/n²=1/n→0）。注意不等式方向和确保两边极限相同。",eg:"证明lim(n→∞)√[n]{n}=1。解：1≤√[n]{n}≤√[n]{n^2}→1",wr:["注意不等式方向","确保两边极限相同"],tp:["极限证明","数列极限"],rt:[{id:"f1-2-1-1",n:"重要极限I"}],ch:1,sn:"1.2",gn:"极限存在准则"},

{id:"f1-3-1-2",n:"间断点分类",f:"$$\\begin{aligned}&\\text{第一类：}f(x_0^-)\\text{和}f(x_0^+)\\text{都存在}\\\\&\\quad\\text{可去：}f(x_0^-)=f(x_0^+)\\neq f(x_0)\\\\&\\quad\\text{跳跃：}f(x_0^-)\\neq f(x_0^+)\\\\&\\text{第二类：至少一个单侧极限不存在}\\end{aligned}$$",im:3,el:"important",tg:["final","pg"],py:"jddfl",cd:"x₀是f(x)的间断点",cp:"区分间断点类型",ct:"可去间断点可通过重新定义函数值变为连续；跳跃间断点两侧极限存在但不相等；第二类间断点包含无穷间断点和振荡间断点。",ex:"sinx/x在x=0为可去间断点（极限=1≠无定义）。1/x在x=0为无穷间断点。sin(1/x)在x=0为振荡间断点。",eg:"f(x)=(x²-1)/(x-1)在x=1处，lim(x→1)f(x)=2，是可去间断点",wr:["注意分类标准","可去间断点可以补定义"],tp:["判断间断点类型"],rt:[{id:"f1-3-1-1",n:"连续定义"}],ch:1,sn:"1.3",gn:"连续性与间断点",pastExam:[{y:2022,t:"期末",f:"高频"}]},

    {id:"f1-2-4-2",n:"单调有界准则",f:"$$x_n\\text{单调递增且有上界}\\Rightarrow\\lim_{n\\to\\infty}x_n\\text{存在}$$",im:4,el:"core",tg:["final","pg"],py:"ddyjzz",cd:"数列单调（递增或递减）且有界（上界或下界）",cp:"判断数列极限存在性的基本准则",ct:"单调递增+有上界→极限存在；单调递减+有下界→极限存在。用于证明重要数列极限（如(1+1/n)^n的极限）。",ex:"典型应用：(1+1/n)^n单调递增且有上界→极限为e。不能给出极限值，只保证存在性。",eg:"证明x_n=(1+1/n)^n收敛。可证x_n单调增且有上界3→极限存在。",wr:["定理只保证存在性不给出极限值","单调性和有界性都要验证"],tp:["极限存在性证明"],rt:[{id:"f1-2-4-1",n:"夹逼定理"}],ch:1,sn:"1.2",gn:"极限存在准则"},
    {id:"f1-2-4-3",n:"柯西收敛准则",f:"$$\\lim_{n\\to\\infty}x_n\\text{存在}\\iff\\forall\\varepsilon>0,\\exists N,\\forall m,n>N:\\;|x_m-x_n|<\\varepsilon$$",im:3,el:"important",tg:["pg"],py:"kxslzz",cd:"数列的项在N之后任意两项之差任意小",cp:"从数列自身性质判断收敛性（无需知道极限值）",ct:"充要条件：所有充分远的两项之差任意小。用于判断不单调数列的敛散性。是实数完备性的等价表述。",ex:"p-级数Σ1/n^p可用柯西准则判定（p≤1时发散）。定理在理论证明中更常用。",eg:"证明x_n=sin1/1+sin2/4+...+sinn/n^2收敛。由柯西准则|S_m-S_n|≤Σ1/k²→0",wr:["柯西收敛准则是充要条件","具体计算中不如其他方法直观"],tp:["收敛性判断","理论证明"],rt:[{id:"f1-2-4-2",n:"单调有界准则"}],ch:1,sn:"1.2",gn:"极限存在准则"},
    {id:"f1-2-5-1",n:"海涅定理（归结原则）",f:"$$\\lim_{x\\to a}f(x)=A\\iff\\forall x_n\\to a(x_n\\neq a),\\;\\lim_{n\\to\\infty}f(x_n)=A$$",im:3,el:"important",tg:["final","pg"],py:"hndlgj",cd:"以任意方式趋于a的数列x_n",cp:"将函数极限转化为数列极限，或证明极限不存在",ct:"函数极限存在的充要条件是沿任意数列的极限都相同。若找到两个数列使f(x_n)极限不同→函数极限不存在。",ex:"证明lim(x→0)sin(1/x)不存在：取x_n=1/(nπ)得0，取x_n=1/(2nπ+π/2)得1。",eg:"证明lim(x→0)sin(1/x)不存在。取两条路径极限不同",wr:["必须是任意数列，不能只验证有限条","用于证明极限不存在的反证法"],tp:["极限不存在证明"],rt:[{id:"f1-2-4-1",n:"夹逼定理"}],ch:1,sn:"1.2",gn:"极限运算法则"},
    {id:"f1-3-2-3",n:"闭区间连续函数性质（三定理）",f:"$$\\begin{aligned}&\\text{有界性：}f\\in C[a,b]\\Rightarrow f\\text{在}[a,b]\\text{上有界}\\\\&\\text{最值：}f\\in C[a,b]\\Rightarrow\\exists\\text{最大值和最小值}\\\\&\\text{介值：}f\\in C[a,b]\\Rightarrow\\forall\\mu\\in[m,M],\\exists\\xi\\in[a,b],f(\\xi)=\\mu\\end{aligned}$$",im:4,el:"core",tg:["final","pg"],py:"bqjlxhs",cd:"f(x)在闭区间[a,b]上连续",cp:"利用连续函数的全局性质证明存在性问题",ct:"三大定理只用连续不涉可导。有界性定理保证了最大最小值存在。介值定理的推论是零点定理。",ex:"三大定理条件都是闭区间连续。有界性定理是闭区间上特有（开区间反例：f(x)=1/x在(0,1]无界）。",eg:"证明方程cosx=x在(0,π/2)内有解。令F(x)=cosx-x，F(0)=1>0,F(π/2)=-π/2<0",wr:["必须是闭区间","必须连续，缺一不可"],tp:["存在性证明","根的判定"],rt:[{id:"f1-3-2-1",n:"介值定理"}],ch:1,sn:"1.3",gn:"闭区间连续函数性质"},
    {id:"f1-1-1-4",n:"函数的几种基本特性",f:"$$\\begin{aligned}&\\text{有界性：}|f(x)|\\leq M\\;(\\forall x\\in D)\\\\&\\text{奇偶性：}f(-x)=-f(x)(\\text{奇}),\\;f(-x)=f(x)(\\text{偶})\\\\&\\text{单调性：}x_1<x_2\\Rightarrow f(x_1)\\leq f(x_2)\\text{或相反}\\\\&\\text{周期性：}f(x+T)=f(x)\\end{aligned}$$",im:2,el:"general",tg:["final"],py:"hsjt",cd:"定义域需关于原点对称（奇偶性）",cp:"识别函数的全局性质以简化分析",ct:"有界性：值域有上限和下限。奇函数图像关于原点对称（过原点时），偶函数关于y轴对称。周期函数在每周期内重复。",ex:"奇函数+奇函数=奇函数；偶函数+偶函数=偶函数；奇×偶=奇；奇×奇=偶。判断周期常通过最小正周期。",eg:"f(x)=sinx是奇函数、周期2π、有界；f(x)=x²是偶函数、无界",wr:["奇偶性需定义域对称","单调性要注意区间"],tp:["函数性质分析"],rt:[{id:"f1-1-1-1",n:"函数定义"}],ch:1,sn:"1.1",gn:"函数定义与性质"},
    {id:"f2-1-1-2",n:"左右导数与可导性",f:"$$f'_-(x_0)=\\lim_{h\\to 0^-}\\frac{f(x_0+h)-f(x_0)}{h},\\;f'_+(x_0)=\\lim_{h\\to 0^+}\\frac{f(x_0+h)-f(x_0)}{h}$$",im:3,el:"important",tg:["final","pg"],py:"zyds",cd:"左右导数存在且相等⇔f在x₀处可导",cp:"判断分段函数在分段点是否可导",ct:"可导⇔左右导数存在且相等。分段函数在分段点必须用定义检查。函数可导必连续，连续不一定可导。",ex:"典型不可导点：|x|在x=0处（左导数=-1，右导数=1）。拐折点也不可导。",eg:"f(x)=|x|在x=0：f'_-(0)=-1,f'_+(0)=1，不可导",wr:["可导必连续，连续未必可导","分段点必须用定义"],tp:["可导性判断"],rt:[{id:"f2-1-1-1",n:"导数定义"}],ch:2,sn:"2.1",gn:"导数定义与意义"},
{id:"f2-2-1-3",n:"和差积商的求导法则",f:"$$(u\\pm v)'=u'\\pm v',\\;(uv)'=u'v+uv',\\;(\\frac{u}{v})'=\\frac{u'v-uv'}{v^2}（v\\neq 0）$$",im:5,el:"mustknow",tg:["final","pg"],py:"qdfz",cd:"u,v可导",cp:"对函数进行加减乘除运算后求导",ct:"和差导数与导数加减一致。积的导数=前导后乘+前乘后导。商的导数分子减号顺序易错，注意是u'v-uv'。",ex:"乘法法则可推广到多个函数之积。除法律则注意分母v²且v≠0。",eg:"f(x)=x²sinx，f'(x)=2xsinx+x²cosx",wr:["商的导数分子是u'v-uv'不是uv'-u'v","分母v≠0","分母要平方"],tp:["四则运算求导"],rt:[{id:"f2-2-1-1",n:"基本导数公式"}],ch:2,sn:"2.2",gn:"求导法则"},
{id:"f2-2-2-2",n:"常见函数高阶导数公式",f:"$$\\begin{aligned}&(e^{ax})^{(n)}=a^n e^{ax},\\;(\\sin ax)^{(n)}=a^n\\sin(ax+\\frac{n\\pi}{2})\\\\&(\\cos ax)^{(n)}=a^n\\cos(ax+\\frac{n\\pi}{2}),\\;(\\ln x)^{(n)}=\\frac{(-1)^{n-1}(n-1)!}{x^n}\\end{aligned}$$",im:3,el:"important",tg:["final","pg"],py:"gjdsgs",cd:"各函数有n阶导数",cp:"快速记忆常见函数的高阶导数模式",ct:"eᵃˣ求n阶导数乘以aⁿ；sin和cos导数4次一循环（每求一次导相位增加π/2）；对数函数导数分母为xⁿ。",ex:"(x^m)^{(n)}=m(m-1)...(m-n+1)x^{m-n}（n≤m时）。注意阶乘和符号规律。",eg:"f(x)=sin2x，f^{(5)}(x)=2^5 sin(2x+5π/2)=32cos2x",wr:["注意指数和系数的规律","三角函数周期性"],tp:["高阶导数","递推"],rt:[{id:"f2-2-2-1",n:"莱布尼茨公式"}],ch:2,sn:"2.2",gn:"高阶导数"},
{id:"f2-2-4-1",n:"对数求导法",f:"$$y=f(x)^{g(x)} \\Rightarrow \\ln y = g(x)\\ln f(x) \\Rightarrow \\frac{y'}{y}=g'\\ln f+g\\cdot\\frac{f'}{f}$$",im:3,el:"important",tg:["final","pg"],py:"dsqdf",cd:"f(x)>0",cp:"处理幂指函数和复杂乘除表达式求导",ct:"两边取对数→求导→化简。特别适合y=u(x)^{v(x)}形式的幂指函数和多个因子乘除的表达式。",ex:"步骤：取对数→两边求导（注意用链式法则）→解出y'→代入y的表达式。",eg:"y=x^x，lny=xlnx，y'/y=lnx+1，y'=x^x(1+lnx)",wr:["取对数时注意定义域","最后一步代入y表达式"],tp:["对数求导","幂指函数"],rt:[{id:"f2-2-1-1",n:"基本导数公式"}],ch:2,sn:"2.2",gn:"求导法则",pastExam:[{y:2023,t:"考研数学一",f:"中频"},{y:2022,t:"期末",f:"中频"}]},

{id:"f2-1-1-1",n:"导数定义",f:"$$f'(x_0) = \\lim_{\\Delta x \\to 0} \\frac{f(x_0 + \\Delta x) - f(x_0)}{\\Delta x}$$",im:4,el:"core",tg:["final","pg"],py:"dsdy",cd:"函数在x₀处极限存在且有限，左右导数相等",cp:"描述函数在某点的瞬时变化率",ct:"导数是函数变化率的精确度量，几何意义是曲线切线斜率。可导必连续，连续不一定可导。",ex:"导数存在的充要条件是左右导数存在且相等。常见不可导点：|x|在x=0处。",eg:"用定义求f(x)=x²在x=1的导数。lim(h→0)[(1+h)²-1]/h=lim(2h+h²)/h=2",wr:["可导必连续但连续未必可导","注意左右导数"],tp:["定义法求导","判断可导性"],rt:[{id:"f2-2-1-2",n:"链式法则"}],ch:2,sn:"2.1",gn:"导数定义与意义"},
{id:"f2-2-1-1",n:"基本导数公式全集",f:"$$\\begin{aligned}&(C)'=0,\\;(x^n)'=nx^{n-1},\\;(e^x)'=e^x\\\\&(a^x)'=a^x\\ln a,\\;(\\ln x)'=\\frac{1}{x},\\;(\\log_a x)'=\\frac{1}{x\\ln a}\\\\&(\\sin x)'=\\cos x,\\;(\\cos x)'=-\\sin x,\\;(\\tan x)'=\\sec^2 x\\\\&(\\arcsin x)'=\\frac{1}{\\sqrt{1-x^2}},\\;(\\arctan x)'=\\frac{1}{1+x^2}\\end{aligned}$$",im:5,el:"mustknow",tg:["final","pg"],py:"jbdsgs",cd:"各公式有其定义域限制",cp:"所有求导运算的基础，必须熟练掌握",ct:"基本初等函数的导数公式是求导运算的基石。eˣ求导不变；三角函数导数循环(sin→cos→-sin→-cos→sin)。",ex:"对数函数导数与x成反比。反三角函数注意定义域：arcsin x定义域[-1,1]但导数定义域为(-1,1)。",eg:"f(x)=x³+eˣ-sinx，f'(x)=3x²+eˣ-cosx",wr:["注意反三角函数定义域","对数函数自变量必须为正"],tp:["基本求导"],rt:[{id:"f2-2-1-2",n:"链式法则"}],ch:2,sn:"2.2",gn:"基本初等函数导数公式"},
{id:"f2-2-1-2",n:"链式法则",f:"$$\\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{du}{dx}$$",im:5,el:"mustknow",tg:["final","pg"],py:"lsfz",cd:"y=f(u)在u处可导，u=g(x)在x处可导",cp:"求复合函数导数的核心方法",ct:"将复合函数层层求导再相乘。步骤：识别内外函数→分别求导→相乘。可推广到多层复合。",ex:"典型应用：y=sin(2x+1)，y'=cos(2x+1)·2=2cos(2x+1)。注意不要遗漏链式环节。",eg:"y=e^{sinx}，y'=e^{sinx}·cosx",wr:["不要遗漏链式环节","正确识别复合层次","注意求导顺序"],tp:["复合函数求导","隐函数求导"],rt:[{id:"f2-2-1-1",n:"基本导数公式"}],ch:2,sn:"2.2",gn:"基本初等函数导数公式"},
{id:"f2-2-2-1",n:"莱布尼茨公式（高阶导数）",f:"$$(uv)^{(n)} = \\sum_{k=0}^{n} C_n^k u^{(n-k)} v^{(k)}$$",im:3,el:"important",tg:["final","pg"],py:"gjds",cd:"u,v都有n阶导数",cp:"计算两个函数乘积的高阶导数",ct:"类似于二项式定理的结构。常用：(e^{ax})^{(n)}=a^n e^{ax}；(sin ax)^{(n)}=a^n sin(ax+nπ/2)。",ex:"二阶导数f''(x)描述凹凸性。注意组合数C_n^k的计算。",eg:"f(x)=x²eˣ，求f^{(n)}(x)",wr:["注意组合数C_n^k","u,v都要n阶可导"],tp:["高阶导数计算"],rt:[{id:"f2-2-1-1",n:"基本导数公式"}],ch:2,sn:"2.2",gn:"高阶导数"},
{id:"f2-2-3-1",n:"隐函数求导",f:"$$F(x,y)=0 \\Rightarrow \\frac{dy}{dx} = -\\frac{F_x}{F_y}$$",im:3,el:"important",tg:["final","pg"],py:"yhsqd",cd:"F_y≠0，F具有连续偏导数",cp:"对无法显式解出y的方程求导",ct:"对等式两边同时对x求导，将y视为x的函数，对y求导时乘以dy/dx。也可用公式dy/dx=-F_x/F_y。",ex:"步骤：等式两边对x求导→整理出dy/dx。记住y是x的函数，对y求导要乘dy/dx。",eg:"x²+y²=1，两边对x求导：2x+2y·dy/dx=0，dy/dx=-x/y",wr:["记住y是x的函数","对y求导要乘dy/dx"],tp:["隐函数求导"],rt:[{id:"f2-2-1-2",n:"链式法则"}],ch:2,sn:"2.2",gn:"隐函数与参数方程求导"},
{id:"f2-2-3-2",n:"参数方程求导",f:"$$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt},\\; \\frac{d^2y}{dx^2} = \\frac{d(y'_x)/dt}{dx/dt}$$",im:3,el:"important",tg:["final","pg"],py:"csfcqd",cd:"x=x(t),y=y(t)可导，dx/dt≠0",cp:"对参数方程表示的曲线求导",ct:"二阶导数特别要注意：d²y/dx²≠d²y/dt²/d²x/dt²。正确做法是先求dy/dx对t的导数再除以dx/dt。",ex:"一阶导数=dy/dt÷dx/dt。二阶导数需要先求一阶导数对t的导数，再除以dx/dt。",eg:"x=t²,y=t³，dy/dx=(3t²)/(2t)=3t/2",wr:["二阶导数不能简单相除","分母dx/dt≠0"],tp:["参数方程求导"],rt:[{id:"f2-2-1-2",n:"链式法则"}],ch:2,sn:"2.2",gn:"隐函数与参数方程求导"},
{id:"f2-3-1-1",n:"微分定义",f:"$$dy = f'(x)dx$$",im:3,el:"important",tg:["final","pg"],py:"wfdy",cd:"f(x)在x处可导",cp:"函数增量的线性近似，用于近似计算",ct:"微分是函数增量的线性主部。当dx很小时，Δy≈dy=f'(x)dx。可微⇔可导。",ex:"微分形式不变性：无论u是自变量还是中间变量，dy=f'(u)du恒成立。",eg:"y=x³的微分：dy=3x²dx",wr:["dy≠Δy，dy是线性近似","微分形式不变性"],tp:["求微分","近似计算"],rt:[{id:"f2-1-1-1",n:"导数定义"}],ch:2,sn:"2.3",gn:"微分的概念与应用"},

{id:"f3-1-1-1",n:"罗尔定理",f:"$$f(a)=f(b) \\Rightarrow \\exists \\xi \\in (a,b),\\; f'(\\xi)=0$$",im:4,el:"core",tg:["final","pg"],py:"ledl",cd:"f在[a,b]连续，(a,b)可导，f(a)=f(b)",cp:"证明导函数零点的存在性",ct:"在端点值相等的条件下，区间内必有导数为零的点。三个条件缺一不可。",ex:"常用罗尔定理证明方程f'(x)=0有根，或构造辅助函数后用罗尔定理。ξ的位置是不确定的。",eg:"f(x)=x²-4x+3在[1,3]上，f(1)=f(3)=0，f'(2)=0",wr:["三个条件缺一不可","ξ的位置不确定","不能用于直接计算"],tp:["证明导函数零点"],rt:[{id:"f3-1-1-2",n:"拉格朗日中值定理"}],ch:3,sn:"3.1",gn:"三大中值定理"},
{id:"f3-1-1-2",n:"拉格朗日中值定理",f:"$$f(b)-f(a)=f'(\\xi)(b-a),\\; \\xi \\in (a,b)$$",im:5,el:"mustknow",tg:["final","pg"],py:"lglrzzdl",cd:"f在[a,b]连续，(a,b)可导",cp:"建立函数增量与导数的关系，微分学核心定理",ct:"曲线上至少有一点处的切线平行于弦。推论：f'(x)≡0⇒f(x)≡常数。常用于证明恒等式和不等式。",ex:"|sinx-siny|=|cosξ||x-y|≤|x-y|，这就是利用拉格朗日定理的经典不等式证明。",eg:"证明|sinx-siny|≤|x-y|。由定理|sinx-siny|=|cosξ||x-y|≤|x-y|",wr:["条件比罗尔定理弱","不能用于求导计算"],dr:"构造辅助函数φ(x)=f(x)-f(a)-[(f(b)-f(a))/(b-a)](x-a)，应用罗尔定理",tp:["证明不等式","证明恒等式","估值"],rt:[{id:"f3-1-1-1",n:"罗尔定理"},{id:"f3-1-1-3",n:"柯西中值定理"}],ch:3,sn:"3.1",gn:"三大中值定理"},
{id:"f3-1-1-3",n:"柯西中值定理",f:"$$\\frac{f(b)-f(a)}{g(b)-g(a)} = \\frac{f'(\\xi)}{g'(\\xi)},\\; \\xi \\in (a,b)$$",im:4,el:"core",tg:["pg"],py:"kxzzdl",cd:"f,g在[a,b]连续，(a,b)可导，g'(x)≠0",cp:"拉格朗日中值定理的推广，洛必达法则的理论基础",ct:"两个函数增量之比等于它们导数在某点处之比。拉格朗日中值定理是g(x)=x的特殊情况。",ex:"柯西定理将拉格朗日定理推广到参数方程形式。是证明洛必达法则的关键。",eg:"验证f(x)=x²,g(x)=x³在[1,2]上满足柯西定理",wr:["g(b)≠g(a)","g'(x)在区间内不为零"],dr:"构造辅助函数后用罗尔定理",tp:["证明题","理论推导"],rt:[{id:"f3-1-1-2",n:"拉格朗日中值定理"},{id:"f1-2-3-1",n:"洛必达法则"}],ch:3,sn:"3.1",gn:"三大中值定理"},
{id:"f3-1-2-1",n:"泰勒中值定理",f:"$$f(x)=f(x_0)+f'(x_0)(x-x_0)+\\cdots+\\frac{f^{(n)}(x_0)}{n!}(x-x_0)^n+R_n(x)$$",im:5,el:"mustknow",tg:["final","pg"],py:"tlgs",cd:"f在含x₀的区间内有n+1阶导数",cp:"用多项式逼近函数，微分学的顶峰",ct:"将函数展开为多项式+余项。拉格朗日余项：R_n=f^{(n+1)}(ξ)/(n+1)!·(x-x₀)^{n+1}。x₀=0为麦克劳林公式。",ex:"常用展开：eˣ=1+x+x²/2!+x³/3!+...；sinx=x-x³/3!+x⁵/5!-...；cosx=1-x²/2!+x⁴/4!-...",eg:"eˣ在x=0三阶泰勒展开：eˣ≈1+x+x²/2+x³/6",wr:["注意余项形式","不同函数收敛区间不同","展开到足够项数"],tp:["泰勒展开","函数近似","极限计算"],rt:[{id:"f3-1-1-2",n:"拉格朗日中值定理"}],ch:3,sn:"3.1",gn:"泰勒公式"},
{id:"f3-2-1-1",n:"单调性判定",f:"$$f'(x)>0 \\Rightarrow \\text{严格递增};\\; f'(x)<0 \\Rightarrow \\text{严格递减}$$",im:4,el:"core",tg:["final","pg"],py:"ddxpd",cd:"f在区间内可导",cp:"判断函数单调性、求单调区间",ct:"一阶导数符号决定单调方向。步骤：求f'(x)→解f'(x)=0找驻点→用驻点分割定义域→判断各区间f'(x)符号。",ex:"f'(x)恒为零的点不改变单调性。注意定义域内不可导点也可能影响单调性。",eg:"f(x)=x³-3x，f'(x)=3(x²-1)，x<-1递增，-1<x<1递减，x>1递增",wr:["导数恒为零的点不改变单调性","注意定义域"],tp:["单调性分析","函数作图"],rt:[{id:"f3-2-1-2",n:"极值判定"}],ch:3,sn:"3.2",gn:"函数单调性与极值"},
{id:"f3-2-1-2",n:"极值判定",f:"$$f'(x_0)=0,\\; f'\\text{在}x_0\\text{左右变号} \\Rightarrow x_0\\text{为极值点}$$",im:4,el:"core",tg:["final","pg"],py:"jzpd",cd:"f在x₀处连续，在去心邻域可导",cp:"求函数极值点与极值",ct:"驻点处导数变号为极值点：左正右负→极大值；左负右正→极小值。第二充分条件：f''(x₀)>0极小，f''(x₀)<0极大。",ex:"注意f'(x₀)=0不是充分条件（如f(x)=x³在x=0）。不可导点也可能是极值点。",eg:"f(x)=x³-3x，f'(±1)=0，f''(-1)=-6<0极大；f''(1)=6>0极小",wr:["f'(x₀)=0不是充分条件","不可导点也可能是极值点"],tp:["求极值","最值问题"],rt:[{id:"f3-2-1-1",n:"单调性判定"},{id:"f3-2-2-1",n:"凹凸性"}],ch:3,sn:"3.2",gn:"函数单调性与极值"},
{id:"f3-2-2-1",n:"凹凸性判定",f:"$$f''(x)>0 \\Rightarrow \\text{凹};\\; f''(x)<0 \\Rightarrow \\text{凸}$$",im:3,el:"important",tg:["final","pg"],py:"atxpd",cd:"f二阶可导",cp:"判断函数图像的弯曲方向",ct:"二阶导数描述曲线的弯曲方向。拐点：凹凸性改变的点，f''(x)=0或不存在且两侧符号改变。",ex:"不同教材凹凸定义可能相反（下凸vs上凸）。拐点需要凹凸性真正改变才能确定。",eg:"f(x)=x³，f''(0)=0且两侧变号，x=0为拐点",wr:["不同教材凹凸定义可能相反","拐点需凹凸性改变"],tp:["判断凹凸","求拐点"],rt:[{id:"f3-2-1-2",n:"极值判定"}],ch:3,sn:"3.2",gn:"凹凸性与拐点"},
{id:"f3-2-3-1",n:"函数作图步骤",f:"$$\\begin{aligned}&\\text{①定义域 ②奇偶性/周期性 ③一阶导数(单调性/极值)}\\\\&\\text{④二阶导数(凹凸性/拐点) ⑤渐近线 ⑥描点作图}\\end{aligned}$$",im:3,el:"important",tg:["final"],py:"hszt",cd:"函数性质充分分析",cp:"系统化地作出函数草图",ct:"六步法：定义域→对称性→y'分析单调和极值→y''分析凹凸和拐点→渐近线→关键点作图。",ex:"渐近线：水平渐近线（x→∞）；垂直渐近线（分母→0）；斜渐近线（y=kx+b，k=lim f/x）。",eg:"分析f(x)=x³-6x²+9x，求单调区间、极值、凹凸区间和拐点",wr:["步骤要完整","渐近线不要遗漏"],tp:["函数作图","综合分析"],rt:[{id:"f3-2-1-2",n:"极值判定"},{id:"f3-2-2-1",n:"凹凸性"}],ch:3,sn:"3.2",gn:"函数作图"},
{id:"f3-2-3-2",n:"渐近线",f:"$$\\begin{aligned}&\\text{水平：}\\lim_{x\\to\\infty}f(x)=A\\\\&\\text{垂直：}\\lim_{x\\to x_0}f(x)=\\infty\\\\&\\text{斜：}k=\\lim_{x\\to\\infty}\\frac{f(x)}{x},\\;b=\\lim_{x\\to\\infty}[f(x)-kx]\\end{aligned}$$",im:4,el:"core",tg:["final","pg"],py:"jjx",cd:"对应极限存在且有限（斜渐近线k≠0）",cp:"确定函数图像的渐近趋势",ct:"水平渐近线：x→∞时y→常数。垂直渐近线：在间断点处。斜渐近线：x→∞时y≈kx+b。注意水平和斜渐近线不会同时存在。",ex:"有水平渐近线则无需再找斜渐近线。垂直渐近线在分母零点、对数零点处。",eg:"y=1/x有垂直渐近线x=0和水平渐近线y=0",wr:["水平和斜渐近线不会同时存在","注意区分无穷大方向"],tp:["渐近线"],rt:[{id:"f3-2-3-1",n:"函数作图"}],ch:3,sn:"3.2",gn:"函数作图",pastExam:[{y:2022,t:"考研数学二",f:"高频"}]},
{id:"f3-3-1-1",n:"曲率与曲率半径",f:"$$K = \\frac{|y''|}{(1+y'^2)^{3/2}},\\; R = \\frac{1}{K}$$",im:2,el:"general",tg:["pg"],py:"ql",cd:"y=f(x)二阶可导",cp:"度量曲线的弯曲程度",ct:"曲率K越大曲线弯曲越厉害。曲率半径R=1/K。圆是等曲率曲线（K=1/R=常数）。直线曲率为零。",ex:"汽车转弯半径就是曲率半径的实际应用。曲率圆心在法线方向，距曲线R处。",eg:"y=x²在(0,0)处的曲率：y'=0,y''=2，K=2/(1+0)^(3/2)=2，R=1/2",wr:["曲率值恒为非负","注意公式中的平方和3/2次方"],tp:["曲率计算"],rt:[{id:"f3-2-2-1",n:"凹凸性"}],ch:3,sn:"3.3",gn:"曲率"},

{id:"f4-1-1-1",n:"不定积分定义",f:"$$\\int f(x)dx = F(x) + C,\\; F'(x)=f(x)$$",im:3,el:"important",tg:["final","pg"],py:"bdjfdy",cd:"被积函数f(x)在区间上有原函数",cp:"求导的逆运算，寻找原函数族",ct:"若F'(x)=f(x)，则F(x)是f(x)的一个原函数。不定积分表示全体原函数（加上任意常数C）。连续函数必有原函数。",ex:"积分号∫来自Summation的首字母S的变形。一定不要忘记加常数C！",eg:"∫2xdx=x²+C。验证：(x²+C)'=2x",wr:["一定要加积分常数C","不是所有函数都有初等原函数（如e^{x²}）"],tp:["基本积分"],rt:[{id:"f4-1-1-2",n:"基本积分公式"}],ch:4,sn:"4.1",gn:"不定积分的定义"},
{id:"f4-1-1-2",n:"基本积分公式表",f:"$$\\begin{aligned}&\\int x^n dx=\\frac{x^{n+1}}{n+1}+C(n\\neq -1),\\;\\int\\frac{1}{x}dx=\\ln|x|+C\\\\&\\int e^x dx=e^x+C,\\;\\int a^x dx=\\frac{a^x}{\\ln a}+C\\\\&\\int\\sin x dx=-\\cos x+C,\\;\\int\\cos x dx=\\sin x+C\\\\&\\int\\sec^2 x dx=\\tan x+C,\\;\\int\\csc^2 x dx=-\\cot x+C\\\\&\\int\\frac{1}{\\sqrt{1-x^2}}dx=\\arcsin x+C,\\;\\int\\frac{1}{1+x^2}dx=\\arctan x+C\\end{aligned}$$",im:5,el:"mustknow",tg:["final","pg"],py:"jbjfgs",cd:"各积分公式有其定义域限制",cp:"不定积分计算的基础，必须熟练掌握",ct:"基本积分公式是求导公式的逆向记忆。注意∫(1/x)dx=ln|x|+C带绝对值。三角函数的积分可从导数循环推导。",ex:"记忆技巧：从导数公式反推。x^(-1)的积分是ln|x|而非x^0/0。",eg:"∫(3x²+1/x+cosx)dx=x³+ln|x|+sinx+C",wr:["x^(-1)的积分是ln|x|","注意定义域限制","常数C不能丢"],tp:["基本积分计算"],rt:[{id:"f4-1-1-1",n:"不定积分定义"}],ch:4,sn:"4.1",gn:"不定积分的定义"},
{id:"f4-2-1-1",n:"第一类换元法（凑微分法）",f:"$$\\int f[g(x)]g'(x)dx = \\int f(u)du\\big|_{u=g(x)}$$",im:5,el:"mustknow",tg:["final","pg"],py:"dylhyf",cd:"∫f(u)du容易积分",cp:"将复杂积分化为基本积分公式的形式",ct:"把被积表达式的一部分\"凑\"成某个函数的微分，然后换元简化。核心思想是逆向使用链式法则。",ex:"步骤：观察→找到g'(x)dx=d(g(x))→令u=g(x)→积分→回代。常见模式：∫f(ax+b)dx=(1/a)∫f(u)du。",eg:"∫cos(2x)dx=(1/2)∫cosudu=(1/2)sinu+C=(1/2)sin(2x)+C",wr:["凑微分的识别需练习","换元后要回代","注意系数调整"],tp:["凑微分法","三角积分"],rt:[{id:"f4-1-1-2",n:"基本积分公式"}],ch:4,sn:"4.2",gn:"第一类换元法"},
{id:"f4-2-2-1",n:"第二类换元法（三角代换）",f:"$$\\begin{aligned}&\\sqrt{a^2-x^2} \\to x=a\\sin t\\\\&\\sqrt{a^2+x^2} \\to x=a\\tan t\\\\&\\sqrt{x^2-a^2} \\to x=a\\sec t\\end{aligned}$$",im:4,el:"core",tg:["final","pg"],py:"delhyf",cd:"被积函数含根号表达式，换元函数单调可导",cp:"通过变量替换消去根号",ct:"三大三角代换对应三类根式。步骤：设x=三角函数→dx替换→利用三角恒等式消根号→积分→回代原变量。",ex:"注意回代时用反三角函数，注意定义域限制。牢记dx的替换表达式。",eg:"∫dx/√(1-x²)，令x=sint，dx=costdt，原式=∫dt=t+C=arcsinx+C",wr:["回代时注意反三角函数定义域","积分后必须回代原变量","牢记dx的替换"],tp:["三角代换","根式积分"],rt:[{id:"f4-1-1-2",n:"基本积分公式"}],ch:4,sn:"4.2",gn:"第二类换元法"},
{id:"f4-3-1-1",n:"分部积分公式",f:"$$\\int u dv = uv - \\int v du$$",im:5,el:"mustknow",tg:["final","pg"],py:"fbjf",cd:"u和v都可导",cp:"处理乘积形式的积分",ct:"将难以直接积分的乘积转化为另一个可能更容易的积分。源自乘积求导法则的逆用。",ex:"选u优先顺序（ILATE）：对数>反三角>幂函数>三角函数>指数函数。有时需多次分部积分或方程求解。",eg:"∫xeˣdx，令u=x,dv=eˣdx，=xeˣ-∫eˣdx=xeˣ-eˣ+C",wr:["u和dv的选择很关键","可能需要多次分部积分","有时需通过方程求解"],tp:["乘积积分","对数积分","循环型积分"],rt:[{id:"f4-1-1-2",n:"基本积分公式"}],ch:4,sn:"4.3",gn:"分部积分"},
{id:"f4-4-1-1",n:"部分分式分解",f:"$$\\int \\frac{P(x)}{Q(x)}dx \\xrightarrow{\\text{分解}} \\sum \\int \\frac{A}{(x-a)^k}dx + \\sum \\int \\frac{Bx+C}{(x^2+px+q)^m}dx$$",im:3,el:"important",tg:["final","pg"],py:"bffsfj",cd:"P(x),Q(x)为多项式，deg(P)<deg(Q)",cp:"系统化处理有理函数的积分",ct:"将真分式分解为最简部分分式之和。步骤：确保真分式→分母因式分解→设部分分式→求解系数→逐项积分。",ex:"若分子次数≥分母次数，先做多项式除法。分母因式分解要彻底，系数计算要仔细。",eg:"∫dx/(x²-1)=∫[1/2·1/(x-1)-1/2·1/(x+1)]dx=(1/2)ln|(x-1)/(x+1)|+C",wr:["先确保是真分式","分母因式分解要彻底","系数计算要仔细"],tp:["有理函数积分"],rt:[{id:"f4-1-1-2",n:"基本积分公式"}],ch:4,sn:"4.4",gn:"有理函数积分"},
{id:"f4-5-1-1",n:"三角函数积分策略",f:"$$\\begin{aligned}&\\int \\sin^m x\\cos^n x dx:\\; \\text{至少一个奇次}\\to\\text{凑微分}\\\\&\\int \\tan^m x\\sec^n x dx:\\; \\text{利用}\\sec^2 x=1+\\tan^2 x\\end{aligned}$$",im:3,el:"important",tg:["final","pg"],py:"sjhsjf",cd:"m,n为非负整数",cp:"系统化处理三角函数的有理积分",ct:"策略1：若m或n中有奇数，提出sinx或cosx凑微分。策略2：都用降幂公式。策略3：关于tanx和secx用代换。",ex:"∫sinᵐxcosⁿxdx：若m奇令u=cosx；若n奇令u=sinx；都偶用降幂公式。",eg:"∫sin³x cos²x dx=∫(1-cos²x)cos²x sinxdx=∫(cos²x-cos⁴x)d(-cosx)=cos⁵x/5-cos³x/3+C",wr:["降幂公式的正确使用","注意凑微分的方向"],tp:["三角积分"],rt:[{id:"f4-1-1-2",n:"基本积分公式"}],ch:4,sn:"4.5",gn:"三角有理式积分"},
{id:"f4-5-1-2",n:"万能代换（三角函数有理式）",f:"$$t = \\tan\\frac{x}{2} \\Rightarrow \\sin x=\\frac{2t}{1+t^2},\\;\\cos x=\\frac{1-t^2}{1+t^2},\\;dx=\\frac{2}{1+t^2}dt$$",im:2,el:"general",tg:["pg"],py:"wndh",cd:"被积函数是sinx和cosx的有理式",cp:"将三角有理式转化为代数有理分式的通法",ct:"令t=tan(x/2)，则所有三角函数变为t的有理函数。虽计算量可能大，但总能解决。仅在特殊方法都行不通时使用。",ex:"万能代换会引入较高次有理函数，计算量大。优先尝试凑微分或三角恒等式。",eg:"∫dx/(1+sinx)，令t=tan(x/2)，化简后积分得-2/(1+tan(x/2))+C",wr:["计算量大，仅作最后手段","化简后可能需要部分分式","注意回代"],tp:["万能代换"],rt:[{id:"f4-5-1-1",n:"三角积分策略"}],ch:4,sn:"4.5",gn:"三角有理式积分"},
{id:"f4-2-1-2",n:"常见凑微分模式",f:"$$\\begin{aligned}&\\int f(ax+b)dx = \\frac{1}{a}\\int f(u)du\\\\&\\int f(x^n)x^{n-1}dx = \\frac{1}{n}\\int f(u)du\\\\&\\int \\frac{f'(x)}{f(x)}dx = \\ln|f(x)|+C\\\\&\\int f(e^x)e^x dx = \\int f(u)du\\end{aligned}$$",im:5,el:"mustknow",tg:["final","pg"],py:"cjwfms",cd:"各模式对应特定被积函数形式",cp:"快速识别可凑微分的积分模式",ct:"模式1：线性函数内部（如∫sin(2x)dx=(1/2)∫sinudu）。模式2：幂函数因子。模式3：对数导数模式（最重要）。模式4：指数函数因子。",ex:"∫x·sin(x²)dx=(1/2)∫sinudu=-1/2·cos(x²)+C。熟练识别这些模式可极大提高积分速度。",eg:"∫(2x+1)/(x²+x+1)dx=ln|x²+x+1|+C（模式3）",wr:["识别模式需要大量练习","注意系数调整","回代时不要遗漏"],tp:["凑微分模式","快速积分"],rt:[{id:"f4-2-1-1",n:"第一类换元法"}],ch:4,sn:"4.2",gn:"第一类换元法",pastExam:[{y:2023,t:"期末",f:"高频"},{y:2022,t:"考研数学二",f:"高频"}]},

{id:"f5-1-1-1",n:"定积分定义",f:"$$\\int_a^b f(x)dx = \\lim_{\\lambda \\to 0} \\sum_{i=1}^n f(\\xi_i)\\Delta x_i$$",im:3,el:"important",tg:["final","pg"],py:"djfdy",cd:"f在[a,b]上有界，且极限与分割方式和取点无关",cp:"求曲边梯形面积，定义精确的累加和",ct:"定积分是黎曼和的极限。几何意义：曲线下（带符号的）面积。连续函数必可积。",ex:"可积条件：连续、单调、有界且有有限个间断点的函数都可积。定积分是数，不定积分是函数族。",eg:"用定义求∫₀¹xdx=1/2",wr:["可积条件：有界+间断点有限或单调","定积分是数，不定积分是函数族"],tp:["定积分定义","积分概念"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:5,sn:"5.1",gn:"定积分的定义与性质"},
{id:"f5-1-1-2",n:"定积分性质",f:"$$\\begin{aligned}&\\int_a^b [f \\pm g] = \\int_a^b f \\pm \\int_a^b g,\\;\\int_a^b cf = c\\int_a^b f\\\\&\\int_a^b f = \\int_a^c f + \\int_c^b f,\\; f \\leq g \\Rightarrow \\int_a^b f \\leq \\int_a^b g\\\\&m(b-a) \\leq \\int_a^b f(x)dx \\leq M(b-a)\\end{aligned}$$",im:4,el:"core",tg:["final","pg"],py:"djfxz",cd:"各积分存在",cp:"灵活处理定积分计算与不等式",ct:"线性性、区间可加性、保号性。重要推论：|∫f|≤∫|f|；积分中值定理：∫f=f(ξ)(b-a)（f连续）。",ex:"用于估计定积分的范围。如∫₀¹e^{x²}dx介于1和e之间（因1≤e^{x²}≤e）。",eg:"估计∫₀¹e^{x²}dx：1≤e^{x²}≤e，所以1≤∫₀¹e^{x²}dx≤e",wr:["区间可加性不考虑顺序","定积分不能拆成无穷和"],tp:["积分估值","比较大小"],rt:[{id:"f5-1-1-1",n:"定积分定义"}],ch:5,sn:"5.1",gn:"定积分的定义与性质"},
{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式",f:"$$\\int_a^b f(x)dx = F(b) - F(a) = F(x)\\big|_a^b$$",im:5,el:"mustknow",tg:["final","pg"],py:"ndlbnc",cd:"f在[a,b]连续，F是f的任意一个原函数",cp:"定积分计算的核心公式，连接不定积分与定积分",ct:"微积分学基本定理。将定积分计算转化为求原函数在上下限的值差。F(b)-F(a)简记为F(x)|_a^b。",ex:"f必须连续。需要找到原函数。注意：上限减下限（不要颠倒顺序）。",eg:"∫₀¹x²dx=(x³/3)|₀¹=1/3-0=1/3",wr:["f必须连续","需要找到原函数","上限减下限（不要颠倒）"],dr:"通过变上限积分函数Φ(x)=∫_a^x f(t)dt的导数等于f(x)来证明",tp:["定积分计算"],rt:[{id:"f4-1-1-1",n:"不定积分"},{id:"f5-2-1-2",n:"变上限积分"}],ch:5,sn:"5.2",gn:"牛顿-莱布尼茨公式"},
{id:"f5-2-1-2",n:"变上限积分求导",f:"$$\\frac{d}{dx}\\int_a^x f(t)dt = f(x),\\; \\frac{d}{dx}\\int_a^{g(x)} f(t)dt = f(g(x))g'(x)$$",im:4,el:"core",tg:["final","pg"],py:"bsxjfqd",cd:"f连续，g(x)可导",cp:"求含积分上限的函数的导数",ct:"变上限积分是原函数的一种表示。一般形式：d/dx∫_{h(x)}^{g(x)} f(t)dt=f(g(x))g'(x)-f(h(x))h'(x)。",ex:"注意：上限是变量时需要用链式法则。如果上下限都是函数，分别求导再相减。",eg:"F(x)=∫₀^{x²} e^{-t²}dt，求F'(x)。=e^{-x⁴}·2x",wr:["上限是变量时用链式法则","上下限都是函数时分别求导相减"],tp:["变限积分求导"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:5,sn:"5.2",gn:"牛顿-莱布尼茨公式"},
{id:"f5-3-1-1",n:"定积分换元法",f:"$$\\int_a^b f(x)dx = \\int_{\\alpha}^{\\beta} f[\\varphi(t)]\\varphi'(t)dt$$",im:4,el:"core",tg:["final","pg"],py:"djfhyf",cd:"φ(α)=a, φ(β)=b, φ'(t)连续",cp:"通过换元简化定积分的计算",ct:"与不定积分换元类似，但换元后积分限也要跟着变。不需要回代原变量！",ex:"步骤：令x=φ(t)→确定新积分限α,β（φ(α)=a,φ(β)=b）→代入dx=φ'(t)dt→在新限下计算→得到数值。",eg:"∫₀¹√(1-x²)dx，令x=sint，=∫₀^{π/2}cos²tdt=π/4",wr:["换元必换限！","新限要根据换元函数正确计算","不需要回代原变量"],tp:["定积分换元法"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:5,sn:"5.3",gn:"定积分换元与分部"},
{id:"f5-3-1-3",n:"对称区间积分简化",f:"$$\\int_{-a}^a f(x)dx = \\begin{cases}2\\int_0^a f(x)dx & f\\text{为偶函数}\\\\0 & f\\text{为奇函数}\\end{cases}$$",im:4,el:"core",tg:["final","pg"],py:"dcqjfjh",cd:"积分区间关于原点对称",cp:"利用奇偶性简化对称区间上的积分",ct:"对称区间上奇函数积分为零，偶函数积分是一半区间的两倍。非常实用的简化技巧。",ex:"注意：只有对称区间[-a,a]才能用。务必确认函数的奇偶性。",eg:"∫_{-1}^1 x^3dx=0（奇函数）；∫_{-1}^1 x^2dx=2∫_0^1 x^2dx=2/3（偶函数）",wr:["区间必须关于原点对称","务必确认函数的奇偶性"],tp:["对称区间积分"],rt:[{id:"f5-1-1-2",n:"定积分性质"}],ch:5,sn:"5.3",gn:"定积分换元与分部"},
{id:"f5-2-1-3",n:"积分中值定理",f:"$$\\int_a^b f(x)dx = f(\\xi)(b-a),\\; \\xi\\in[a,b]$$",im:3,el:"important",tg:["final","pg"],py:"jfzzdl",cd:"f在[a,b]上连续",cp:"用某点的函数值代替积分值",ct:"存在ξ使积分=矩形面积。推广：∫f·gdx=f(ξ)∫gdx（g在[a,b]不变号）。用于证明积分不等式。",ex:"用于估计积分值范围。如∫₀¹e^{x}dx=e^{ξ}·1，ξ∈(0,1)，值在1和e之间。",eg:"求证∫₀¹x^n/(1+x)dx≥1/(2(n+1))",wr:["f必须连续","ξ具体位置未知"],tp:["积分估值","证明不等式"],rt:[{id:"f5-1-1-2",n:"定积分性质"}],ch:5,sn:"5.2",gn:"定理与应用"},
{id:"f5-4-1-3",n:"Γ函数（Gamma函数）",f:"$$\\Gamma(s)=\\int_0^{+\\infty} x^{s-1}e^{-x}dx,\\;\\Gamma(n+1)=n!,\\;\\Gamma(\\frac{1}{2})=\\sqrt{\\pi}$$",im:2,el:"general",tg:["pg"],py:"gmhs",cd:"s>0",cp:"推广阶乘概念，用于反常积分和概率",ct:"Γ函数是阶乘的连续推广：Γ(n+1)=n!。递推公式：Γ(s+1)=sΓ(s)。Γ(1/2)=√π是最常用值。",ex:"∫₀^∞ x^n e^{-ax}dx=Γ(n+1)/a^{n+1}=n!/a^{n+1}。常用于概率统计中的分布。",eg:"∫₀^∞ x^3 e^{-2x}dx=Γ(4)/2^4=6/16=3/8",wr:["Γ函数定义的s>0","递推公式方向"],tp:["Γ函数","反常积分"],rt:[{id:"f5-4-1-1",n:"无穷限积分"}],ch:5,sn:"5.4",gn:"反常积分"},
{id:"f5-2-2-1",n:"定积分的近似计算（梯形法）",f:"$$\\int_a^b f(x)dx \\approx \\frac{h}{2}[f(x_0)+2\\sum_{k=1}^{n-1}f(x_k)+f(x_n)],\\; h=\\frac{b-a}{n}$$",im:2,el:"general",tg:["final"],py:"djfjsjs",cd:"f在[a,b]上可积，n等分区间",cp:"当无法解析积分时进行数值近似",ct:"梯形法将曲线下面积近似为n个梯形面积之和。误差与h²成正比。华普生法（抛物线法）精度更高。",ex:"h越小（n越大）结果越精确。现代一般用计算机计算，了解思想即可。",eg:"用4等分梯形法估算∫₀¹ e^{-x²}dx（无初等原函数）",wr:["是近似值不是精确值","等分间距h的确定"],tp:["数值积分"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:5,sn:"5.2",gn:"定积分计算"},
{id:"f5-4-1-2",n:"瑕积分",f:"$$\\int_a^b f(x)dx = \\lim_{t \\to b^-} \\int_a^t f(x)dx \\; (b\\text{为瑕点})$$",im:3,el:"important",tg:["final","pg"],py:"xjf",cd:"瑕点附近f(x)无界",cp:"处理被积函数在区间内无界的积分",ct:"瑕积分是被积函数趋于无穷时的积分。比较基准：∫₀¹ 1/x^p dx，p<1收敛，p≥1发散。",ex:"常见瑕点：分母为零处、ln0处。先识别瑕点位置，通过极限处理。",eg:"∫₀¹ 1/√x dx=lim(ε→0⁺)∫_ε¹ x^{-1/2}dx=2，收敛",wr:["先识别瑕点位置","通过极限处理","可能有多个瑕点"],tp:["瑕积分","收敛性"],rt:[{id:"f5-4-1-1",n:"无穷限积分"}],ch:5,sn:"5.4",gn:"瑕积分"},

{id:"f6-1-1-1",n:"平面图形面积",f:"$$S = \\int_a^b [f(x)-g(x)]dx \\; \\text{或} \\; S = \\int_c^d [\\varphi(y)-\\psi(y)]dy$$",im:4,el:"core",tg:["final","pg"],py:"pmtxmj",cd:"f(x)≥g(x)在[a,b]上",cp:"计算两条曲线围成的面积",ct:"面积=∫(上曲线-下曲线)dx。对于y型区域，面积=∫(右曲线-左曲线)dy。",ex:"步骤：画图→确定积分变量（x型或y型）→确定积分区间→确定上下函数→积分计算。复杂区域需分段。",eg:"求y=x²与y=x围成的面积。交点x=0,1，S=∫₀¹(x-x²)dx=1/6",wr:["确定曲线上下位置","交点要准确","复杂区域需分段"],tp:["面积计算"],rt:[],ch:6,sn:"6.1",gn:"面积与体积"},
{id:"f6-1-1-2",n:"旋转体体积",f:"$$V = \\pi\\int_a^b [f(x)]^2 dx \\; \\text{（绕x轴）}$$",im:4,el:"core",tg:["final","pg"],py:"xzttj",cd:"曲线在[a,b]上绕坐标轴旋转",cp:"计算曲线绕坐标轴旋转所得旋转体的体积",ct:"绕x轴：V=π∫y²dx。圆环法（绕y轴）：V=2π∫x·f(x)dx。本质是将旋转体切成无数薄圆盘。",ex:"绕平行于坐标轴的直线旋转时需要用平移变换。注意旋转轴，用对公式。",eg:"y=x²(0≤x≤1)绕x轴旋转：V=π∫₀¹x⁴dx=π/5",wr:["注意旋转轴","用对公式","注意积分区间"],tp:["旋转体体积"],rt:[{id:"f6-1-1-1",n:"平面面积"}],ch:6,sn:"6.1",gn:"面积与体积"},
{id:"f6-1-1-3",n:"平面曲线弧长",f:"$$s = \\int_a^b \\sqrt{1+[f'(x)]^2}dx$$",im:3,el:"important",tg:["final","pg"],py:"pmqxhc",cd:"f'(x)在[a,b]连续",cp:"计算曲线的长度",ct:"弧长=∫√(1+(dy/dx)²)dx。参数形式：s=∫√((dx/dt)²+(dy/dt)²)dt。极坐标：s=∫√(r²+(dr/dθ)²)dθ。",ex:"公式来源：将曲线分割成小段，每段近似直线，用勾股定理求长度再累加取极限。",eg:"y=x²(0≤x≤1)，s=∫₀¹√(1+4x²)dx",wr:["不同表示形式的公式不同","积分可能需数值计算"],tp:["弧长计算"],rt:[{id:"f6-1-1-1",n:"面积计算"}],ch:6,sn:"6.1",gn:"面积与体积"},
{id:"f6-1-1-4",n:"绕y轴旋转体体积（圆环法）",f:"$$V = 2\\pi\\int_a^b xf(x)dx$$",im:4,el:"core",tg:["final","pg"],py:"ryxtj",cd:"曲线在x=a到x=b间绕y轴旋转",cp:"计算曲线绕y轴旋转所得体积",ct:"圆环法（壳法）：将旋转体切成薄圆筒，体积=2π·半径·高度·厚度。适用于y=f(x)绕y轴旋转。",ex:"当绕y轴时用此公式；当绕平行于坐标轴的直线时用平移。区别圆盘法（π∫y²dx）与壳法。",eg:"y=x(0≤x≤1)绕y轴旋转：V=2π∫₀¹x·xdx=2π/3",wr:["区分绕x轴和绕y轴的公式","绕y轴需dx积分"],tp:["旋转体体积","圆环法"],rt:[{id:"f6-1-1-2",n:"旋转体体积圆盘法"}],ch:6,sn:"6.1",gn:"面积与体积",pastExam:[{y:2023,t:"考研数学一",f:"高频"},{y:2022,t:"期末",f:"高频"}]},
{id:"f6-1-2-1",n:"变力做功",f:"$$W = \\int_a^b F(x)dx$$",im:3,el:"important",tg:["final","pg"],py:"blzg",cd:"力沿直线方向，F(x)连续",cp:"计算变力沿直线所做的功",ct:"当力不是常数时，将位移分割成微元，每一微元上力近似不变，求和取极限。",ex:"常见类型：弹簧力F=kx，从x=a到x=b做功W=∫Fdx。也适用于电场力等。",eg:"弹簧伸长0.5m需力20N，从0.3m拉到0.6m做功W=∫_{0.3}^{0.6}40xdx=5.4J",wr:["注意力的方向与位移方向","积分区间要准确"],tp:["做功计算","物理应用"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:6,sn:"6.2",gn:"物理应用"},
{id:"f6-1-2-2",n:"液体压力",f:"$$F = \\int_a^b \\rho g \\cdot h(x) \\cdot w(x)dx$$",im:2,el:"general",tg:["final"],py:"ytyl",cd:"液体密度ρ常数，板垂直置于液体中",cp:"计算液体对垂直板的压力",ct:"压力=∫ρg·深度·宽度·dx。深度随位置变化，宽度也可能是x的函数。关键：建立坐标系，表达深度h(x)。",ex:"坐标系选取影响公式形式。通常将水面作为y=0或x轴。",eg:"矩形闸门高2m宽3m，上沿在水面下1m，压力F=∫₁³9800·x·3dx=176.4kN",wr:["坐标系选取要合理","深度是水面到点的距离"],tp:["液体压力计算"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:6,sn:"6.2",gn:"物理应用"},
{id:"f6-1-2-3",n:"引力（万有引力积分）",f:"$$dF = G\\frac{m \\cdot dm}{r^2},\\; F = \\int dF$$",im:2,el:"general",tg:["pg"],py:"yl",cd:"物体可视为质点或质量连续分布",cp:"计算物体间的万有引力",ct:"物体不是质点时，分割成质量微元，分别计算每个微元的引力，再矢量合成。注意引力是矢量需分解分量。",ex:"常见：均匀细杆对质点的引力。先设坐标，写出dF表达式，分解分量，分别积分。",eg:"均匀细杆长L质量M，质点m在延长线上距端点a处，F=GMm/[a(a+L)]",wr:["引力是矢量需分解","对称性可简化计算"],tp:["引力计算","物理应用"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:6,sn:"6.2",gn:"物理应用"},
{id:"f6-1-2-4",n:"平均值公式",f:"$$f_{\\text{avg}} = \\frac{1}{b-a}\\int_a^b f(x)dx$$",im:3,el:"important",tg:["final","pg"],py:"pjz",cd:"f(x)在[a,b]上可积",cp:"求函数在区间上的平均值",ct:"积分平均值是对连续情况的算术平均推广。积分中值定理保证了存在ξ使f(ξ)=平均值。",ex:"与离散平均值不同，积分平均值考虑了函数值的连续变化。",eg:"f(x)=x²在[0,2]上的平均值=(1/2)∫₀²x²dx=4/3",wr:["积分区间正确","与中值定理中ξ的关系"],tp:["平均值"],rt:[{id:"f5-1-1-2",n:"定积分性质"}],ch:6,sn:"6.2",gn:"物理应用"},
{id:"f7-1-1-1",n:"可分离变量法",f:"$$\\frac{dy}{dx} = f(x)g(y) \\Rightarrow \\int \\frac{dy}{g(y)} = \\int f(x)dx + C$$",im:4,el:"core",tg:["final","pg"],py:"kflbl",cd:"g(y)≠0",cp:"解变量可分离的一阶微分方程",ct:"将含x和y的项分别移到等号两边，然后两边积分。是最基本的一阶微分方程解法。注意g(y)=0可能是奇解。",ex:"步骤：分离变量→两边积分→化简得通解。积分常数C统一加在一边。",eg:"dy/dx=2xy，分离：dy/y=2xdx，积分：ln|y|=x²+C，y=Ce^{x²}",wr:["g(y)=0可能是奇解","积分常数不要遗漏"],tp:["可分离变量方程"],rt:[{id:"f7-1-2-1",n:"一阶线性方程"}],ch:7,sn:"7.1",gn:"可分离变量方程"},
{id:"f7-1-2-1",n:"一阶线性方程通解公式",f:"$$y = e^{-\\int Pdx}\\left[\\int Q e^{\\int Pdx}dx + C\\right]$$",im:5,el:"mustknow",tg:["final","pg"],py:"yjxxfc",cd:"方程形如y'+P(x)y=Q(x)",cp:"解一阶线性微分方程的标准方法",ct:"一阶线性方程形如y'+P(x)y=Q(x)。Q=0为齐次（可分离变量）；Q≠0为非齐次。公式法最快捷。",ex:"先化成标准形式y'+P(x)y=Q(x)→计算∫Pdx→代入通解公式。记住指数前的负号！",eg:"y'+2xy=x，P=2x，Q=x，∫Pdx=x²，通解y=e^{-x²}[∫xe^{x²}dx+C]",wr:["先化成标准形式y'+P(x)y=Q(x)","记住公式中指数前的负号","积分常数不能丢"],tp:["一阶线性方程"],rt:[{id:"f7-1-1-1",n:"可分离变量"},{id:"f7-5-2-1",n:"伯努利方程"}],ch:7,sn:"7.1",gn:"一阶线性微分方程"},
{id:"f7-1-2-2",n:"齐次方程",f:"$$\\frac{dy}{dx} = \\varphi\\left(\\frac{y}{x}\\right) \\xrightarrow{u=y/x} \\text{可分离变量}$$",im:3,el:"important",tg:["final","pg"],py:"qcfc",cd:"右端函数可表示为y/x的函数",cp:"解形如dy/dx=f(y/x)的方程",ct:"令u=y/x，则y=ux，dy/dx=u+x·du/dx，转化为关于u和x的可分离变量方程。",ex:"步骤：令u=y/x→代入dy/dx=u+x·du/dx→分离变量→积分→回代y/x=u。",eg:"dy/dx=(y/x)+(x/y)，令y/x=u，化为一阶方程",wr:["先判断是否为齐次型","回代不要忘记"],tp:["齐次方程"],rt:[{id:"f7-1-1-1",n:"可分离变量"}],ch:7,sn:"7.1",gn:"一阶线性微分方程"},
{id:"f7-1-3-1",n:"伯努利方程",f:"$$y'+P(x)y=Q(x)y^n \\xrightarrow{z=y^{1-n}} \\text{一阶线性方程}$$",im:3,el:"important",tg:["final","pg"],py:"bnlfc",cd:"n≠0,1（n=0为线性，n=1可分离）",cp:"解含y^n项的一阶非线性方程",ct:"通过变量替换z=y^{1-n}，将伯努利方程化为一阶线性微分方程。",ex:"步骤：令z=y^{1-n}→计算z'=(1-n)y^{-n}y'→代入原方程→得到关于z的一阶线性方程→解出z→回代y。",eg:"y'+y=xy²(n=2)，令z=y^{-1}=1/y，化为z'-z=-x，一阶线性方程",wr:["n不能是0或1","变量替换要正确","回代步骤不能省略"],tp:["伯努利方程"],rt:[{id:"f7-1-2-1",n:"一阶线性方程"}],ch:7,sn:"7.1",gn:"伯努利方程"},
{id:"f7-2-1-1",n:"二阶常系数齐次方程通解",f:"$$\\begin{aligned}&r^2+pr+q=0:\\\\&\\Delta>0:\\; y=C_1e^{r_1x}+C_2e^{r_2x}\\\\&\\Delta=0:\\; y=(C_1+C_2x)e^{rx}\\\\&\\Delta<0:\\; y=e^{\\alpha x}(C_1\\cos\\beta x+C_2\\sin\\beta x)\\end{aligned}$$",im:5,el:"mustknow",tg:["final","pg"],py:"jccxqcfg",cd:"y''+py'+qy=0，p,q为常数",cp:"解二阶常系数齐次线性微分方程",ct:"特征方程r²+pr+q=0的根决定通解形式。实根→指数函数；重根→指数乘多项式；复根→指数乘三角函数。",ex:"特征根法的本质：设y=e^{rx}代入。实根时注意r₁和r₂是否相等。复根时α为实部，β为虚部。",eg:"y''-3y'+2y=0，特征r²-3r+2=0，r=1,2，通解y=C₁eˣ+C₂e²ˣ",wr:["先写出特征方程","注意判别式符号","复根时α和β的计算"],tp:["二阶常系数方程"],rt:[{id:"f7-2-1-2",n:"非齐次方程"}],ch:7,sn:"7.2",gn:"常系数线性方程"},
{id:"f7-2-1-2",n:"非齐次方程待定系数法",f:"$$f(x)=P_m(x)e^{\\lambda x} \\Rightarrow y^*=x^k Q_m(x)e^{\\lambda x}$$",im:4,el:"core",tg:["final","pg"],py:"fqcdfc",cd:"f(x)为多项式乘指数函数（或可化为该形式）",cp:"求非齐次方程的特解",ct:"λ不是特征根→k=0；λ是单根→k=1；λ是重根→k=2。通解=齐次通解+特解。",ex:"f(x)含sinβx/cosβx时，设y^*=x^k(Acosβx+Bsinβx)。先求出齐次通解再设特解。",eg:"y''-3y'+2y=eˣ，λ=1是单根，设特解y^*=Axeˣ",wr:["先求出齐次通解","根据λ确定k","待定系数要完全"],tp:["非齐次方程特解"],rt:[{id:"f7-2-1-1",n:"齐次方程通解"}],ch:7,sn:"7.2",gn:"常系数线性方程"},
{id:"f7-2-2-1",n:"高阶常系数齐次方程",f:"$$a_ny^{(n)}+a_{n-1}y^{(n-1)}+\\cdots+a_0y=0 \\xrightarrow{\\text{特征方程}} a_n r^n+\\cdots+a_0=0$$",im:3,el:"important",tg:["final","pg"],py:"gjccxqcfg",cd:"a_i为常数",cp:"解高阶常系数齐次线性微分方程",ct:"解法与二阶相同：写出特征方程→求根→根据根的类型写通解。单实根r→Ce^{rx}；k重实根→(C₁+...+C_k x^{k-1})e^{rx}；共轭复根→e^{αx}(C₁cosβx+C₂sinβx)。",ex:"三阶及以上方程的根可能有多种组合。用代数方法求特征根。",eg:"y'''-6y''+11y'-6y=0，特征根1,2,3，通解y=C₁eˣ+C₂e²ˣ+C₃e³ˣ",wr:["不同根的类型对应不同解形式","重根乘以x的次幂"],tp:["高阶常系数方程"],rt:[{id:"f7-2-1-1",n:"二阶齐次方程"}],ch:7,sn:"7.2",gn:"高阶微分方程"},
{id:"f7-2-3-1",n:"欧拉方程",f:"$$x^n y^{(n)}+a_1x^{n-1}y^{(n-1)}+\\cdots+a_ny=f(x) \\xrightarrow{x=e^t} \\text{常系数方程}$$",im:3,el:"important",tg:["pg"],py:"olfc",cd:"a_i为常数",cp:"将变系数欧拉方程转化为常系数方程",ct:"令x=e^t（x>0），则x^k·y^{(k)}变为关于t的常系数导数。通过变量替换消除幂函数系数。",ex:"二阶欧拉方程x²y''+axy'+by=f(x)。令x=e^t，则x·d/dx=d/dt，x²·d²/dx²=d²/dt²-d/dt。",eg:"x²y''+xy'-y=0，令x=e^t，变为y''(t)-y=0，y=C₁e^t+C₂e^{-t}=C₁x+C₂/x",wr:["x>0（负时令x=-e^t）","变换后导数关系要正确"],tp:["欧拉方程"],rt:[{id:"f7-2-1-1",n:"常系数方程"}],ch:7,sn:"7.2",gn:"欧拉方程"},
{id:"f7-1-4-1",n:"全微分方程",f:"$$P(x,y)dx+Q(x,y)dy=0,\\; \\frac{\\partial P}{\\partial y}=\\frac{\\partial Q}{\\partial x}$$",im:3,el:"important",tg:["final","pg"],py:"qwffc",cd:"∂P/∂y=∂Q/∂x（全微分条件）",cp:"解形如Pdx+Qdy=0且满足全微分条件的方程",ct:"若满足全微分条件，则存在u(x,y)使du=Pdx+Qdy，通解为u(x,y)=C。可先求u再得通解。",ex:"求u方法：u=∫Pdx+φ(y)→对y求偏导与Q比较确定φ(y)。不满足全微分条件时可找积分因子。",eg:"(2x+y)dx+(x+2y)dy=0，∂P/∂y=∂Q/∂x=1，是全微分方程，u=x²+xy+y²=C",wr:["先验证全微分条件","求原函数注意加常数"],tp:["全微分方程"],rt:[{id:"f11-2-1-2",n:"路径无关条件"}],ch:7,sn:"7.1",gn:"全微分方程"},

{id:"f8-1-1-1",n:"向量运算基本公式",f:"$$\\begin{aligned}&\\vec{a}\\cdot\\vec{b}=|\\vec{a}||\\vec{b}|\\cos\\theta=a_xb_x+a_yb_y+a_zb_z\\\\&\\vec{a}\\times\\vec{b}=\\begin{vmatrix}\\vec{i}&\\vec{j}&\\vec{k}\\\\a_x&a_y&a_z\\\\b_x&b_y&b_z\\end{vmatrix},\\;|\\vec{a}\\times\\vec{b}|=|\\vec{a}||\\vec{b}|\\sin\\theta\\end{aligned}$$",im:5,el:"mustknow",tg:["final","pg"],py:"xlys",cd:"向量有大小和方向，点积结果为标量，叉积结果为向量",cp:"向量运算的基础，用于判断平行、垂直和计算面积",ct:"点积：a·b=0⇔a⊥b；叉积：a×b=0⇔a∥b。叉积的模等于以两向量为邻边的平行四边形面积。",ex:"点积满足交换律，叉积不满足交换律(a×b=-b×a)。混合积(a×b)·c的绝对值等于平行六面体体积。",eg:"a=(1,2,3),b=(4,5,6)，a·b=32，a×b=(-3,6,-3)",wr:["点积与叉积的性质不同","叉积不满足交换律","注意右手定则确定叉积方向"],tp:["向量运算","判断位置关系"],rt:[{id:"f8-1-1-2",n:"向量模与方向余弦"}],ch:8,sn:"8.1",gn:"向量及其线性运算",pastExam:[{y:2024,t:"考研数学一",f:"高频"},{y:2023,t:"期末",f:"高频"}],examples:[{q:"已知 $$\\vec{a}=(1,2,-1),\\vec{b}=(2,0,3)$$，求 $$\\vec{a}\\cdot\\vec{b}$$ 和 $$\\vec{a}\\times\\vec{b}$$。",a:"$$\\vec{a}\\cdot\\vec{b}=2+0-3=-1$$；$$\\vec{a}\\times\\vec{b}=(6,-5,-4)$$。",an:"直接使用点积和叉积坐标公式。"}]},
{id:"f8-1-1-2",n:"向量的模与方向余弦",f:"$$|\\vec{a}|=\\sqrt{a_x^2+a_y^2+a_z^2},\\;\\cos\\alpha=\\frac{a_x}{|\\vec{a}|},\\;\\cos\\beta=\\frac{a_y}{|\\vec{a}|},\\;\\cos\\gamma=\\frac{a_z}{|\\vec{a}|}$$",im:4,el:"core",tg:["final","pg"],py:"xldm",cd:"非零向量",cp:"计算向量长度和方向",ct:"方向余弦满足cos²α+cos²β+cos²γ=1。与向量同方向的单位向量为a/|a|=(cosα,cosβ,cosγ)。",ex:"方向角α,β,γ分别是向量与x,y,z轴正向的夹角，范围[0,π]。",eg:"a=(1,2,2)，|a|=3，方向余弦(1/3,2/3,2/3)",wr:["方向余弦平方和为1","注意方向角的范围[0,π]"],tp:["向量模","方向余弦"],rt:[{id:"f8-1-1-1",n:"向量运算"}],ch:8,sn:"8.1",gn:"向量及其线性运算"},
{id:"f8-1-2-1",n:"平面方程（点法式）",f:"$$A(x-x_0)+B(y-y_0)+C(z-z_0)=0$$",im:5,el:"mustknow",tg:["final","pg"],py:"pmfc",cd:"已知平面上一点P₀(x₀,y₀,z₀)和法向量n=(A,B,C)",cp:"用点法式写出平面方程",ct:"平面一般方程：Ax+By+Cz+D=0，法向量为(A,B,C)。两平面夹角等于法向量夹角。",ex:"点到平面距离：d=|Ax₀+By₀+Cz₀+D|/√(A²+B²+C²)。平面平行⇔法向量平行。",eg:"过点(1,2,3)法向量(2,-1,1)的平面：2(x-1)-(y-2)+(z-3)=0，即2x-y+z-3=0",wr:["法向量垂直于平面","点到平面距离公式分母是法向量模"],tp:["平面方程","点法式"],rt:[{id:"f8-1-2-2",n:"直线方程"}],ch:8,sn:"8.2",gn:"平面与直线",pastExam:[{y:2024,t:"考研数学一",f:"高频"},{y:2022,t:"期末",f:"高频"}],examples:[{q:"求过点(1,-1,2)且垂直于向量(3,1,-2)的平面方程。",a:"平面方程：3(x-1)+1(y+1)-2(z-2)=0，即3x+y-2z+2=0。",an:"直接使用点法式方程。"}]},
{id:"f8-1-2-2",n:"直线方程（点向式）",f:"$$\\frac{x-x_0}{m}=\\frac{y-y_0}{n}=\\frac{z-z_0}{p}$$",im:5,el:"mustknow",tg:["final","pg"],py:"zxfx",cd:"已知直线上一点P₀(x₀,y₀,z₀)和方向向量s=(m,n,p)",cp:"用点向式写出空间直线方程",ct:"参数方程：x=x₀+mt,y=y₀+nt,z=z₀+pt。两直线夹角等于方向向量夹角。",ex:"两直线共面条件：(P₁P₂·(s₁×s₂))=0。点到直线距离可借助叉积计算。",eg:"过点(1,2,3)方向(1,1,0)的直线：(x-1)/1=(y-2)/1=(z-3)/0",wr:["方向向量不能为零向量","分母为零时用参数方程处理"],tp:["直线方程","点向式"],rt:[{id:"f8-1-2-1",n:"平面方程"}],ch:8,sn:"8.2",gn:"平面与直线",pastExam:[{y:2023,t:"考研数学一",f:"高频"},{y:2022,t:"期末",f:"高频"}],examples:[{q:"求过点(1,2,3)且方向向量为(2,-1,1)的直线方程。",a:"直线方程：$$\\frac{x-1}{2}=\\frac{y-2}{-1}=\\frac{z-3}{1}$$。",an:"直接使用点向式方程。"}]},
{id:"f8-1-3-1",n:"曲面方程（旋转曲面）",f:"$$f(y,z)=0\\text{绕}z\\text{轴}:\\; f(\\pm\\sqrt{x^2+y^2},z)=0$$",im:3,el:"important",tg:["final","pg"],py:"xzmqm",cd:"母线在坐标平面上，绕坐标轴旋转",cp:"求旋转曲面方程",ct:"绕z轴旋转：将原方程中的x用±√(x²+y²)代替（或y用±√(x²+z²)代替）。常见：圆锥面z²=a²(x²+y²)；旋转抛物面z=x²+y²。",ex:"规律：绕哪个轴转，哪个坐标不变，另一坐标替换为√(另两坐标平方和)。",eg:"y=z²绕z轴旋转得x²+y²=z²（圆锥面）",wr:["绕不同轴旋转公式不同","注意替换规则"],tp:["旋转曲面方程"],rt:[{id:"f8-1-3-2",n:"二次曲面"}],ch:8,sn:"8.3",gn:"曲面与空间曲线"},
{id:"f8-1-3-2",n:"常见二次曲面标准方程",f:"$$\\begin{aligned}&\\text{椭球面}:\\frac{x^2}{a^2}+\\frac{y^2}{b^2}+\\frac{z^2}{c^2}=1\\\\&\\text{单/双叶双曲面}:\\frac{x^2}{a^2}+\\frac{y^2}{b^2}-\\frac{z^2}{c^2}=1\\\\&\\text{椭圆抛物面}:z=\\frac{x^2}{a^2}+\\frac{y^2}{b^2}\\\\&\\text{双曲抛物面}:z=\\frac{x^2}{a^2}-\\frac{y^2}{b^2}\\end{aligned}$$",im:4,el:"core",tg:["final","pg"],py:"ecqm",cd:"各曲面有其标准方程形式",cp:"识别常见二次曲面类型",ct:"椭球面：三轴截距a,b,c。单叶双曲面：一个负号。双叶双曲面：两个负号。椭圆抛物面：z是x²,y²的正系数和。双曲抛物面（马鞍面）：z是x²,y²差。",ex:"用截痕法判断曲面类型。注意区分单叶和双叶双曲面：看系数负号个数。",eg:"x²/4+y²/9-z²=1是单叶双曲面",wr:["注意区分单叶/双叶双曲面","椭圆抛物面开口方向"],tp:["二次曲面识别"],rt:[{id:"f8-1-3-1",n:"旋转曲面"}],ch:8,sn:"8.3",gn:"曲面与空间曲线",pastExam:[{y:2023,t:"考研数学一",f:"中频"},{y:2021,t:"期末",f:"中频"}]},
{id:"f8-1-3-3",n:"空间曲线的参数方程与投影",f:"$$\\begin{cases}x=x(t)\\\\y=y(t)\\\\z=z(t)\\end{cases},\\;\\text{投影}\\to\\text{消去}z\\text{得}xoy\\text{面投影}$$",im:3,el:"important",tg:["final","pg"],py:"kjqx",cd:"曲线可参数化",cp:"表示空间曲线及其在坐标面上的投影",ct:"空间曲线可表示为参数方程或两曲面交线。投影到xOy面：从方程中消去z，得投影柱面方程。",ex:"螺旋线：x=acost,y=asint,z=bt。曲线在坐标面投影需消去对应变量。",eg:"曲线{x²+y²+z²=1,z=1/2}在xOy面投影为x²+y²=3/4",wr:["投影消去对应变量","投影曲线包含在柱面内"],tp:["空间曲线","投影"],rt:[{id:"f8-1-3-1",n:"曲面方程"}],ch:8,sn:"8.3",gn:"曲面与空间曲线"},

{id:"f12-1-1-1",n:"级数收敛定义",f:"$$\\sum_{n=1}^{\\infty} u_n = \\lim_{n \\to \\infty} S_n,\\; S_n = \\sum_{k=1}^n u_k$$",im:4,el:"core",tg:["final","pg"],py:"jssl",cd:"部分和序列S_n的极限存在",cp:"判断无穷项累加是否有意义",ct:"级数收敛⇔部分和数列{S_n}有极限。必要条件：通项u_n→0（不满足必发散，满足不一定）。",ex:"几何级数：Σq^n，|q|<1收敛于1/(1-q)；p-级数：Σ1/n^p，p>1收敛。调和级数Σ1/n发散但u_n→0。",eg:"Σ(1/2)^n收敛于2；Σ1/n发散（调和级数）",wr:["u_n→0是收敛必要非充分条件","调和级数Σ1/n发散但u_n→0"],tp:["敛散性判别"],rt:[{id:"f12-1-2-1",n:"比较判别法"}],ch:12,sn:"12.1",gn:"级数基本概念",pastExam:[{y:2023,t:"考研数学一",f:"中频"},{y:2022,t:"期末",f:"高频"},{y:2020,t:"考研数学二",f:"高频"}],examples:[{q:"判断级数 $$\\sum_{n=1}^{\\infty}\\frac{1}{n(n+1)}$$ 的敛散性。",a:"$$S_n=\\sum_{k=1}^{n}\\frac{1}{k(k+1)}=\\sum_{k=1}^{n}(\\frac{1}{k}-\\frac{1}{k+1})=1-\\frac{1}{n+1}\\to 1$$，级数收敛于1。",an:"利用裂项相消法求部分和，判断数列收敛。"}]},
{id:"f12-1-2-1",n:"比较判别法",f:"$$u_n \\leq v_n,\\; \\sum v_n \\text{收敛} \\Rightarrow \\sum u_n \\text{收敛}$$",im:4,el:"core",tg:["final","pg"],py:"bjpbf",cd:"u_n≥0, v_n≥0",cp:"通过与已知级数比较来判断敛散性",ct:"通项较小的级数更容易收敛。极限形式：lim(u_n/v_n)=c>0时两者同敛散。常用基准：p-级数和几何级数。",ex:"比较对象要选对，不等号方向要正确。极限形式中c=0和c=∞需要额外讨论。",eg:"判断Σ1/(n²+1)。1/(n²+1)<1/n²，Σ1/n²收敛，所以原级数收敛",wr:["比较对象选对","不等号方向正确","c=0和c=∞需额外讨论"],tp:["比较判别法"],rt:[{id:"f12-1-2-2",n:"比值判别法"}],ch:12,sn:"12.1",gn:"正项级数审敛法",pastExam:[{y:2023,t:"考研数学一",f:"高频"},{y:2021,t:"期末",f:"高频"}],examples:[{q:"判断级数 $$\\sum_{n=1}^{\\infty}\\frac{n+1}{n^2+1}$$ 的敛散性。",a:"$$\\frac{n+1}{n^2+1}\\sim\\frac{1}{n}$$，而 Σ1/n 发散，由比较判别法的极限形式知原级数发散。",an:"找出通项的主部，与p-级数比较。"}]},
{id:"f12-1-2-2",n:"比值判别法（达朗贝尔）",f:"$$\\lim_{n \\to \\infty} \\left|\\frac{u_{n+1}}{u_n}\\right| = \\rho:\\; \\rho<1\\text{收敛},\\;\\rho>1\\text{发散},\\;\\rho=1\\text{不确定}$$",im:4,el:"core",tg:["final","pg"],py:"bzpbf",cd:"u_n≠0（n充分大）",cp:"通过相邻项比值判断级数敛散性",ct:"ρ<1收敛，>1发散。特别适合含阶乘、幂次的级数。ρ=1时判别法失效（如Σ1/n的ρ=1但发散，Σ1/n²的ρ=1但收敛）。",ex:"注意绝对值。若一般项含(-1)^n则绝对值后变成正项级数再判断。",eg:"Σn!/n^n：ρ=lim(n/(n+1))^n=1/e<1，收敛",wr:["ρ=1时不能用","注意绝对值","含(-1)^n项需特殊处理"],tp:["比值判别法"],rt:[{id:"f12-1-2-3",n:"根值判别法"}],ch:12,sn:"12.1",gn:"正项级数审敛法",pastExam:[{y:2024,t:"考研数学一",f:"高频"},{y:2022,t:"期末",f:"高频"}],examples:[{q:"判断级数 $$\\sum_{n=1}^{\\infty}\\frac{2^n n!}{n^n}$$ 的敛散性。",a:"$$\\lim_{n\\to\\infty}\\frac{u_{n+1}}{u_n}=\\lim_{n\\to\\infty}\\frac{2\\cdot n^n}{(n+1)^n}=\\frac{2}{e}<1$$，级数收敛。",an:"比值法特别适合含阶乘和幂次的级数。"}]},
{id:"f12-1-2-4",n:"积分判别法",f:"$$f(x)\\searrow,\\; f(n)=u_n \\Rightarrow \\sum u_n \\text{与} \\int_1^{\\infty} f(x)dx \\text{同敛散}$$",im:3,el:"important",tg:["final","pg"],py:"jfpbf",cd:"f(x)非负单调递减",cp:"将级数敛散性转化为反常积分",ct:"若通项可表示为单调减函数在整点处的值，则级数与积分同敛散。特别适合判断p-级数。",ex:"∫₁^∞ 1/x^p dx，p>1收敛→Σ1/n^p(p>1)收敛。函数必须单调减且非负。",eg:"Σ1/(nln²n)：f(x)=1/(xln²x)，∫₁^∞收敛，所以级数收敛",wr:["函数必须单调减且非负","注意积分下限"],tp:["积分判别法"],rt:[{id:"f12-1-1-1",n:"级数收敛定义"}],ch:12,sn:"12.1",gn:"正项级数审敛法",pastExam:[{y:2021,t:"考研数学一",f:"中频"}],examples:[{q:"判断级数 $$\\sum_{n=2}^{\\infty}\\frac{1}{n\\ln n}$$ 的敛散性。",a:"$$f(x)=\\frac{1}{x\\ln x}$$ 单调递减，$$\\int_2^{\\infty}\\frac{dx}{x\\ln x}=\\ln|\\ln x|\\Big|_2^{\\infty}=+\\infty$$，发散。",an:"将级数转化为反常积分，利用积分判别法。"}]},
{id:"f12-1-3-1",n:"交错级数审敛法（莱布尼茨）",f:"$$u_n \\searrow 0 \\Rightarrow \\sum (-1)^{n-1}u_n \\text{收敛}$$",im:4,el:"core",tg:["final","pg"],py:"jcjssl",cd:"u_n单调递减趋于0",cp:"判断交错级数的收敛性",ct:"两个条件：u_n≥u_{n+1}（单调递减）且u_n→0。满足则收敛，且|r_n|≤u_{n+1}（余项估计）。",ex:"典型例子：Σ(-1)^{n-1}/n（交错调和级数）收敛但非绝对收敛。",eg:"Σ(-1)^{n-1}/n，u_n=1/n↘0，收敛",wr:["两个条件都要验证","单调递减是指u_{n+1}≤u_n","u_n→0是必要条件"],tp:["交错级数判别"],rt:[{id:"f12-1-3-2",n:"绝对收敛"}],ch:12,sn:"12.1",gn:"任意项级数",pastExam:[{y:2023,t:"考研数学一",f:"高频"},{y:2022,t:"期末",f:"高频"}]},
{id:"f12-1-3-2",n:"绝对收敛与条件收敛",f:"$$\\sum |u_n|\\text{收敛} \\Rightarrow \\sum u_n\\text{收敛（绝对收敛）}$$",im:4,el:"core",tg:["final","pg"],py:"jdsl",cd:"对一般项级数",cp:"判断任意项级数的收敛类型",ct:"若Σ|u_n|收敛→绝对收敛（原级数必收敛，可任意重排）。若Σu_n收敛但Σ|u_n|发散→条件收敛（不可随意重排）。",ex:"绝对收敛级数具有交换律。条件收敛级数重排可能改变和值（黎曼重排定理）。",eg:"Σ(-1)^{n-1}/n²绝对收敛；Σ(-1)^{n-1}/n条件收敛",wr:["先判断是否绝对收敛","绝对收敛⇒原级数收敛","条件收敛不可随意改变顺序"],tp:["绝对收敛/条件收敛"],rt:[{id:"f12-1-3-1",n:"交错级数"}],ch:12,sn:"12.1",gn:"任意项级数",pastExam:[{y:2024,t:"考研数学一",f:"高频"},{y:2023,t:"期末",f:"高频"}],examples:[{q:"判断级数 $$\\sum_{n=1}^{\\infty}(-1)^{n-1}\\frac{n}{n^2+1}$$ 是绝对收敛还是条件收敛。",a:"$$\\left|(-1)^{n-1}\\frac{n}{n^2+1}\\right|=\\frac{n}{n^2+1}\\sim\\frac{1}{n}$$ 发散。交错级数满足莱布尼茨条件（通项递减趋于0），故条件收敛。",an:"先判断绝对值级数，再判断交错级数本身。"}]},
{id:"f12-2-1-1",n:"收敛半径与收敛区间",f:"$$R = \\lim_{n \\to \\infty} \\left|\\frac{a_n}{a_{n+1}}\\right| \\;\\text{或}\\; R = \\frac{1}{\\lim\\sqrt[n]{|a_n|}}$$",im:5,el:"mustknow",tg:["final","pg"],py:"slbj",cd:"幂级数Σa_n x^n，极限存在（可为无穷）",cp:"确定幂级数在哪些x值处收敛",ct:"幂级数在|x|<R收敛，|x|>R发散，|x|=R处需单独判断。极限为0则R=∞；极限为∞则R=0。",ex:"求法：比值法R=lim|a_n/a_{n+1}|；根值法R=1/lim√[n]{|a_n|}。端点处需单独判断。",eg:"Σx^n/n!的收敛半径R=lim(n+1)!/n!=∞，收敛域(-∞,+∞)",wr:["端点处需单独判断","缺项幂级数需先分析","a_n是x^n项的系数"],tp:["收敛半径","收敛域"],rt:[{id:"f12-2-2-1",n:"泰勒级数"}],ch:12,sn:"12.2",gn:"幂级数的收敛域",pastExam:[{y:2024,t:"考研数学一",f:"高频"},{y:2023,t:"期末",f:"高频"},{y:2021,t:"考研数学二",f:"高频"}],examples:[{q:"求幂级数 $$\\sum_{n=1}^{\\infty}\\frac{x^n}{n}$$ 的收敛域。",a:"$$R=\\lim_{n\\to\\infty}\\left|\\frac{a_n}{a_{n+1}}\\right|=\\lim_{n\\to\\infty}\\frac{n+1}{n}=1$$。x=1时发散（调和级数），x=-1时收敛（交错调和级数）。收敛域：[-1,1)。",an:"先求收敛半径，再单独检查端点处敛散性。"}]},
{id:"f12-2-2-1",n:"重要函数的麦克劳林展开",f:"$$\\begin{aligned}&e^x=\\sum_{n=0}^{\\infty}\\frac{x^n}{n!}(-\\infty,\\infty),\\;\\sin x=\\sum_{n=0}^{\\infty}\\frac{(-1)^n x^{2n+1}}{(2n+1)!}(-\\infty,\\infty)\\\\&\\cos x=\\sum_{n=0}^{\\infty}\\frac{(-1)^n x^{2n}}{(2n)!}(-\\infty,\\infty),\\;\\ln(1+x)=\\sum_{n=1}^{\\infty}\\frac{(-1)^{n-1}x^n}{n}(-1,1]\\\\&\\frac{1}{1-x}=\\sum_{n=0}^{\\infty}x^n(-1,1),\\;(1+x)^a=\\sum_{n=0}^{\\infty}\\binom{a}{n}x^n(-1,1)\\end{aligned}$$",im:5,el:"mustknow",tg:["final","pg"],py:"mklljs",cd:"在收敛区间内成立",cp:"用幂级数表示常见函数",ct:"记忆技巧：eˣ无分母；sinx只含奇次项；cosx只含偶次项；ln(1+x)无阶乘；1/(1-x)是最简几何级数。",ex:"常用于级数求和和函数展开。注意各展开式的收敛域（特别是ln(1+x)和1/(1-x)）。",eg:"1/(1+x²)=Σ(-1)^n x^{2n}，|x|<1",wr:["注意收敛域","展开要注明收敛区间","不要混淆sin和cos的展开"],tp:["麦克劳林展开","级数求和","函数展开"],rt:[{id:"f3-1-2-1",n:"泰勒公式"},{id:"f12-2-1-1",n:"收敛半径"}],ch:12,sn:"12.2",gn:"幂级数展开",pastExam:[{y:2024,t:"考研数学一",f:"高频"},{y:2023,t:"考研数学二",f:"高频"},{y:2022,t:"期末",f:"高频"}],examples:[{q:"将函数 $$f(x)=\\ln(1+x)$$ 展开为x的幂级数，并求收敛域。",a:"$$\\ln(1+x)=x-\\frac{x^2}{2}+\\frac{x^3}{3}-\\cdots=\\sum_{n=1}^{\\infty}\\frac{(-1)^{n-1}x^n}{n}$$，收敛域：(-1,1]。",an:"直接使用麦克劳林展开公式，注意端点收敛性。"}]},
{id:"f12-3-1-1",n:"傅里叶级数公式",f:"$$f(x)=\\frac{a_0}{2}+\\sum_{n=1}^{\\infty}(a_n\\cos nx+b_n\\sin nx),\\;a_n=\\frac{1}{\\pi}\\int_{-\\pi}^{\\pi}f(x)\\cos nx dx,\\;b_n=\\frac{1}{\\pi}\\int_{-\\pi}^{\\pi}f(x)\\sin nx dx$$",im:3,el:"important",tg:["final","pg"],py:"flyjs",cd:"f(x)周期为2π，在[-π,π]上满足狄利克雷条件",cp:"将周期函数展开为正弦和余弦函数的级数",ct:"奇函数展开只有正弦项(b_n≠0,a_n=0)；偶函数展开只有余弦项(a_n≠0,b_n=0)。间断点处收敛到左右极限平均值。",ex:"狄利克雷条件：在一个周期内分段单调且只有有限个第一类间断点。",eg:"方波f(x)={-1,-π<x<0;1,0<x<π}的傅里叶展开=4/π·Σsin((2k-1)x)/(2k-1)",wr:["积分区间要正确","区分正弦展开和余弦展开","间断点收敛到平均值"],tp:["傅里叶展开"],rt:[],ch:12,sn:"12.3",gn:"傅里叶级数展开",pastExam:[{y:2022,t:"考研数学一",f:"中频"}]},
{id:"f12-1-2-3",n:"根值判别法（柯西）",f:"$$\\lim_{n\\to\\infty}\\sqrt[n]{|u_n|}=\\rho:\\; \\rho<1\\text{收敛},\\;\\rho>1\\text{发散},\\;\\rho=1\\text{不确定}$$",im:3,el:"important",tg:["final","pg"],py:"gzpbf",cd:"u_n的n次方根极限存在",cp:"通过通项的n次方根判断敛散性",ct:"与比值法类似，ρ<1收敛，>1发散。特别适合含n次幂的级数。ρ=1时判别法失效。",ex:"根值法和比值法的结论一致。有时根值法计算更简单（如通项是n的幂次）。",eg:"Σ(1+1/n)^{n^2}：√[n]{|u_n|}=(1+1/n)^n→e>1，发散",wr:["ρ=1时判别法失效","注意绝对值"],tp:["根值判别法"],rt:[{id:"f12-1-2-2",n:"比值判别法"}],ch:12,sn:"12.1",gn:"正项级数审敛法"},
{id:"f12-2-3-1",n:"幂级数的逐项求导与积分",f:"$$\\left(\\sum_{n=0}^{\\infty}a_n x^n\\right)'=\\sum_{n=1}^{\\infty}na_n x^{n-1},\\;\\int_0^x\\left(\\sum a_n t^n\\right)dt=\\sum\\frac{a_n}{n+1}x^{n+1}$$",im:4,el:"core",tg:["final","pg"],py:"zxqd",cd:"幂级数在收敛区间(-R,R)内",cp:"通过逐项求导或积分求幂级数的和函数",ct:"幂级数在收敛区间内可逐项求导和逐项积分，收敛半径不变。这是求和函数的核心手段。",ex:"步骤：将幂级数变形为已知展开形式→对和函数求导或积分→得到新级数→反求原和函数。",eg:"Σ_{n=1}^{∞}nx^{n-1}=1/(1-x)²（对几何级数逐项求导得）",wr:["仅在收敛区间内可操作","端点处收敛性可能改变"],tp:["和函数","逐项求导"],rt:[{id:"f12-2-1-1",n:"收敛半径"},{id:"f12-2-2-1",n:"麦克劳林展开"}],ch:12,sn:"12.2",gn:"幂级数的运算",pastExam:[{y:2024,t:"考研数学一",f:"高频"},{y:2023,t:"期末",f:"高频"}]},
{id:"f12-2-3-2",n:"幂级数求和函数策略",f:"$$\\begin{aligned}&\\text{①变形为已知展开式 ②逐项求导/积分}\\\\&\\text{③裂项相消 ④构造微分方程}\\end{aligned}$$",im:4,el:"core",tg:["final","pg"],py:"mjsqhhs",cd:"幂级数收敛于和函数",cp:"系统化求幂级数的和函数",ct:"四大策略：①识别并变形为标准展开式（如eˣ,ln(1+x)等）；②逐项求导消除分母或积分引入分母；③裂项部分和求极限；④建立关于和函数的微分方程求解。",ex:"例子：Σx^n/n²的和函数——逐项积分后再逐项积分。技巧在于熟悉的展开式及其变形。",eg:"求Σ_{n=1}^{∞}x^n/n的和函数。S'(x)=Σx^{n-1}=1/(1-x)，S(x)=-ln(1-x)",wr:["策略选择影响计算量","收敛域要一并给出"],tp:["和函数","幂级数"],rt:[{id:"f12-2-3-1",n:"逐项求导积分"}],ch:12,sn:"12.2",gn:"幂级数的运算",pastExam:[{y:2023,t:"考研数学一",f:"高频"}]},
{id:"f12-3-1-2",n:"傅里叶正弦/余弦展开",f:"$$\\begin{aligned}&\\text{正弦展开：}f(x)=\\sum_{n=1}^{\\infty}b_n\\sin nx,\\;b_n=\\frac{2}{\\pi}\\int_0^{\\pi}f(x)\\sin nx dx\\\\&\\text{余弦展开：}f(x)=\\frac{a_0}{2}+\\sum_{n=1}^{\\infty}a_n\\cos nx,\\;a_n=\\frac{2}{\\pi}\\int_0^{\\pi}f(x)\\cos nx dx\\end{aligned}$$",im:3,el:"important",tg:["final","pg"],py:"zxyxzk",cd:"f(x)在[0,π]上有定义",cp:"根据边界条件选择正弦或余弦展开",ct:"奇延拓→正弦展开（b_n≠0,a_n=0）；偶延拓→余弦展开（a_n≠0,b_n=0）。周期延拓到[-π,π]再扩展到整个实轴。",ex:"正弦展开适合f(0)=f(π)=0的函数；余弦展开适合f'(0)=f'(π)=0的函数。",eg:"f(x)=x在[0,π]上的正弦展开：b_n=(2/π)∫_0^π x sinnx dx=(2/n)(-1)^{n+1}",wr:["延拓方式要正确","注意积分区间是[0,π]"],tp:["正弦展开","余弦展开"],rt:[{id:"f12-3-1-1",n:"傅里叶级数"}],ch:12,sn:"12.3",gn:"傅里叶级数展开"},
{id:"f12-3-1-3",n:"傅里叶级数的复数形式",f:"$$f(x)=\\sum_{n=-\\infty}^{\\infty}c_n e^{inx},\\;c_n=\\frac{1}{2\\pi}\\int_{-\\pi}^{\\pi}f(x)e^{-inx}dx$$",im:2,el:"general",tg:["pg"],py:"flyfs",cd:"f(x)满足狄利克雷条件",cp:"用复指数表示傅里叶级数，形式更简洁",ct:"c_n=(a_n-ib_n)/2(n>0),c_{-n}=(a_n+ib_n)/2。|c_n|²表示第n次谐波的能量。在信号处理中广泛应用。",ex:"复数形式在计算中更简洁，利用e^{ix}=cosx+isinx。工程中常用。",eg:"f(x)=cosx的复傅里叶展开：c_1=c_{-1}=1/2，其余为零",wr:["c_n的计算分母是2π","n从-∞到∞"],tp:["傅里叶展开","复数形式"],rt:[{id:"f12-3-1-1",n:"傅里叶级数公式"}],ch:12,sn:"12.3",gn:"傅里叶级数展开"},

{id:"f9-1-1-1",n:"偏导数定义",f:"$$f_x(x_0,y_0)=\\lim_{\\Delta x\\to 0}\\frac{f(x_0+\\Delta x,y_0)-f(x_0,y_0)}{\\Delta x}$$",im:4,el:"core",tg:["final","pg"],py:"pdsdy",cd:"极限存在",cp:"描述多元函数沿某个坐标轴方向的变化率",ct:"偏导数是固定其他变量后对单个变量求导。f_x是对x求偏导（y视为常数）。计算规则与一元函数完全相同。",ex:"对x求导时把y当常数，对y求导时把x当常数。偏导数存在不能保证连续。混合偏导数在连续时交换次序。",eg:"f(x,y)=x²y+xy²，f_x=2xy+y²，f_y=x²+2xy",wr:["偏导数存在不能保证连续","混合偏导数连续时才可交换次序","对x求导时y是常数"],tp:["求偏导数"],rt:[{id:"f9-1-2-1",n:"全微分"}],ch:9,sn:"9.1",gn:"偏导数"},
{id:"f9-1-2-1",n:"全微分公式",f:"$$dz = f_x dx + f_y dy$$",im:4,el:"core",tg:["final","pg"],py:"qwf",cd:"f_x, f_y连续（即可微的充分条件）",cp:"多元函数增量的线性近似",ct:"全微分是二元函数增量的线性主部。可微⇒连续且偏导数存在，反之不成立。偏导数连续⇒可微（充分条件）。",ex:"dz≈Δz（当dx,dy很小时）。可微的充分条件是偏导数连续。全微分≠偏导数的简单叠加。",eg:"z=x²y，全微分：dz=2xy dx+x² dy",wr:["可微⇒偏导数存在，反之不成立","偏导数连续⇒可微（充分条件）"],tp:["求全微分","近似计算"],rt:[{id:"f9-1-1-1",n:"偏导数"}],ch:9,sn:"9.1",gn:"全微分"},
{id:"f9-2-1-1",n:"多元链式法则",f:"$$\\frac{dz}{dt} = \\frac{\\partial z}{\\partial x}\\frac{dx}{dt} + \\frac{\\partial z}{\\partial y}\\frac{dy}{dt}$$",im:5,el:"mustknow",tg:["final","pg"],py:"dylsfz",cd:"各偏导数存在且连续",cp:"求复合多元函数的导数",ct:"将全导数表示为对各中间变量的偏导数乘中间变量对最终变量的导数之和。树状图法：所有路径乘积之和。",ex:"路径不能遗漏！区分∂和d。多个中间变量时逐条路径计算。",eg:"z=f(x,y),x=cost,y=sint，dz/dt=f_x·(-sint)+f_y·cost",wr:["路径不能遗漏","区分∂和d","多个中间变量逐条计算"],tp:["复合函数求导","全导数"],rt:[{id:"f9-1-1-1",n:"偏导数"},{id:"f2-2-1-2",n:"链式法则"}],ch:9,sn:"9.2",gn:"链式法则"},
{id:"f9-2-2-1",n:"隐函数求导公式（多元）",f:"$$F(x,y)=0\\Rightarrow\\frac{dy}{dx}=-\\frac{F_x}{F_y},\\;F(x,y,z)=0\\Rightarrow\\frac{\\partial z}{\\partial x}=-\\frac{F_x}{F_z}$$",im:4,el:"core",tg:["final","pg"],py:"dyhsqd",cd:"分母偏导数不为零",cp:"求隐式方程确定的函数的导数",ct:"对F(x,y)=0，dy/dx=-F_x/F_y。三元方程F(x,y,z)=0可确定z=z(x,y)，∂z/∂x=-F_x/F_z。",ex:"步骤：将方程化为F(...)=0→计算偏导数→代入公式。分母偏导数不能为零！公式中的负号不要遗漏。",eg:"x²+y²=1，F=x²+y²-1，F_x=2x，F_y=2y，dy/dx=-x/y",wr:["分母偏导数不能为零","公式中负号不要遗漏","方程先化为F=0"],tp:["隐函数求导"],rt:[{id:"f9-1-1-1",n:"偏导数"}],ch:9,sn:"9.2",gn:"链式法则"},
{id:"f9-3-1-1",n:"方向导数与梯度",f:"$$\\frac{\\partial f}{\\partial l} = f_x\\cos\\alpha + f_y\\cos\\beta = \\nabla f \\cdot l^0$$",im:4,el:"core",tg:["final","pg"],py:"fxds",cd:"f可微，l=(cosα,cosβ)为单位方向向量",cp:"求函数沿任意方向的变化率",ct:"梯度∇f=(f_x,f_y)指向方向导数最大的方向。梯度的模等于最大方向导数。方向导数=梯度在方向上的投影。",ex:"梯度方向是增长最快方向，负梯度方向是下降最快方向。方向导数可以为负表示减小。",eg:"f(x,y)=x²+y²在(1,1)沿(1,0)方向：∇f=(2,2)，∂f/∂l=2",wr:["方向向量必须是单位向量","梯度是增长最快方向","方向导数可为负"],tp:["方向导数","梯度计算"],rt:[{id:"f9-1-1-1",n:"偏导数"}],ch:9,sn:"9.3",gn:"方向导数与梯度"},
{id:"f9-3-1-2",n:"二元函数极值判定",f:"$$A=f_{xx},\\;B=f_{xy},\\;C=f_{yy},\\;AC-B^2>0:\\;A>0\\text{极小},A<0\\text{极大};\\;AC-B^2<0\\text{非极值}$$",im:5,el:"mustknow",tg:["final","pg"],py:"jzpd2",cd:"f_x=f_y=0（驻点），二阶偏导数连续",cp:"判断二元函数驻点是否为极值点",ct:"先求驻点（f_x=f_y=0）→计算A=f_{xx},B=f_{xy},C=f_{yy}→判断AC-B²。正定时A>0极小，A<0极大；负定时非极值（鞍点）；等于0时不确定。",ex:"AC-B²=0时需用其他方法（如定义法）判断。这是多元函数微分学的最核心考点之一。",eg:"f=x²+y²，f_x=2x=0,f_y=2y=0→驻点(0,0)，A=2,B=0,C=2，AC-B²=4>0,A>0→极小值",wr:["先求驻点(f_x=f_y=0)","AC-B²=0时方法失效","鞍点不是极值点"],tp:["求极值","无条件极值"],rt:[{id:"f9-3-1-3",n:"拉格朗日乘数法"}],ch:9,sn:"9.3",gn:"方向导数、梯度、极值"},
{id:"f9-3-1-3",n:"拉格朗日乘数法（条件极值）",f:"$$L(x,y,\\lambda)=f(x,y)+\\lambda\\varphi(x,y),\\;\\nabla L=0$$",im:5,el:"mustknow",tg:["final","pg"],py:"lglrcsf",cd:"φ(x,y)=0为约束条件",cp:"求在约束条件下的极值",ct:"构造拉格朗日函数L=f+λφ，解∇L=0（L_x=L_y=L_λ=0）得驻点，再判断是否为条件极值点。",ex:"步骤：构造L=f+λφ→求偏导数L_x,L_y,L_λ→解方程组→判断极值。可推广到多个约束条件。",eg:"求f=x+y在约束x²+y²=1下的极值。L=x+y+λ(x²+y²-1)，解得极值点(±1/√2,±1/√2)",wr:["约束条件要写为φ=0形式","λ个数的引入对应约束个数","求解后需回代判断极值类型"],tp:["条件极值","拉格朗日乘数法"],rt:[{id:"f9-3-1-2",n:"二元极值判定"}],ch:9,sn:"9.3",gn:"方向导数、梯度、极值"},
{id:"f9-1-1-2",n:"高阶偏导数与混合偏导数",f:"$$f_{xy} = \\frac{\\partial}{\\partial y}\\left(\\frac{\\partial f}{\\partial x}\\right),\\; f_{xy}=f_{yx}\\;(\\text{当}f_{xy},f_{yx}\\text{连续时})$$",im:3,el:"important",tg:["final","pg"],py:"gjpds",cd:"混合偏导数连续时可交换次序",cp:"求二阶及更高阶偏导数",ct:"二阶偏导数：f_{xx}（对x两次）、f_{yy}（对y两次）、f_{xy}（先x后y）、f_{yx}（先y后x）。混合偏导连续⇔相等。",ex:"求导次序在偏导数连续时无关紧要。用于验证函数的偏导数连续性。",eg:"f(x,y)=e^{xy}，f_x=ye^{xy},f_y=xe^{xy},f_{xy}=e^{xy}+xye^{xy}=f_{yx}",wr:["f_{xy}和f_{yx}不一定相等","需要连续性条件保证"],tp:["高阶偏导","混合偏导"],rt:[{id:"f9-1-1-1",n:"偏导数定义"}],ch:9,sn:"9.1",gn:"偏导数"},
{id:"f9-2-3-1",n:"方程组确定的隐函数求导",f:"$$\\begin{cases}F(x,y,u,v)=0\\\\G(x,y,u,v)=0\\end{cases} \\Rightarrow J\\frac{\\partial(u,v)}{\\partial(x,y)}\\neq 0$$",im:3,el:"important",tg:["pg"],py:"fczqhf",cd:"雅可比行列式J=∂(F,G)/∂(u,v)≠0",cp:"求由方程组确定的隐函数的偏导数",ct:"方程组可确定u=u(x,y),v=v(x,y)。对每个方程求偏导，用克莱姆法则解∂u/∂x等。雅可比行列式不为零保证可解。",ex:"步骤：方程组对各变量求偏导→得到关于∂u/∂x,∂v/∂x的线性方程组→解方程组。",eg:"x=ue^v,y=ve^u，求∂u/∂x",wr:["雅可比行列式≠0保证可解","仔细解方程组"],tp:["隐函数组求导"],rt:[{id:"f9-2-2-1",n:"隐函数求导"}],ch:9,sn:"9.2",gn:"隐函数存在定理"},
{id:"f9-1-3-1",n:"二元函数的微分中值定理",f:"$$f(x_0+\\Delta x,y_0+\\Delta y)-f(x_0,y_0)=f_x(\\xi,\\eta)\\Delta x+f_y(\\xi,\\eta)\\Delta y$$",im:2,el:"general",tg:["pg"],py:"eyhswf",cd:"f在闭区域上可微",cp:"建立二元函数增量与偏导数的关系",ct:"一元拉格朗日中值定理的推广。存在(ξ,η)在两点连线上，使得增量=偏导数在该点的线性组合。",ex:"用于证明二元函数的中值性质。与一元类似但条件要求可微（不只是偏导数存在）。",eg:"应用：由|f(P₂)-f(P₁)|≤M(|Δx|+|Δy|)估计函数增量",wr:["可微条件比偏导数存在更强","中值点(ξ,η)未知"],tp:["中值定理","理论证明"],rt:[{id:"f3-1-1-2",n:"拉格朗日中值定理"}],ch:9,sn:"9.1",gn:"中值定理"},

{id:"f10-1-1-1",n:"二重积分定义与计算",f:"$$\\iint_D f(x,y)d\\sigma = \\int_a^b dx\\int_{y_1(x)}^{y_2(x)} f(x,y)dy$$",im:5,el:"mustknow",tg:["final","pg"],py:"ecjfjs",cd:"D可表示为x型或y型区域",cp:"计算曲顶柱体的体积",ct:"二重积分=累次积分（先对一个变量积分再对另一个积分）。x型：外层dx内层dy；y型：外层dy内层dx。",ex:"步骤：画区域→确定积分次序（x型或y型）→确定积分限→依次计算。交换积分次序有时可简化计算。",eg:"∬_D xy dxdy，D:0≤x≤1,0≤y≤x。=∫₀¹dx∫₀ˣ xydy=1/8",wr:["区域描述要准确","积分次序选择影响难度","交换次序时重画区域"],tp:["二重积分计算"],rt:[],ch:10,sn:"10.1",gn:"二重积分"},
{id:"f10-1-1-2",n:"极坐标下二重积分",f:"$$\\iint_D f(x,y)dxdy = \\int_{\\alpha}^{\\beta} d\\theta\\int_{r_1(\\theta)}^{r_2(\\theta)} f(r\\cos\\theta,r\\sin\\theta)r dr$$",im:4,el:"core",tg:["final","pg"],py:"jzbjf",cd:"区域D适合用极坐标描述（圆形、扇形、环形等）",cp:"简化圆形区域上的二重积分",ct:"换元：x=rcosθ,y=rsinθ,dxdy=rdrdθ。特别注意多了一个r因子！圆形、扇形区域使用极坐标能大幅简化。",ex:"步骤：画极坐标下的区域→确定θ范围→确定r范围→代入被积函数（注意乘r）→积分。",eg:"∬_D √(x²+y²)dxdy，D:x²+y²≤1。=∫₀^{2π}dθ∫₀¹ r·rdr=2π/3",wr:["不要忘记雅可比因子r","确定θ和r的范围","被积函数中的x,y要用极坐标表示"],tp:["极坐标二重积分"],rt:[{id:"f10-1-1-1",n:"二重积分定义"}],ch:10,sn:"10.1",gn:"二重积分"},
{id:"f10-2-1-1",n:"三重积分计算",f:"$$\\iiint_\\Omega f(x,y,z)dV = \\int_a^b dx\\int_{y_1(x)}^{y_2(x)} dy\\int_{z_1(x,y)}^{z_2(x,y)} f(x,y,z)dz$$",im:4,el:"core",tg:["final","pg"],py:"scjfjs",cd:"Ω可表示为简单空间区域",cp:"计算空间区域上的三重积分",ct:"三重积分=三次累次积分。柱坐标：x=rcosθ,y=rsinθ,z=z,dV=rdrdθdz。球坐标：x=ρsinφcosθ,y=ρsinφsinθ,z=ρcosφ,dV=ρ²sinφ dρdφdθ。",ex:"柱坐标适合圆柱体区域；球坐标适合球体、锥体区域。注意雅可比因子！",eg:"∭_Ω zdV，Ω:x²+y²+z²≤1（球体）。用球坐标",wr:["注意雅可比因子","选择合适坐标系","三次积分次序影响难度"],tp:["三重积分计算"],rt:[{id:"f10-1-1-2",n:"极坐标二重积分"}],ch:10,sn:"10.2",gn:"三重积分"},
{id:"f10-2-1-2",n:"柱坐标下三重积分",f:"$$\\iiint_\\Omega f dV = \\int_{\\theta_1}^{\\theta_2} d\\theta\\int_{r_1(\\theta)}^{r_2(\\theta)} rdr\\int_{z_1(r,\\theta)}^{z_2(r,\\theta)} f dz$$",im:4,el:"core",tg:["final","pg"],py:"zzbscjf",cd:"Ω适合用柱坐标描述（圆柱、旋转体等）",cp:"简化圆柱形区域上的三重积分",ct:"柱坐标将(x,y)用极坐标表示，z不变。雅可比因子=r。适用于旋转体、圆柱体区域。",ex:"典型应用：圆柱体x²+y²≤R²,0≤z≤H上积分。注意先对z还是对r积分。",eg:"∭_Ω (x²+y²)dV，Ω:x²+y²≤1,0≤z≤2。=∫₀^{2π}dθ∫₀¹r³dr∫₀²dz=π",wr:["不要忘记雅可比因子r","注意积分次序"],tp:["柱坐标三重积分"],rt:[{id:"f10-2-1-1",n:"三重积分计算"}],ch:10,sn:"10.2",gn:"三重积分",pastExam:[{y:2023,t:"考研数学一",f:"高频"},{y:2022,t:"期末",f:"高频"}],examples:[{q:"计算 $$\\iiint_\\Omega \\sqrt{x^2+y^2}dV$$，Ω由x²+y²≤z≤1围成。",a:"用柱坐标：$$\\int_0^{2\\pi}d\\theta\\int_0^1 rdr\\int_{r^2}^1 r dz = 2\\pi\\int_0^1 r^2(1-r^2)dr = \\frac{4\\pi}{15}$$。",an:"柱坐标下z从r²到1，注意雅可比因子r。"}]},
{id:"f10-2-1-3",n:"球坐标下三重积分",f:"$$\\iiint_\\Omega f dV = \\int_{\\theta_1}^{\\theta_2} d\\theta\\int_{\\varphi_1}^{\\varphi_2} \\sin\\varphi d\\varphi\\int_{\\rho_1}^{\\rho_2} f \\rho^2 d\\rho$$",im:4,el:"core",tg:["final","pg"],py:"qzbscjf",cd:"Ω适合用球坐标描述（球体、锥体等）",cp:"简化球形区域上的三重积分",ct:"球坐标：x=ρsinφcosθ,y=ρsinφsinθ,z=ρcosφ。dV=ρ²sinφ dρdφdθ。φ是极角（与z轴夹角），θ是方位角。",ex:"球体x²+y²+z²≤R²：ρ从0到R，φ从0到π，θ从0到2π。锥体注意φ的范围。",eg:"∭_Ω dV，Ω:x²+y²+z²≤R²。=∫₀^{2π}dθ∫₀^π sinφdφ∫₀^R ρ²dρ=4πR³/3",wr:["dV=ρ²sinφ dρdφdθ不能忘","φ和θ的范围","球坐标与直角坐标的转换"],tp:["球坐标三重积分"],rt:[{id:"f10-2-1-1",n:"三重积分计算"}],ch:10,sn:"10.2",gn:"三重积分",pastExam:[{y:2024,t:"考研数学一",f:"高频"}]},
{id:"f10-1-1-3",n:"二重积分交换积分次序",f:"$$\\int_a^b dx\\int_{y_1(x)}^{y_2(x)} fdy = \\int_c^d dy\\int_{x_1(y)}^{x_2(y)} fdx$$",im:4,el:"core",tg:["final","pg"],py:"jfchx",cd:"区域可分别表示为x型和y型",cp:"通过交换积分次序简化二重积分计算",ct:"有时一种次序难以积分，交换次序后可能变得简单。步骤：画区域→确定新的积分限→交换。注意积分限必须用新变量表示。",ex:"例如∫₀¹dx∫ₓ¹ e^{y²}dy无法直接积分，交换次序后∫₀¹dy∫₀ʸ e^{y²}dx可算。",eg:"∫₀¹dx∫ₓ¹ e^{y²}dy=∫₀¹dy∫₀ʸ e^{y²}dx=∫₀¹ ye^{y²}dy=(e-1)/2",wr:["画出积分区域","积分限必须用新变量表示","确保区域描述一致"],tp:["交换积分次序"],rt:[{id:"f10-1-1-1",n:"二重积分定义"}],ch:10,sn:"10.1",gn:"二重积分",pastExam:[{y:2023,t:"考研数学一",f:"高频"},{y:2022,t:"期末",f:"高频"}]},
{id:"f10-1-1-4",n:"二重积分一般换元法",f:"$$\\iint_D f(x,y)dxdy = \\iint_{D'} f[x(u,v),y(u,v)] \\left|\\frac{\\partial(x,y)}{\\partial(u,v)}\\right|dudv$$",im:3,el:"important",tg:["pg"],py:"jfhyf",cd:"变换是一一映射，雅可比行列式不为零",cp:"通过坐标变换简化二重积分",ct:"一般换元法的关键：计算雅可比行列式J=∂(x,y)/∂(u,v)。极坐标是特殊情形（J=r）。换元后需调整积分区域。",ex:"常用于椭圆区域：令x=arcosθ,y=brsinθ，J=abr。将椭圆盘变换为单位圆盘。",eg:"∬_D (x²+y²)dxdy，D:x²/a²+y²/b²≤1。令x=arcosθ,y=brsinθ，J=abr",wr:["雅可比行列式取绝对值","变换必须是一一映射"],tp:["换元积分"],rt:[{id:"f10-1-1-2",n:"极坐标积分"}],ch:10,sn:"10.1",gn:"二重积分"},
{id:"f10-2-1-4",n:"重积分的应用（质心/转动惯量）",f:"$$\\bar{x}=\\frac{\\iiint x\\rho dV}{M},\\; I_x=\\iiint (y^2+z^2)\\rho dV$$",im:3,el:"important",tg:["final","pg"],py:"zxjfyy",cd:"质量分布连续，密度ρ可能是常数或函数",cp:"计算物体的质心、转动惯量等物理量",ct:"质心坐标=质量矩/总质量。转动惯量：绕x轴I_x=∭(y²+z²)ρdV。这些公式将物理量表达为积分形式。",ex:"均匀物体ρ=constant可提到积分号外。对称性可简化计算。",eg:"半径为R的均匀圆盘绕中心轴的转动惯量I_z=MR²/2",wr:["质心与形心的区别（均匀时相同）","转动惯量与转轴有关"],tp:["质心","转动惯量"],rt:[{id:"f10-2-1-1",n:"三重积分"}],ch:10,sn:"10.2",gn:"三重积分"},

{id:"f11-1-1-1",n:"第一类曲线积分",f:"$$\\int_L f(x,y)ds = \\int_a^b f[x(t),y(t)]\\sqrt{[x'(t)]^2+[y'(t)]^2}dt$$",im:4,el:"core",tg:["final","pg"],py:"dylqxjf",cd:"曲线L分段光滑",cp:"计算沿曲线的标量场的积分（如质量、弧长）",ct:"第一类曲线积分（对弧长的积分）无方向性。ds=√(x'²+y'²)dt。用于求曲线质量、重心等。",ex:"步骤：参数化曲线→计算ds→代入被积函数→化为定积分。注意ds不含方向因子。",eg:"∫_L (x+y)ds，L为从(0,0)到(1,1)的直线。x=t,y=t，ds=√2dt，积分=√2∫₀¹2tdt=√2",wr:["参数化要正确","ds=√(x'²+y'²)dt","无方向性"],tp:["曲线积分","弧长积分"],rt:[{id:"f11-1-2-1",n:"第二类曲线积分"}],ch:11,sn:"11.1",gn:"第一类曲线积分"},
{id:"f11-1-2-1",n:"第二类曲线积分",f:"$$\\int_L Pdx+Qdy = \\int_a^b [P x'(t)+Q y'(t)]dt$$",im:4,el:"core",tg:["final","pg"],py:"delqxjf",cd:"曲线L分段光滑且定向",cp:"计算力场沿曲线做功",ct:"第二类曲线积分（对坐标的积分）有方向性。反向积分变号。物理意义：力F=(P,Q)沿曲线L做的功。",ex:"步骤：参数化曲线（注意方向）→代入dx=x'(t)dt,dy=y'(t)dt→化为定积分。",eg:"∫_L xdy-ydx，L为从(0,0)到(1,0)再到(1,1)的折线",wr:["有方向性（反向变号）","注意dx,dy的替换","曲线方向与参数对应"],tp:["做功积分","曲线积分"],rt:[{id:"f11-2-1-1",n:"格林公式"}],ch:11,sn:"11.1",gn:"第二类曲线积分"},
{id:"f11-2-1-1",n:"格林公式",f:"$$\\oint_L Pdx+Qdy = \\iint_D \\left(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}\\right)dxdy$$",im:5,el:"mustknow",tg:["final","pg"],py:"glgs",cd:"L为闭曲线正向（逆时针），D是L所围区域",cp:"将闭曲线积分转化为二重积分",ct:"格林公式建立了闭曲线积分与二重积分的联系。是平面上曲线积分与路径无关条件的理论基础。",ex:"正向：沿L行走时区域D在左手边（通常取逆时针）。∂Q/∂x=∂P/∂y时，闭曲线积分为零。",eg:"用格林公式计算∫_L (x²-y)dx+(y²+x)dy，L:x²+y²=1正向。转为∬_D 2dxdy=2π",wr:["L必须是闭曲线","注意正向（逆时针）","单连通区域才成立"],dr:"由二重积分的定义和微积分基本定理推导",tp:["格林公式","闭曲线积分"],rt:[{id:"f11-1-2-1",n:"第二类曲线积分"},{id:"f11-2-2-1",n:"高斯公式"}],ch:11,sn:"11.2",gn:"格林公式"},
{id:"f11-2-2-1",n:"高斯公式（散度定理）",f:"$$\\oiint_S Pdydz+Qdzdx+Rdxdy = \\iiint_\\Omega \\left(\\frac{\\partial P}{\\partial x}+\\frac{\\partial Q}{\\partial y}+\\frac{\\partial R}{\\partial z}\\right)dV$$",im:5,el:"mustknow",tg:["final","pg"],py:"gsgs",cd:"S为闭曲面外侧，Ω是S所围空间区域",cp:"将闭曲面积分转化为三重积分",ct:"高斯公式是格林公式在三维空间的推广。散度divF=∂P/∂x+∂Q/∂y+∂R/∂z。外侧指法向量指向外部。",ex:"物理意义：闭曲面的通量=内部源的总发散量。divF>0表示该点有\"源\"，divF<0表示有\"汇\"。",eg:"用高斯公式计算∯_S xdydz+ydzdx+zdxdy，S:x²+y²+z²=1外侧。=∭_Ω 3dV=3·4π/3=4π",wr:["S必须是闭曲面","注意外侧方向","被积函数是散度"],dr:"由三重积分的定义和散度概念推导",tp:["高斯公式","曲面积分"],rt:[{id:"f11-2-1-1",n:"格林公式"},{id:"f11-2-3-1",n:"斯托克斯公式"}],ch:11,sn:"11.2",gn:"高斯公式"},
{id:"f11-2-3-1",n:"斯托克斯公式",f:"$$\\oint_L Pdx+Qdy+Rdz = \\iint_S \\begin{vmatrix}dydz&dzdx&dxdy\\\\\\frac{\\partial}{\\partial x}&\\frac{\\partial}{\\partial y}&\\frac{\\partial}{\\partial z}\\\\P&Q&R\\end{vmatrix}$$",im:4,el:"core",tg:["final","pg"],py:"stksgs",cd:"L为有向闭曲线，S是以L为边界的有向曲面（右手法则）",cp:"将空间闭曲线积分转化为曲面积分",ct:"斯托克斯公式是格林公式在空间曲线上的推广。旋度rotF=∇×F。物理意义：环流量=旋度的通量。",ex:"右手法则：右手四指沿L方向，拇指所指为S的法向。常用于计算空间闭曲线积分和判断路径无关性（旋度为零→积分与路径无关）。",eg:"用斯托克斯公式计算空间闭曲线积分",wr:["L和S的方向配合（右手法则）","行列式计算要仔细","旋度为零时积分与路径无关"],tp:["斯托克斯公式","空间曲线积分"],rt:[{id:"f11-2-1-1",n:"格林公式"},{id:"f11-2-2-1",n:"高斯公式"}],ch:11,sn:"11.2",gn:"斯托克斯公式"},
{id:"f11-1-1-2",n:"第一类曲面积分",f:"$$\\iint_S f(x,y,z)dS = \\iint_{D_{xy}} f[x,y,z(x,y)]\\sqrt{1+z_x^2+z_y^2}dxdy$$",im:3,el:"important",tg:["final","pg"],py:"dylqmjf",cd:"曲面S光滑，z=z(x,y)定义在投影区域D_xy上",cp:"计算曲面上的标量积分（如质量、面积）",ct:"第一类曲面积分（对面积的积分）无方向性。dS=√(1+z_x²+z_y²)dxdy。用于求曲面质量、表面积等。",ex:"计算曲面面积：A=∬_S dS。投影到不同坐标面公式类似。",eg:"求曲面z=xy在x²+y²≤1上的面积：A=∬_D √(1+x²+y²)dxdy",wr:["注意投影面选择","dS=√(1+z_x²+z_y²)dxdy"],tp:["曲面积分","曲面面积"],rt:[{id:"f11-1-1-1",n:"第一类曲线积分"},{id:"f11-2-2-1",n:"高斯公式"}],ch:11,sn:"11.2",gn:"第一类曲面积分"},
{id:"f11-1-2-2",n:"第二类曲面积分（对坐标的积分）",f:"$$\\iint_S Pdydz+Qdzdx+Rdxdy = \\pm\\iint_{D_{xy}} R[x,y,z(x,y)]dxdy$$",im:3,el:"important",tg:["final","pg"],py:"delqmjf",cd:"曲面S有向（分上/下侧，前/后侧等）",cp:"计算向量场通过曲面的通量",ct:"第二类曲面积分有方向：取上侧取+，下侧取-。物理意义：流量（通量）。常结合高斯公式计算闭曲面通量。",ex:"符号取决于法向量方向。上侧（法向量与z轴方向一致）取+；下侧取-。",eg:"∬_S zdxdy，S为平面z=0（上侧），结果为0",wr:["注意曲面的侧（方向）","符号由法向量方向决定"],tp:["曲面积分","通量计算"],rt:[{id:"f11-2-2-1",n:"高斯公式"}],ch:11,sn:"11.2",gn:"第二类曲面积分",pastExam:[{y:2024,t:"考研数学一",f:"高频"}]},
{id:"f11-2-1-2",n:"积分与路径无关条件",f:"$$\\frac{\\partial Q}{\\partial x}=\\frac{\\partial P}{\\partial y} \\iff \\oint_L Pdx+Qdy=0 \\iff Pdx+Qdy\\text{是全微分}$$",im:4,el:"core",tg:["final","pg"],py:"jfylj",cd:"D是单连通区域，P,Q有连续偏导数",cp:"判断第二类曲线积分是否与路径无关",ct:"三个等价条件：偏导数相等⇔闭曲线积分为零⇔表达式是全微分。满足时积分只与起点终点有关。",ex:"求原函数u(x,y)使du=Pdx+Qdy：∂u/∂x=P,∂u/∂y=Q。可分别积分求u。",eg:"验证P=y,Q=x，∂Q/∂x=∂P/∂y=1，积分与路径无关",wr:["必须单连通区域","三个条件等价"],tp:["路径无关性"],rt:[{id:"f11-2-1-1",n:"格林公式"}],ch:11,sn:"11.2",gn:"格林公式",pastExam:[{y:2023,t:"考研数学一",f:"高频"},{y:2022,t:"期末",f:"高频"}]},
{id:"f11-2-2-2",n:"散度与旋度",f:"$$\\text{div}\\vec{F}=\\frac{\\partial P}{\\partial x}+\\frac{\\partial Q}{\\partial y}+\\frac{\\partial R}{\\partial z},\\;\\text{rot}\\vec{F}=\\nabla\\times\\vec{F}$$",im:3,el:"important",tg:["final","pg"],py:"sdyxd",cd:"向量场具有连续偏导数",cp:"描述向量场的局部性质",ct:"散度divF：衡量点处的\"源\"强度，正为源负为汇。旋度rotF：衡量点处的旋转趋势。无旋场（rotF=0）⇔保守场。",ex:"div(rotF)=0恒成立（旋度的散度为零）。div(gradφ)=∇²φ（拉普拉斯算子）。",eg:"F=(x,y,z)，divF=3，rotF=0（无旋场）",wr:["div和rot的物理意义","div(rot F)=0恒成立"],tp:["散度旋度计算"],rt:[{id:"f11-2-2-1",n:"高斯公式"},{id:"f11-2-3-1",n:"斯托克斯公式"}],ch:11,sn:"11.2",gn:"高斯公式与散度"},
{id:"f11-1-2-3",n:"全微分求原函数",f:"$$du = Pdx+Qdy \\Rightarrow u(x,y)=\\int_{x_0}^x P(t,y_0)dt+\\int_{y_0}^y Q(x,t)dt+C$$",im:3,el:"important",tg:["final","pg"],py:"qwfqyhs",cd:"∂P/∂y=∂Q/∂x（全微分的必要条件，单连通区域为充要条件）",cp:"由全微分表达式还原原函数",ct:"方法一：折线积分法（x₀→x沿水平线，再沿竖直线到y）。方法二：分别积分法。方法三：凑微分法。",ex:"选择简单的起点（如(0,0)）可简化计算。路径无关时任意路径均可。",eg:"du=(2x+y)dx+(x+2y)dy，u=x²+xy+y²+C",wr:["先验证全微分条件","积分路径可任选","积分常数C"],tp:["求原函数"],rt:[{id:"f11-2-1-2",n:"路径无关条件"}],ch:11,sn:"11.1",gn:"曲线积分与路径无关"},
{id:"f4-6-1-1",n:"凑微分常见形式",f:"$$\\begin{aligned}&e^xdx=d(e^x),\\;\\sin xdx=-d(\\cos x),\\;\\cos xdx=d(\\sin x)\\\\&\\frac{1}{x}dx=d(\\ln|x|),\\;\\frac{1}{1+x^2}dx=d(\\arctan x),\\;\\frac{1}{\\sqrt{1-x^2}}dx=d(\\arcsin x)\\end{aligned}$$",im:5,el:"mustknow",tg:["final","pg"],py:"cdfjcdxs",cd:"基本初等函数的微分",cp:"凑微分法（第一换元法）的基础",ct:"凑微分法的核心：将被积表达式凑成f(φ(x))φ'(x)dx=f(u)du的形式。熟记常见凑微分形式是积分的基础。",ex:"∫f(ax+b)dx=(1/a)∫f(u)du（令u=ax+b）。∫xⁿf(xⁿ⁺¹)dx=(1/(n+1))∫f(u)du。",eg:"∫cos(3x+1)dx=(1/3)sin(3x+1)+C",wr:["凑微分方向要正确","注意系数调整"],tp:["凑微分","第一换元法"],rt:[{id:"f4-2-1-1",n:"第一换元法"}],ch:4,sn:"4.2",gn:"换元积分法",pastExam:[{y:2024,t:"考研数学",f:"高频"}]},
{id:"f4-3-1-2",n:"分部积分列表法",f:"$$\\int u\\,dv = uv - \\int v\\,du \\quad \\text{列表法：}u\\text{反复求导},\\;dv\\text{反复积分}$$",im:3,el:"important",tg:["final","pg"],py:"fbjflbfa",cd:"适用于u的导数最终为零或循环",cp:"简化分部积分的重复计算",ct:"列表法：左列对u反复求导，右列对dv反复积分，交叉相乘交替符号求和。适用于多项式乘指数/三角函数。",ex:"左列导数出现0时停止；出现循环时解方程。符号规律：+,-,+,-,...",eg:"∫x²eˣdx：列表u=x²→2x→2→0，dv=eˣdx→eˣ→eˣ→eˣ，结果=x²eˣ-2xeˣ+2eˣ+C",wr:["符号交替要正确","循环时列方程求解"],tp:["分部积分","列表法"],rt:[{id:"f4-3-1-1",n:"分部积分法"}],ch:4,sn:"4.3",gn:"分部积分法"},
{id:"f4-3-2-1",n:"Wallis递推公式",f:"$$I_n=\\int_0^{\\pi/2}\\sin^n x\\,dx=\\frac{n-1}{n}I_{n-2},\\;I_0=\\frac{\\pi}{2},\\;I_1=1$$",im:4,el:"core",tg:["final","pg"],py:"wallistgfa",cd:"n为非负整数",cp:"计算sin^n或cos^n的定积分递推",ct:"I_n=((n-1)/n)·I_{n-2}。偶数：I_{2m}=((2m-1)!!/(2m)!!)·π/2；奇数：I_{2m+1}=((2m)!!/(2m+1)!!)。sin和cos的递推结果相同。",ex:"∫₀^{π/2}sinⁿxdx=∫₀^{π/2}cosⁿxdx=Iₙ。牢记I₀=π/2和I₁=1两个初值。",eg:"∫₀^{π/2}sin⁴xdx=(3/4)(1/2)(π/2)=3π/16",wr:["sin和cos的递推结果相同","区分奇偶n的公式"],tp:["Wallis公式","递推积分"],rt:[{id:"f5-3-3-1",n:"定积分递推"}],ch:4,sn:"4.3",gn:"分部积分法",pastExam:[{y:2023,t:"考研数学",f:"中频"}]},
{id:"f4-6-2-1",n:"有理函数部分分式分解",f:"$$\\frac{P(x)}{Q(x)}=\\sum\\frac{A_i}{(x-a_i)^{k_i}}+\\sum\\frac{B_jx+C_j}{(x^2+p_jx+q_j)^{l_j}}$$",im:4,el:"core",tg:["final","pg"],py:"ylhsbffs",cd:"P(x)次数<Q(x)次数（否则先除）",cp:"将有理分式分解为可积的简单分式",ct:"分解规则：单实根a→A/(x-a)；k重实根→ΣAᵢ/(x-a)ⁱ；单共轭复根→(Bx+C)/(x²+px+q)；l重共轭复根→Σ(Bⱼx+Cⱼ)/(x²+px+q)ʲ。",ex:"先对Q(x)因式分解，再设待定系数，通分比较分子确定系数。",eg:"1/((x-1)(x+2))=A/(x-1)+B/(x+2)，解得A=1/3,B=-1/3",wr:["分子次数≥分母先做多项式除法","复根对应二次因式"],tp:["有理函数积分","部分分式"],rt:[{id:"f4-2-1-1",n:"第一换元法"}],ch:4,sn:"4.4",gn:"有理函数积分",pastExam:[{y:2024,t:"考研数学",f:"中频"}]},
{id:"f4-4-2-1",n:"无理函数积分（三角换元）",f:"$$\\begin{aligned}&\\sqrt{a^2-x^2}:x=a\\sin t\\\\&\\sqrt{a^2+x^2}:x=a\\tan t\\\\&\\sqrt{x^2-a^2}:x=a\\sec t\\end{aligned}$$",im:4,el:"core",tg:["final","pg"],py:"wxhsjfjhs",cd:"被积函数含√(a²±x²)或√(x²-a²)",cp:"通过三角代换去掉根号",ct:"选择换元：√(a²-x²)→x=asint（sint=√/a）；√(a²+x²)→x=atant；√(x²-a²)→x=asect。换元后利用三角恒等式去根号。",ex:"换元后注意回代。也可用双曲函数换元。",eg:"∫√(4-x²)dx，令x=2sint，得∫4cos²tdt=2t+sin2t+C=2arcsin(x/2)+x√(4-x²)/2+C",wr:["换元后要回代原变量","根号前的符号"],tp:["三角换元","无理函数积分"],rt:[{id:"f4-2-2-1",n:"第二换元法"}],ch:4,sn:"4.4",gn:"有理函数积分",pastExam:[{y:2023,t:"考研数学",f:"高频"}]},
{id:"f4-6-3-1",n:"万能代换",f:"$$t=\\tan\\frac{x}{2},\\;\\sin x=\\frac{2t}{1+t^2},\\;\\cos x=\\frac{1-t^2}{1+t^2},\\;dx=\\frac{2}{1+t^2}dt$$",im:3,el:"important",tg:["final","pg"],py:"wnhdsf",cd:"三角有理式R(sinx,cosx)",cp:"将三角有理式转化为有理函数积分",ct:"万能代换t=tan(x/2)可将任何三角有理式∫R(sinx,cosx)dx转化为有理函数积分。万能但计算量大，优先考虑其他方法。",ex:"优先尝试：恒等变形、凑微分、特殊代换。万能代换是最后手段。",eg:"∫dx/(1+sinx)，万能代换得∫2dt/(1+t)²=-2/(1+t)+C=-2/(1+tan(x/2))+C",wr:["计算量较大","优先尝试其他简化方法"],tp:["三角有理式","万能代换"],rt:[{id:"f4-4-1-1",n:"有理函数部分分式"}],ch:4,sn:"4.5",gn:"三角有理式积分"},
{id:"f4-5-2-1",n:"三角有理式积分策略",f:"$$\\begin{aligned}&R(\\sin x,\\cos x)\\xrightarrow{\\text{奇偶性}}\\text{特殊代换}\\\\&f(-\\sin x,\\cos x)=-f\\Rightarrow t=\\cos x\\\\&f(\\sin x,-\\cos x)=-f\\Rightarrow t=\\sin x\\end{aligned}$$",im:3,el:"important",tg:["final","pg"],py:"sjylsjfcl",cd:"被积函数为三角有理式",cp:"根据对称性选择最优代换",ct:"策略优先级：1.恒等变形化简；2.若f(-sinx,cosx)=-f(sin x,cosx)则令t=cosx；3.若f(sinx,-cosx)=-f则令t=sinx；4.若都满足（全偶）则t=tan x；5.万能代换t=tan(x/2)。",ex:"灵活选择代换可大幅减少计算量。注意代换的适用条件。",eg:"∫sin³xcos²xdx：关于sinx为奇→令t=cosx",wr:["先检查奇偶性再选代换","万能代换是最后手段"],tp:["三角积分策略"],rt:[{id:"f4-6-3-1",n:"万能代换"}],ch:4,sn:"4.5",gn:"三角有理式积分"},
{id:"f4-3-2-2",n:"三角换元总结表",f:"$$\\begin{aligned}&\\int R(x,\\sqrt{a^2-x^2})dx \\Rightarrow x=a\\sin t\\\\&\\int R(x,\\sqrt{x^2+a^2})dx \\Rightarrow x=a\\tan t\\\\&\\int R(x,\\sqrt{x^2-a^2})dx \\Rightarrow x=a\\sec t\\end{aligned}$$",im:3,el:"important",tg:["final","pg"],py:"sjhyzjb",cd:"含二次根式的无理积分",cp:"系统化处理含根号的积分",ct:"选择依据：根号内a²-x²用正弦；x²+a²用正切；x²-a²用正割。也可用双曲函数：√(x²+a²)用x=asht，√(x²-a²)用x=acht。",ex:"换元时注意新变量的取值范围，保证根号前符号正确。",eg:"∫dx/√(x²+a²)，令x=atant，结果=ln|x+√(x²+a²)|+C",wr:["回代时用辅助三角形","根号符号不能错"],tp:["三角换元","双曲换元"],rt:[{id:"f4-4-2-1",n:"三角换元"}],ch:4,sn:"4.3",gn:"分部积分法"},
{id:"f5-2-1-4",n:"定积分的线性性质",f:"$$\\int_a^b[\\alpha f(x)+\\beta g(x)]dx=\\alpha\\int_a^b f(x)dx+\\beta\\int_a^b g(x)dx$$",im:4,el:"core",tg:["final","pg"],py:"djfdxxxz",cd:"f,g在[a,b]可积，α,β为常数",cp:"定积分的线性运算",ct:"定积分保持线性：和的积分=积分的和，常数可提出。这是定积分最基本的性质之一，用于拆分复杂积分。",ex:"常与积分区间可加性配合使用：∫ₐᵇ=∫ₐᶜ+∫ᶜᵇ。",eg:"∫₀¹(2x²+3x)dx=2·(1/3)+3·(1/2)=13/6",wr:["常数可以提出","函数和可拆分"],tp:["定积分性质"],rt:[{id:"f5-1-1-2",n:"定积分性质"}],ch:5,sn:"5.2",gn:"定积分性质"},
{id:"f5-2-2-2",n:"施瓦茨积分不等式",f:"$$\\left[\\int_a^b f(x)g(x)dx\\right]^2 \\le \\int_a^b f^2(x)dx \\cdot \\int_a^b g^2(x)dx$$",im:3,el:"important",tg:["final","pg"],py:"swzjfbdss",cd:"f,g在[a,b]上可积",cp:"估计积分乘积的上界",ct:"施瓦茨不等式（柯西-施瓦茨）：积分的平方≤平方积分的乘积。等号成立当且仅当f,g线性相关（f=kg）。用于证明积分不等式。",ex:"取g=1可得：[∫fdx]²≤(b-a)∫f²dx，即积分平均≤均方根。",eg:"证明∫₀¹√(x·x²)dx ≤ √(∫₀¹xdx · ∫₀¹x²dx)",wr:["等号条件是f=kg","用于估值不等式"],tp:["积分不等式","施瓦茨不等式"],rt:[{id:"f5-1-1-2",n:"定积分性质"}],ch:5,sn:"5.2",gn:"定积分性质",pastExam:[{y:2024,t:"考研数学",f:"中频"}]},
{id:"f5-2-2-3",n:"积分第二中值定理",f:"$$\\int_a^b f(x)g(x)dx = f(a)\\int_a^\\xi g(x)dx + f(b)\\int_\\xi^b g(x)dx,\\;\\xi\\in[a,b]$$",im:2,el:"general",tg:["pg"],py:"jfdezdl",cd:"f单调，g可积",cp:"分离两个函数的积分估计",ct:"当f单调时，存在ξ使积分分离为两段。特别地，若f单调递减非负，则∫fg=f(a)∫ₐᵍg。用于估计含单调因子的积分。",ex:"比积分第一中值定理条件更一般，但结论涉及两段积分。",eg:"估计∫ₐᵇf(x)sin(x)dx其中f单调递减",wr:["f必须单调","ξ的具体位置未知"],tp:["积分中值定理","积分估计"],rt:[{id:"f5-2-1-3",n:"积分中值定理"}],ch:5,sn:"5.2",gn:"定积分性质"},
{id:"f5-5-1-1",n:"定积分换元法",f:"$$\\int_a^b f(x)dx = \\int_\\alpha^\\beta f[\\varphi(t)]\\varphi'(t)dt,\\; x=\\varphi(t),\\;\\varphi(\\alpha)=a,\\varphi(\\beta)=b$$",im:5,el:"mustknow",tg:["final","pg"],py:"djfhff",cd:"φ在[α,β]上单调且连续可导，φ(α)=a,φ(β)=b",cp:"通过变量代换计算定积分",ct:"与不定积分换元法的区别：定积分换元时积分上下限要随之改变，无需回代原变量。φ必须单调（保证可逆）。",ex:"注意换元后上下限的对应关系：a→α，b→β。若φ单调递增则α<β，递减则α>β。",eg:"∫₀⁴dx/(1+√x)，令√x=t，x=t²，dx=2tdt，得∫₀²2t/(1+t)dt=2(2-ln3)",wr:["换元必换限","φ必须单调连续可导"],tp:["定积分换元","变量代换"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:5,sn:"5.3",gn:"定积分计算",pastExam:[{y:2024,t:"考研数学",f:"高频"}]},
{id:"f5-3-2-1",n:"定积分分部积分法",f:"$$\\int_a^b u\\,dv = [uv]_a^b - \\int_a^b v\\,du$$",im:5,el:"mustknow",tg:["final","pg"],py:"djffbff",cd:"u,v在[a,b]上有连续导数",cp:"计算定积分的分部积分",ct:"与不定积分类似，但需计算uv在端点的值[u v]ₐᵇ。选择u和dv的原则与不定积分相同：反三角、对数、幂函数、三角、指数（反对幂三指）。",ex:"定积分分部积分无需求v的不定积分常数，直接用[uv]ₐᵇ。",eg:"∫₀¹x eˣdx=[xeˣ]₀¹-∫₀¹eˣdx=e-(e-1)=1",wr:["边界值的计算","u和dv的选择"],tp:["定积分分部积分"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:5,sn:"5.3",gn:"定积分计算",pastExam:[{y:2023,t:"考研数学",f:"高频"}]},
{id:"f5-3-1-2",n:"奇偶函数定积分",f:"$$\\begin{aligned}&f\\text{奇}:\\int_{-a}^a f(x)dx=0\\\\&f\\text{偶}:\\int_{-a}^a f(x)dx=2\\int_0^a f(x)dx\\end{aligned}$$",im:5,el:"mustknow",tg:["final","pg"],py:"johsdjf",cd:"f在[-a,a]上可积且具有奇偶性",cp:"利用对称性简化定积分",ct:"奇函数在对称区间积分为0；偶函数在对称区间积分=2倍半区间积分。这是最常用的定积分简化技巧之一。",ex:"务必先检查积分区间是否对称和函数的奇偶性。奇偶性可单独对某个变量判断。",eg:"∫₋₁¹x³cos²xdx=0（x³是奇函数，cos²x是偶函数，乘积为奇）",wr:["区间必须对称","逐变量判断奇偶性"],tp:["奇偶性","对称区间"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:5,sn:"5.3",gn:"定积分计算",pastExam:[{y:2024,t:"考研数学",f:"高频"}]},
{id:"f5-5-2-1",n:"周期函数定积分",f:"$$f(x+T)=f(x)\\Rightarrow\\int_a^{a+T}f(x)dx=\\int_0^T f(x)dx$$",im:4,el:"core",tg:["final","pg"],py:"zqhshdjf",cd:"f以T为周期且可积",cp:"利用周期性简化定积分",cp:"利用周期性简化定积分",ct:"周期函数在任意长度为T的区间上积分相等。推论：∫₀^{nT}f(x)dx=n∫₀ᵀf(x)dx。积分区间可平移整数倍周期。",ex:"常用于sin、cos等三角函数的积分。区间长度为周期整数倍时特别简便。",eg:"∫₀^{2π}sin³xdx=∫₀^{2π}sinx(1-cos²x)dx=0（周期2π的奇函数）",wr:["必须是完整周期","周期T的确定"],tp:["周期性","定积分简化"],rt:[{id:"f5-3-1-2",n:"奇偶函数定积分"}],ch:5,sn:"5.3",gn:"定积分计算",pastExam:[{y:2023,t:"考研数学",f:"中频"}]},
{id:"f5-3-3-2",n:"华里士公式（Wallis）",f:"$$\\int_0^{\\pi/2}\\sin^n x\\,dx=\\int_0^{\\pi/2}\\cos^n x\\,dx=\\begin{cases}\\frac{(n-1)!!}{n!!}\\cdot\\frac{\\pi}{2},&n\\text{偶}\\\\\\frac{(n-1)!!}{n!!},&n\\text{奇}\\end{cases}$$",im:4,el:"core",tg:["final","pg"],py:"hlgswls",cd:"n为正整数",cp:"直接计算sin^n和cos^n在[0,π/2]上的积分",ct:"偶数n=2m：((2m-1)!!/(2m)!!)·π/2；奇数n=2m+1：((2m)!!/(2m+1)!!)。双阶乘n!!=n·(n-2)·...·2或1。是Wallis递推的闭式表达。",ex:"常出现在旋转体体积、曲面积分等计算中。0!!=1,(-1)!!=1。",eg:"∫₀^{π/2}sin⁵xdx=(4·2)/(5·3·1)=8/15",wr:["双阶乘的计算","区分奇偶n"],tp:["Wallis公式","定积分"],rt:[{id:"f4-3-2-1",n:"Wallis递推"}],ch:5,sn:"5.3",gn:"定积分计算",pastExam:[{y:2024,t:"考研数学",f:"高频"}]},
{id:"f5-4-2-1",n:"瑕积分审敛法（比较法）",f:"$$\\text{若}\\left|\\frac{f(x)}{g(x)}\\right|\\le M,\\;g\\text{收敛}\\Rightarrow\\int f\\text{收敛}$$",im:3,el:"important",tg:["pg"],py:"xjfslfjbf",cd:"f,g在(a,b]上连续，x=a为瑕点",cp:"判断瑕积分的收敛性",ct:"比较审敛法：若|f(x)|≤Mg(x)且∫g收敛，则∫|f|收敛（绝对收敛）。常用比较标准：∫ₐᵇdx/(x-a)^p，p<1收敛，p≥1发散。",ex:"找合适的比较函数g是关键。通常取g(x)=C/(x-a)^p。",eg:"∫₀¹dx/√(x(1+x))：x=0瑕点，与1/√x比较（p=1/2<1）收敛",wr:["瑕点的正确识别","比较函数的选取"],tp:["瑕积分","审敛法"],rt:[{id:"f5-4-1-1",n:"无穷限积分"}],ch:5,sn:"5.4",gn:"反常积分"},
{id:"f5-4-2-2",n:"瑕积分审敛法（极限法）",f:"$$\\lim_{x\\to a^+}\\frac{|f(x)|}{1/(x-a)^p}=\\begin{cases}0,\\;p<1\\text{收敛}\\\\c\\ne0,\\;p<1\\text{收敛}\\\\\\infty,\\;p\\ge1\\text{发散}\\end{cases}$$",im:3,el:"important",tg:["pg"],py:"xjfslfjf",cd:"f在(a,b]连续，x=a为瑕点",cp:"通过极限判断瑕积分收敛性",ct:"极限审敛法：计算lim(x→a⁺)|f(x)|(x-a)^p。若极限为非零有限值，则p<1时收敛，p≥1时发散。若极限为0且p<1则收敛。",ex:"本质是比较法的极限形式，更便于操作。",eg:"∫₀¹dx/(x·lnx)：x=0和x=1都是瑕点，需分别判断",wr:["多个瑕点要分开判断","p值的确定"],tp:["瑕积分","极限审敛法"],rt:[{id:"f5-4-2-1",n:"瑕积分比较法"}],ch:5,sn:"5.4",gn:"反常积分"},
{id:"f6-1-1-5",n:"平行截面体体积",f:"$$V=\\int_a^b A(x)\\,dx$$",im:4,el:"core",tg:["final","pg"],py:"pxjmttj",cd:"已知立体垂直于x轴的截面面积A(x)",cp:"计算已知截面面积的立体体积",ct:"若立体在x=a和x=b之间，且垂直于x轴的截面面积为A(x)，则体积V=∫ₐᵇA(x)dx。这是求体积的通用方法。",ex:"旋转体是特例：A(x)=πf²(x)。其他截面如三角形、正方形等。",eg:"截面为正方形（边长2√x）的立体在x∈[0,1]：V=∫₀¹4x dx=2",wr:["截面面积函数的确定","截面方向的选择"],tp:["截面法","体积计算"],rt:[{id:"f6-1-1-2",n:"旋转体体积"}],ch:6,sn:"6.1",gn:"面积与体积",pastExam:[{y:2024,t:"考研数学",f:"中频"}]},
{id:"f6-1-1-6",n:"极坐标下面积",f:"$$A=\\frac{1}{2}\\int_\\alpha^\\beta r^2(\\theta)\\,d\\theta$$",im:4,el:"core",tg:["final","pg"],py:"jzbmxjmj",cd:"曲线r=r(θ)在θ∈[α,β]间的扇形",cp:"计算极坐标曲线围成的面积",ct:"极坐标面积公式：扇形面积=(1/2)∫r²(θ)dθ。这是极坐标下面积的基本公式，源于扇形面积=(1/2)r²θ的积分推广。",ex:"封闭曲线：α=0,β=2π。注意r≥0的条件。两曲线之间面积=(1/2)∫(r₂²-r₁²)dθ。",eg:"心形线r=a(1+cosθ)面积=(1/2)∫₀^{2π}a²(1+cosθ)²dθ=3πa²/2",wr:["1/2不要忘","θ的范围要正确"],tp:["极坐标面积","扇形面积"],rt:[{id:"f6-1-1-1",n:"曲边梯形面积"}],ch:6,sn:"6.1",gn:"面积与体积",pastExam:[{y:2023,t:"考研数学",f:"高频"}]},
{id:"f6-1-3-1",n:"旋转曲面面积",f:"$$S=2\\pi\\int_a^b |y|\\sqrt{1+[y'(x)]^2}\\,dx$$",im:4,el:"core",tg:["final","pg"],py:"xzqmmj",cd:"曲线y=f(x)在[a,b]上绕x轴旋转",cp:"计算旋转曲面的表面积",ct:"旋转曲面面积=2π∫|y|·ds，其中ds=√(1+y'²)dx为弧长微元。绕x轴用|y|作半径，绕y轴用|x|作半径。",ex:"参数方程：S=2π∫|y(t)|√(x'²+y'²)dt。极坐标：S=2π∫|r sinθ|√(r²+r'²)dθ。",eg:"y=x²在[0,1]绕x轴：S=2π∫₀¹x²√(1+4x²)dx",wr:["弧长微元ds的形式","半径的确定"],tp:["旋转曲面","表面积"],rt:[{id:"f6-1-3-3",n:"弧长公式"}],ch:6,sn:"6.1",gn:"弧长与表面积",pastExam:[{y:2024,t:"考研数学",f:"中频"}]},
{id:"f6-1-3-2",n:"形心（重心）公式",f:"$$\\bar{x}=\\frac{\\int_a^b x f(x)dx}{\\int_a^b f(x)dx},\\;\\bar{y}=\\frac{\\int_a^b \\frac{1}{2}f^2(x)dx}{\\int_a^b f(x)dx}$$",im:3,el:"important",tg:["final","pg"],py:"xzgsgs",cd:"均匀平板由y=f(x)和x轴围成",cp:"计算平面图形的形心坐标",cp:"计算平面图形的形心坐标",ct:"形心（重心）=一阶矩/面积。x̄=∫xf(x)dx/∫f(x)dx，ȳ=(1/2)∫f²(x)dx/∫f(x)dx。对y轴旋转可用Pappus定理：V=2πx̄·A。",ex:"Pappus定理：旋转体体积=截面面积×形心经过的路程=2πx̄·A。",eg:"三角形{(x,y):0≤y≤x,0≤x≤1}的形心=(2/3,1/3)",wr:["分子是静矩分母是面积","Pappus定理的应用"],tp:["形心","重心","Pappus定理"],rt:[{id:"f6-1-1-1",n:"曲边梯形面积"}],ch:6,sn:"6.1",gn:"弧长与表面积"},
{id:"f6-1-3-3",n:"弧长公式（参数方程）",f:"$$s=\\int_\\alpha^\\beta\\sqrt{[x'(t)]^2+[y'(t)]^2}\\,dt$$",im:4,el:"core",tg:["final","pg"],py:"hcglcssfc",cd:"曲线x=x(t),y=y(t)，t∈[α,β]且导数连续",cp:"计算平面曲线的弧长",ct:"弧长=∫ds。三种形式：参数方程ds=√(x'²+y'²)dt；直角坐标ds=√(1+y'²)dx；极坐标ds=√(r²+r'²)dθ。",ex:"弧长与参数选取无关。注意弧长微元ds的统一形式。",eg:"星形线x=a cos³t,y=a sin³t弧长=∫₀^{2π}3a|sin t cos t|dt=6a",wr:["三种形式要会灵活转换","弧长始终为正"],tp:["弧长","参数方程"],rt:[{id:"f5-2-1-1",n:"牛顿-莱布尼茨公式"}],ch:6,sn:"6.1",gn:"弧长与表面积",pastExam:[{y:2023,t:"考研数学",f:"高频"}]},
{id:"f6-2-1-1",n:"函数均方根",f:"$$f_{rms}=\\sqrt{\\frac{1}{b-a}\\int_a^b f^2(x)dx}$$",im:2,el:"general",tg:["pg"],py:"hjfg",cd:"f在[a,b]上可积",cp:"计算函数的均方根值",ct:"均方根=∫f²dx/(b-a)的平方根。在电学中，交流电的有效值就是均方根。与平均值不同，均方根始终非负。",ex:"sin x在[0,2π]的均方根=1/√2，这正是交流电有效值的来源。",eg:"f(x)=sinx在[0,2π]的均方根=√(1/(2π)·∫₀^{2π}sin²xdx)=1/√2",wr:["与平均值的区别","开方不能忘"],tp:["均方根","有效值"],rt:[{id:"f6-1-2-4",n:"平均值公式"}],ch:6,sn:"6.2",gn:"物理应用"},
{id:"f7-5-1-1",n:"齐次方程的通解",f:"$$\\frac{dy}{dx}=f\\left(\\frac{y}{x}\\right)\\xrightarrow{u=y/x}\\frac{du}{f(u)-u}=\\frac{dx}{x}$$",im:4,el:"core",tg:["final","pg"],py:"cfcddtj",cd:"方程可化为dy/dx=f(y/x)的形式",cp:"解齐次微分方程",ct:"令u=y/x（即y=ux），则dy/dx=u+x·du/dx。代入原方程得x·du/dx=f(u)-u，分离变量：du/(f(u)-u)=dx/x。两边积分后回代u=y/x。",ex:"判别方法：方程中x和y以y/x的组合出现时为齐次方程。",eg:"dy/dx=(y²+xy)/(x²)，令u=y/x得du/(u²+u-u)=dx/x→du/u²=dx/x→-1/u=ln|x|+C",wr:["u=y/x的代换","分离变量后要回代"],tp:["齐次方程","变量代换"],rt:[{id:"f7-1-1-1",n:"可分离变量方程"}],ch:7,sn:"7.1",gn:"一阶微分方程",pastExam:[{y:2024,t:"考研数学",f:"中频"}]},
{id:"f7-5-2-1",n:"伯努利方程",f:"$$\\frac{dy}{dx}+P(x)y=Q(x)y^n\\xrightarrow{z=y^{1-n}}\\frac{dz}{dx}+(1-n)Pz=(1-n)Q$$",im:4,el:"core",tg:["final","pg"],py:"bnlfck",cd:"n≠0,1的常数",cp:"将伯努利方程化为一阶线性方程",ct:"令z=y^{1-n}，则方程化为dz/dx+(1-n)P(x)z=(1-n)Q(x)，这是一阶线性方程，用通解公式求解，最后回代z=y^{1-n}。",ex:"n=0时已是线性方程；n=1时可分离变量。常见n=2,-1等。",eg:"dy/dx-y=xy²（n=2），令z=1/y得dz/dx+z=-x→z=Ceˣ-x-1→y=1/(Ceˣ-x-1)",wr:["代换z=y^{1-n}","回代不能忘"],tp:["伯努利方程","变量代换"],rt:[{id:"f7-1-1-1",n:"一阶线性方程"}],ch:7,sn:"7.1",gn:"一阶微分方程",pastExam:[{y:2023,t:"考研数学",f:"中频"}]},
{id:"f7-5-3-1",n:"全微分方程",f:"$$P(x,y)dx+Q(x,y)dy=0,\\;\\frac{\\partial P}{\\partial y}=\\frac{\\partial Q}{\\partial x}\\Rightarrow u(x,y)=C$$",im:3,el:"important",tg:["final","pg"],py:"qwffck",cd:"∂P/∂y=∂Q/∂x（单连通区域）",cp:"判断并求解全微分方程",ct:"若∂P/∂y=∂Q/∂x，则存在u使du=Pdx+Qdy，通解为u(x,y)=C。求u的方法：折线积分法或分别积分法。若不满足全微分条件，可找积分因子μ使其变为全微分。",ex:"积分因子：常见μ=μ(x)（仅含x）或μ=μ(y)。",eg:"(3x²+2xy)dx+(x²+y²)dy=0，∂P/∂y=2x=∂Q/∂x，全微分方程，u=x³+x²y+y³/3=C",wr:["先验证全微分条件","积分因子的寻找"],tp:["全微分方程","积分因子"],rt:[{id:"f11-1-2-3",n:"全微分求原函数"}],ch:7,sn:"7.1",gn:"一阶微分方程"},
{id:"f7-1-5-1",n:"可降阶方程总结",f:"$$\\begin{aligned}&y''=f(x):\\;y=\\iint f(x)dx^2+C_1x+C_2\\\\&y''=f(x,y'):\\;p=y',\\;y'=p\\\\&y''=f(y,y'):\\;p=y',\\;y''=p\\frac{dp}{dy}\\end{aligned}$$",im:4,el:"core",tg:["final","pg"],py:"kjffckzj",cd:"二阶方程不含y或不含x",cp:"将二阶方程降为一阶方程",ct:"三种类型：1)y''=f(x)直接积分两次；2)y''=f(x,y')令p=y'降为一阶；3)y''=f(y,y')令p=y',y''=p·dp/dy降为一阶。",ex:"类型2不含y，类型3不含x，注意区分。类型3中y''=p·dp/dy是关键代换。",eg:"y''=1+y'²（类型2），令p=y'得dp/(1+p²)=dx→p=tan(x+C₁)→y=-ln|cos(x+C₁)|+C₂",wr:["三种类型的判别","类型3的代换y''=p dp/dy"],tp:["可降阶方程","变量代换"],rt:[{id:"f7-1-1-1",n:"一阶线性方程"}],ch:7,sn:"7.1",gn:"一阶微分方程",pastExam:[{y:2024,t:"考研数学",f:"中频"}]},
{id:"f7-2-2-2",n:"常系数非齐次通解结构",f:"$$y=Y+y^*,\\;Y=\\text{齐次通解},\\;y^*=\\text{特解}$$",im:5,el:"mustknow",tg:["final","pg"],py:"cxfqctjtg",cd:"常系数线性非齐次方程",cp:"明确非齐次方程通解的结构",ct:"非齐次方程通解=对应齐次方程通解+非齐次方程的一个特解。特解的求法：1)待定系数法（自由项为多项式·指数·三角函数）；2)常数变易法；3)算子法。",ex:"待定系数法的关键是根据自由项和特征根的关系设特解形式。",eg:"y''+y=x，齐次通解Y=C₁cosx+C₂sinx，特解y*=x（设y*=Ax+B），通解=Y+y*",wr:["齐次通解+特解","特解形式要设对"],tp:["非齐次方程","通解结构"],rt:[{id:"f7-2-1-1",n:"二阶齐次方程"}],ch:7,sn:"7.2",gn:"高阶微分方程",pastExam:[{y:2024,t:"考研数学",f:"高频"}]},
{id:"f7-2-2-3",n:"特解设定（待定系数法）",f:"$$\\begin{aligned}&f=e^{\\lambda x}P_m(x):\\;y^*=x^k e^{\\lambda x}Q_m(x)\\\\&f=e^{\\lambda x}[P_l\\cos\\omega x+Q_n\\sin\\omega x]:\\;y^*=x^k e^{\\lambda x}[R_m\\cos\\omega x+S_m\\sin\\omega x]\\end{aligned}$$",im:4,el:"core",tg:["final","pg"],py:"tjsddddxsf",cd:"k为λ作为特征根的重数（不是则为0）",cp:"设定非齐次方程特解的形式",ct:"类型1（指数×多项式）：y*=x^k·e^{λx}·Q_m(x)，k为λ是特征根的重数。类型2（指数×多项式×三角）：y*=x^k·e^{λx}[R cosωx+S sinωx]，k为λ±iω是特征根的重数。",ex:"k的取值是关键：不是特征根k=0，单根k=1，重根k=2。",eg:"y''-2y'+y=eˣ，特征根λ=1（重根），f=eˣ→y*=Ax²eˣ（k=2）",wr:["k值的确定","Q_m(x)要设完整多项式"],tp:["待定系数法","特解"],rt:[{id:"f7-2-2-2",n:"非齐次通解结构"}],ch:7,sn:"7.2",gn:"高阶微分方程",pastExam:[{y:2023,t:"考研数学",f:"高频"}]},
{id:"f7-5-4-1",n:"欧拉方程",f:"$$x^ny^{(n)}+a_1x^{n-1}y^{(n-1)}+\\cdots+a_ny=f(x)\\xrightarrow{x=e^t}\\text{常系数方程}$$",im:3,el:"important",tg:["final","pg"],py:"olck",cd:"系数为x的幂次的线性方程",cp:"将变系数方程化为常系数方程",ct:"令x=e^t（即t=ln x），则x·D=D̄（D̄=d/dt），x²D²=D̄(D̄-1)，一般地x^k D^k=D̄(D̄-1)...(D̄-k+1)。化为常系数方程后求解，再回代t=ln x。",ex:"仅适用于x>0。x<0时令x=-e^t。",eg:"x²y''+xy'-y=0，令x=e^t得D̄(D̄-1)y+D̄y-y=0→D̄²y-y=0→y=C₁eᵗ+C₂e^{-t}=C₁x+C₂/x",wr:["算子代换公式","回代t=ln x"],tp:["欧拉方程","变量代换"],rt:[{id:"f7-2-1-1",n:"二阶齐次方程"}],ch:7,sn:"7.2",gn:"高阶微分方程",pastExam:[{y:2024,t:"考研数学",f:"中频"}]},
{id:"f7-3-2-2",n:"常数变易法",f:"$$y=C_1(x)y_1(x)+C_2(x)y_2(x),\\;\\begin{cases}C_1'y_1+C_2'y_2=0\\\\C_1'y_1'+C_2'y_2'=f(x)/a(x)\\end{cases}$$",im:3,el:"important",tg:["final","pg"],py:"csbyf",cd:"已知齐次方程的两个线性无关解y₁,y₂",cp:"求变系数非齐次方程的特解",ct:"将齐次通解中的常数C₁,C₂换为函数，附加条件C₁'y₁+C₂'y₂=0，解方程组求C₁',C₂'，再积分得C₁,C₂。适用于变系数方程。",ex:"对常系数方程，待定系数法更简便；常数变易法用于变系数或自由项复杂的情况。",eg:"y''+y=sec x，齐次解cos x,sin x，用常数变易法求特解",wr:["附加条件C₁'y₁+C₂'y₂=0","积分求C₁,C₂"],tp:["常数变易法","变系数方程"],rt:[{id:"f7-2-2-2",n:"非齐次通解结构"}],ch:7,sn:"7.3",gn:"微分方程的应用"},
{id:"f8-5-1-1",n:"方向余弦与方向数",f:"$$\\cos\\alpha=\\frac{a_x}{|\\vec{a}|},\\;\\cos\\beta=\\frac{a_y}{|\\vec{a}|},\\;\\cos\\gamma=\\frac{a_z}{|\\vec{a}|},\\;\\cos^2\\alpha+\\cos^2\\beta+\\cos^2\\gamma=1$$",im:3,el:"important",tg:["final","pg"],py:"fyxyfss",cd:"向量a⃗=(aₓ,aᵧ,a_z)，|a⃗|≠0",cp:"描述向量的方向",ct:"方向余弦是单位向量的分量，满足平方和为1。方向数是方向向量的分量（不要求单位化）。方向角α,β,γ是向量与各坐标轴的夹角。",ex:"单位向量a⃗₀=(cosα,cosβ,cosγ)。方向余弦与向量的模无关。",eg:"a⃗=(1,2,2)，|a⃗|=3，方向余弦(1/3,2/3,2/3)，验证1/9+4/9+4/9=1",wr:["方向余弦平方和为1","方向数不等于方向余弦"],tp:["方向余弦","方向数"],rt:[{id:"f8-1-1-1",n:"向量运算"}],ch:8,sn:"8.1",gn:"向量代数"},
{id:"f8-5-2-1",n:"旋转曲面方程",f:"$$\\text{曲线}\\begin{cases}f(y,z)=0\\\\x=0\\end{cases}\\text{绕}z\\text{轴旋转}\\Rightarrow f\\left(\\pm\\sqrt{x^2+y^2},z\\right)=0$$",im:4,el:"core",tg:["final","pg"],py:"xzqrmfj",cd:"母线在坐标面内的曲线",cp:"求旋转曲面的方程",ct:"绕z轴旋转：将y换成±√(x²+y²)；绕y轴旋转：将z换成±√(x²+y²)。一般原则：绕谁旋转谁不变，另一个变量换成±√(其余两变量平方和)。",ex:"圆锥面z²=x²+y²由直线z=y绕z轴旋转得到。",eg:"椭圆x²/4+z²/9=1绕z轴旋转→旋转椭球面x²/4+y²/4+z²/9=1",wr:["哪个轴旋转哪个变量不变","±号保留"],tp:["旋转曲面","曲面方程"],rt:[{id:"f8-1-1-1",n:"向量运算"}],ch:8,sn:"8.3",gn:"空间曲面与曲线",pastExam:[{y:2024,t:"考研数学",f:"中频"}]},
