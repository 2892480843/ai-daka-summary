<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 打卡汇总</title>
<style>
:root{--bg:#f5f6f8;--panel:#fff;--ink:#1f2430;--body:#33384a;--muted:#8a91a0;--line:#e7e9ee;--hover:#fafbfc;--off:#f1f3f5;}
html[data-theme=dark]{--bg:#0f1115;--panel:#171a21;--ink:#e8eaf0;--body:#cdd2dd;--muted:#878f9e;--line:#262b35;--hover:#1b1f28;--off:#222734;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6;transition:background .2s,color .2s}
.wrap{max-width:1060px;margin:0 auto;padding:28px 20px 64px}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
header h1{font-size:24px;font-weight:600;margin:0 0 6px}
header .meta{color:var(--muted);font-size:13px;margin:0}
header .meta a{color:var(--muted)}
.theme{flex:none;border:1px solid var(--line);background:var(--panel);color:var(--ink);font:inherit;font-size:13px;padding:8px 14px;border-radius:999px;cursor:pointer}
.tabs{display:flex;gap:6px;margin:22px 0 18px;border-bottom:1px solid var(--line)}
.tabs button{border:0;background:none;font:inherit;font-size:15px;color:var(--muted);padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
.tabs button.active{color:var(--ink);border-bottom-color:var(--ink)}
.view{display:none}.view.active{display:block}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.stat .k{color:var(--muted);font-size:12px;margin:0 0 6px}.stat .v{font-size:26px;font-weight:600;margin:0}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:18px}
.panel h2{font-size:14px;font-weight:600;color:var(--muted);margin:0 0 14px}
.bars{display:flex;flex-direction:column;gap:10px}
.barrow{display:grid;grid-template-columns:54px 1fr 46px;align-items:center;gap:10px;font-size:13px}
.barrow .lab{color:var(--muted)}
.track{display:block;height:14px;background:var(--bg);border-radius:8px;overflow:hidden}
.fill{display:block;height:100%;border-radius:8px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.matrix{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
.matrix th,.matrix td{padding:10px 8px;text-align:center;border-bottom:1px solid var(--line)}
.matrix th{position:sticky;top:0;background:var(--panel);color:var(--muted);font-weight:600;font-size:12px;cursor:pointer}
.matrix th.l,.matrix td.l{text-align:left}
.matrix tr.person{cursor:pointer}.matrix tr.person:hover td{background:var(--hover)}
.matrix .id{color:var(--muted);font-size:12px}
.dot{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;font-weight:700}
.dot.on{color:#fff}.dot.off{color:var(--muted);background:var(--off)}
.pbar{display:flex;align-items:center;gap:8px}
.pbar .pt{display:block;flex:1;height:10px;background:var(--bg);border-radius:6px;overflow:hidden;min-width:60px}
.pbar .pf{display:block;height:100%;background:#22c55e;border-radius:6px}
.pbar .pn{font-variant-numeric:tabular-nums;font-weight:600;font-size:13px;min-width:34px;text-align:right}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.controls input,.controls select{font:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--ink);outline:none}
.controls input{flex:1;min-width:200px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{font-size:13px;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--panel);cursor:pointer;color:var(--muted);font-weight:500}
.chip.active{color:#fff;border-color:transparent}
.count{color:var(--muted);font-size:13px;margin:0 0 12px}
.clist{display:flex;flex-direction:column;gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.card .chead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
.badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;color:#fff;white-space:nowrap}
.card .who{font-weight:600}.card .uid{color:var(--muted);font-size:12px}.card .when{margin-left:auto;color:var(--muted);font-size:12px}
.card .body{padding:13px 16px}
.ptext{white-space:pre-wrap;font-size:14.5px;color:var(--body)}
.ptext+.shot,.shot+.ptext,.shot+.shot{margin-top:10px}
.shot{display:block;max-width:100%;height:auto;border:1px solid var(--line);border-radius:10px;background:var(--off);min-height:30px}
.empty{color:var(--muted);text-align:center;padding:40px 0;font-size:14px}
.foot{color:var(--muted);font-size:12px;margin-top:24px;text-align:center}
@media(max-width:640px){.stats{grid-template-columns:1fr}.matrix .id{display:none}}
</style>
</head>

    <header>
      <h1>AI Study Buddy Camp · 打卡汇总</h1>

<script>
const DATA = [{"seq": 1, "day": 1, "name": "李晓峰", "login": "lixiaofeng", "time": "2026-06-13 15:46", "parts": [{"t": "t", "v": "1.案例感受\n图像的生成，感觉描述简单，但是生成还是符合预期的。\n\n2.概念理解\n你用日常的语言描述你要做一个什么程序，大模型替你完成。"}], "txt": "1.案例感受\n图像的生成，感觉描述简单，但是生成还是符合预期的。\n\n2.概念理解\n你用日常的语言描述你要做一个什么程序，大模型替你完成。"}, {"seq": 2, "day": 1, "name": "V58111MQ", "login": "V58111MQ", "time": "2026-06-13 18:35", "parts": [{"t": "t", "v": "打卡练习\n\n案例感受\n\n这些分享的案例都非常喜欢，挺难选的。每个方案都汇集了开发者的创意、时间、精力、和不断的打磨。而且做出来的网页APP从前端看，都挺专业的，也能实用。（至于代码的高效性，冗余度，容错处理可能是目前vide coding的短板）。\n\n在这些可爱的案例中，最喜欢的是【手控 3D 粒子交互系统】，因为我对computer vision很感兴趣，没想到现在通过vide coding就能实现了。而且这个app结合了”理工生“的创意+逻辑，以及”文科生“的浪漫。很好磕呀。哈哈哈。\n\nps. 祝两小只长长久久。\n\n概念理解\n\n什么是Vibe Coding?\n\n比如你有一个失传的经典川菜菜谱，已经失传很多年了，你不会厨艺，但是却希望办法把这道江湖失传的名菜复刻出来。这个时候就可以借用vibe coding了。\n\nVibe Coding就好像，你把这个祖传“菜谱”讲给一位会做菜的机器人听。然后机器人根据已经熟悉的基本料理理论和烹饪技能，为你复刻出这道满意的经典菜肴。这个过程可能并不是一次就成功，所以需要反复尝试，反复和机器人交流，告诉它下次需要改进的时候，在每次不完美的基础上，慢慢一步一步接近最佳的结果。\n\n这整个过程，就是Vibe Coding。而你只需要把”做菜“这个语境换成任何可以通过计算机完成的事情。"}], "txt": "打卡练习\n\n案例感受\n\n这些分享的案例都非常喜欢，挺难选的。每个方案都汇集了开发者的创意、时间、精力、和不断的打磨。而且做出来的网页APP从前端看，都挺专业的，也能实用。（至于代码的高效性，冗余度，容错处理可能是目前vide coding的短板）。\n\n在这些可爱的案例中，最喜欢的是【手控 3D 粒子交互系统】，因为我对computer vision很感兴趣，没想到现在通过vide coding就能实现了。而且这个app结合了”理工生“的创意+逻辑，以及”文科生“的浪漫。很好磕呀。哈哈哈。\n\nps. 祝两小只长长久久。\n\n概念理解\n\n什么是Vibe Coding?\n\n比如你有一个失传的经典川菜菜谱，已经失传很多年了，你不会厨艺，但是却希望办法把这道江湖失传的名菜复刻出来。这个时候就可以借用vibe coding了。\n\nVibe Coding就好像，你把这个祖传“菜谱”讲给一位会做菜的机器人听。然后机器人根据已经熟悉的基本料理理论和烹饪技能，为你复刻出这道满意的经典菜肴。这个过程可能并不是一次就成功，所以需要反复尝试，反复和机器人交流，告诉它下次需要改进的时候，在每次不完美的基础上，慢慢一步一步接近最佳的结果。\n\n这整个过程，就是Vibe Coding。而你只需要把”做菜“这个语境换成任何可以通过计算机完成的事情。"}, {"seq": 3, "day": 1, "name": "赖峰明", "login": "laifengming", "time": "2026-06-13 20:32", "parts": [{"t": "t", "v": "打卡任务\n\n案例感受：\n实际上每一个案例都挺不错的，但是给我印象最深的还是那个灰色的小桥岸的水墨画。这个水墨画十分逼真，给我一种很想八九十年代灰色照片的感觉，AI发展的速度真的真的非常快，把很多我们脑子随便想象出来的东西都展示出来。\n\n概念理解：\n它就像一个十分细致的管家，你要求他该干什么，他就能干什么，他能根据我们十分复杂的要求来做出成果，当然细致的人也会有粗心的时候，但他就是尽可能地满足我们的需求。"}], "txt": "打卡任务\n\n案例感受：\n实际上每一个案例都挺不错的，但是给我印象最深的还是那个灰色的小桥岸的水墨画。这个水墨画十分逼真，给我一种很想八九十年代灰色照片的感觉，AI发展的速度真的真的非常快，把很多我们脑子随便想象出来的东西都展示出来。\n\n概念理解：\n它就像一个十分细致的管家，你要求他该干什么，他就能干什么，他能根据我们十分复杂的要求来做出成果，当然细致的人也会有粗心的时候，但他就是尽可能地满足我们的需求。"}, {"seq": 4, "day": 1, "name": "honhao", "login": "honhao", "time": "2026-06-13 23:35", "parts": [{"t": "t", "v": "案例感受:\n我个人感觉每个作品的提示词写的非常好，印象最深的是那个人网站，此外还有OpenClaw 小龙虾，相较于传统的自动化程序，使用智能体仿佛是给小白入门。\n概念理解\nVibe Coding，就像一个公司的实习生或者学生，需要你将底层的逻辑讲清晰，需要一步步引导，反复交流，直到最终达到理想结果\n财务智能系统\n目前AI智能深入各个行业和领域，我想设计一个财务智能系统用于处理日常的财务工作，传统的系统复杂，无法准确适配一些公司的特殊要求，并且操作繁琐。"}], "txt": "案例感受:\n我个人感觉每个作品的提示词写的非常好，印象最深的是那个人网站，此外还有OpenClaw 小龙虾，相较于传统的自动化程序，使用智能体仿佛是给小白入门。\n概念理解\nVibe Coding，就像一个公司的实习生或者学生，需要你将底层的逻辑讲清晰，需要一步步引导，反复交流，直到最终达到理想结果\n财务智能系统\n目前AI智能深入各个行业和领域，我想设计一个财务智能系统用于处理日常的财务工作，传统的系统复杂，无法准确适配一些公司的特殊要求，并且操作繁琐。"}, {"seq": 5, "day": 1, "name": "陈彦凯", "login": "chenyankai", "time": "2026-06-14 21:38", "parts": [{"t": "t", "v": "案例感受\n看完 Day1 的几个案例后最直观的感受是：AI 已经从\"聊天问答\"真正走进了\"创作与生产\"。图像生成、视频生成让内容创作门槛大幅降低；3D 俄罗斯方块和 PET 英语学习智能体让我看到 AI 还能直接参与游戏逻辑与语言陪练；大学生本地知识库让人眼前一亮——把个人资料变成可对话的知识非常实用；OpenClaw 小龙虾则展示了 AI + 工具调用的趣味性。整体感觉是：以前要写大量代码才能做的事，现在靠提示词和少量配置就能跑起来。\n你印象最深的一个案例是什么？为什么它打动你？\n印象最深的是 本地知识库（RAG 个人知识库）。\n因为它最贴近学生日常痛点——论文、课件、笔记散落各处，有了本地可检索、可对话的知识库，就像随时有个了解你所有资料的助教。相比炫酷的图像/视频生成，它让我感受到 AI 是真正\"帮人减负\"的工具，而不只是玩具。"}], "txt": "案例感受\n看完 Day1 的几个案例后最直观的感受是：AI 已经从\"聊天问答\"真正走进了\"创作与生产\"。图像生成、视频生成让内容创作门槛大幅降低；3D 俄罗斯方块和 PET 英语学习智能体让我看到 AI 还能直接参与游戏逻辑与语言陪练；大学生本地知识库让人眼前一亮——把个人资料变成可对话的知识非常实用；OpenClaw 小龙虾则展示了 AI + 工具调用的趣味性。整体感觉是：以前要写大量代码才能做的事，现在靠提示词和少量配置就能跑起来。\n你印象最深的一个案例是什么？为什么它打动你？\n印象最深的是 本地知识库（RAG 个人知识库）。\n因为它最贴近学生日常痛点——论文、课件、笔记散落各处，有了本地可检索、可对话的知识库，就像随时有个了解你所有资料的助教。相比炫酷的图像/视频生成，它让我感受到 AI 是真正\"帮人减负\"的工具，而不只是玩具。"}, {"seq": 6, "day": 1, "name": "BlueFox", "login": "BlueFox", "time": "2026-06-15 15:10", "parts": [{"t": "t", "v": "案例感受：\n3D俄罗斯方块，第一次看到三维的俄罗斯方块，以前都是二维的。通过一些文字的通俗描述，就可以生成3D 游戏，并且可以直接玩，印象特别深刻。\n\n概念理解：\nVibe coding就是利用文字描述需要构建的程序，后台自动生成程序。然后看到程序系统后，再通过文字描述不断地进行调整优化，最终生成符合需求的程序。"}], "txt": "案例感受：\n3D俄罗斯方块，第一次看到三维的俄罗斯方块，以前都是二维的。通过一些文字的通俗描述，就可以生成3D 游戏，并且可以直接玩，印象特别深刻。\n\n概念理解：\nVibe coding就是利用文字描述需要构建的程序，后台自动生成程序。然后看到程序系统后，再通过文字描述不断地进行调整优化，最终生成符合需求的程序。"}, {"seq": 7, "day": 1, "name": "qijixingyuan", "login": "qijixingyuan", "time": "2026-06-15 23:03", "parts": [{"t": "t", "v": "案例感受：目前感受最大的是傅盛用fable5开发的红警吧，虽然他肯定不能说技术基础很弱，但是AI自动实现意图（中间无须人的干涉自己调整），这真的太妙了。\n\n概念理解：就是你只要对一个问题考虑得足够全面足够深刻，然后你又很有想要做点什么东西，制造点什么改变的时候，vibe coding能让你获得沉浸式的创造感受。"}], "txt": "案例感受：目前感受最大的是傅盛用fable5开发的红警吧，虽然他肯定不能说技术基础很弱，但是AI自动实现意图（中间无须人的干涉自己调整），这真的太妙了。\n\n概念理解：就是你只要对一个问题考虑得足够全面足够深刻，然后你又很有想要做点什么东西，制造点什么改变的时候，vibe coding能让你获得沉浸式的创造感受。"}, {"seq": 8, "day": 1, "name": "wnsywyl", "login": "wnsywyl", "time": "2026-06-16 12:05", "parts": [{"t": "t", "v": "案例感受：文字生成图片中的小桥和柳树，图片生成视频的鸭子游动还是很棒的，可以作为学生的课堂示例作品了，但是某种情况下生成的作品还是很AI化的，少了点东西，具体是什么，可能还是少了人的情感吧！\n概念理解：Vibe Coding，称之为氛围感编程还是很艺术的，让很多不会编程的人有了实践的机会，特别是有实际需求的我们，很是期待学完课后，我能编出陪伴孩子学习英语的智能体，案例中页面总体感觉不够美观，能不能加上美化界面，完成智能体的开发，很是期待！"}], "txt": "案例感受：文字生成图片中的小桥和柳树，图片生成视频的鸭子游动还是很棒的，可以作为学生的课堂示例作品了，但是某种情况下生成的作品还是很AI化的，少了点东西，具体是什么，可能还是少了人的情感吧！\n概念理解：Vibe Coding，称之为氛围感编程还是很艺术的，让很多不会编程的人有了实践的机会，特别是有实际需求的我们，很是期待学完课后，我能编出陪伴孩子学习英语的智能体，案例中页面总体感觉不够美观，能不能加上美化界面，完成智能体的开发，很是期待！"}, {"seq": 9, "day": 1, "name": "lsh", "login": "linshenghao", "time": "2026-06-16 12:06", "parts": [{"t": "t", "v": "案例感受\n我印象最深的灵魂案例是 3D 俄罗斯方块。创作者没有复杂专业基础，只简单描述想要立体方块、旋转消除、三维视觉效果，就快速做出完整可玩的 3D 小游戏。打动我的是它证明不用精通复杂技术，仅凭脑海里的创意想法就能做出完整互动作品，普通人的趣味脑洞也能轻松落地，打破了制作互动程序的技术门槛。\n概念理解\n把 Vibe Coding 比作定制手工模型。以前想做专属模型，得自己精通雕刻、拼接、上色全套手艺，每一处细节都要亲手打磨；现在你只需要随口讲清想要的外形、玩法、配色，有专人一次性把完整模型做好，哪里不满意随口说一句，对方立刻修改调整，全程不用你学习复杂手工技巧。"}], "txt": "案例感受\n我印象最深的灵魂案例是 3D 俄罗斯方块。创作者没有复杂专业基础，只简单描述想要立体方块、旋转消除、三维视觉效果，就快速做出完整可玩的 3D 小游戏。打动我的是它证明不用精通复杂技术，仅凭脑海里的创意想法就能做出完整互动作品，普通人的趣味脑洞也能轻松落地，打破了制作互动程序的技术门槛。\n概念理解\n把 Vibe Coding 比作定制手工模型。以前想做专属模型，得自己精通雕刻、拼接、上色全套手艺，每一处细节都要亲手打磨；现在你只需要随口讲清想要的外形、玩法、配色，有专人一次性把完整模型做好，哪里不满意随口说一句，对方立刻修改调整，全程不用你学习复杂手工技巧。"}, {"seq": 10, "day": 1, "name": "xmng", "login": "xmng", "time": "2026-06-16 15:36", "parts": [{"t": "t", "v": "案例感受：openclaw让我更看到了具身智能，开始让我们也能操作和使用。物理上的笨拙感和大模型的智能相结合，给出了很多想象空间。让心中的自己的Ironman Jarvis 梦看到了希望，尽管还有长时间，但是现在做出交互和简单任务的还是做到了。\n\n概念理解：\nVibe Coding是不同于一直以来的IDE Coding，由编程语言写某种功能，且是擅长于编程语言的人员，而Vibe Coding是任何人于大模型对话，让大模型去编写任何语言的代码，且对话是大白话，当然对话约专业功能约专业"}], "txt": "案例感受：openclaw让我更看到了具身智能，开始让我们也能操作和使用。物理上的笨拙感和大模型的智能相结合，给出了很多想象空间。让心中的自己的Ironman Jarvis 梦看到了希望，尽管还有长时间，但是现在做出交互和简单任务的还是做到了。\n\n概念理解：\nVibe Coding是不同于一直以来的IDE Coding，由编程语言写某种功能，且是擅长于编程语言的人员，而Vibe Coding是任何人于大模型对话，让大模型去编写任何语言的代码，且对话是大白话，当然对话约专业功能约专业"}, {"seq": 11, "day": 1, "name": "sxyf", "login": "sxyf", "time": "2026-06-16 15:36", "parts": [{"t": "t", "v": "案例感受:\n\n印象最深的一个案例是文字生图。简单的一句话，大模型会根据这句话的语义生成主题相似的多张图片，供用户选择。我使用了两个可以生成图片的大模型，发现生成的图片略有不同，但是主题类似。\n\n概念理解:\n\n什么是 Vibe Coding，其实就是个人作为一个指挥大脑，指挥助手（大模型）辅助自己，快速、高质地完成特定标准规范的特定任务。自己作为一个领导者，不需要了解各项技术的具体细节，只需要将任务拆分成相对独立的模块，让大模型助手，完成各自擅长的功能，再将这些模块组合在一起，形成一个有机体就可。"}], "txt": "案例感受:\n\n印象最深的一个案例是文字生图。简单的一句话，大模型会根据这句话的语义生成主题相似的多张图片，供用户选择。我使用了两个可以生成图片的大模型，发现生成的图片略有不同，但是主题类似。\n\n概念理解:\n\n什么是 Vibe Coding，其实就是个人作为一个指挥大脑，指挥助手（大模型）辅助自己，快速、高质地完成特定标准规范的特定任务。自己作为一个领导者，不需要了解各项技术的具体细节，只需要将任务拆分成相对独立的模块，让大模型助手，完成各自擅长的功能，再将这些模块组合在一起，形成一个有机体就可。"}, {"seq": 12, "day": 1, "name": "Captain_Owen220", "login": "Captain_Owen220", "time": "2026-06-16 20:40", "parts": [{"t": "t", "v": "案例感受:\n我个人感觉校园一站式服务平台的理念和页面的排版非常好，以及印象最深的是手控 3D 粒子交互系统，很有特色。智能体给出了很多想象空间，并且不用精通复杂技术，靠提示词和少量配置就能达到自己想要的效果。\n概念理解：\nVibe Coding，就像一个刚入行的实习生，需要你将底层的逻辑讲清晰，你要求他该干什么，他就能干什么，他能根据我们十分复杂的要求来做出成果，但是需要一步步引导，反复交流，直到最终达到理想结果。"}], "txt": "案例感受:\n我个人感觉校园一站式服务平台的理念和页面的排版非常好，以及印象最深的是手控 3D 粒子交互系统，很有特色。智能体给出了很多想象空间，并且不用精通复杂技术，靠提示词和少量配置就能达到自己想要的效果。\n概念理解：\nVibe Coding，就像一个刚入行的实习生，需要你将底层的逻辑讲清晰，你要求他该干什么，他就能干什么，他能根据我们十分复杂的要求来做出成果，但是需要一步步引导，反复交流，直到最终达到理想结果。"}, {"seq": 13, "day": 1, "name": "lyqsl", "login": "lyqsl", "time": "2026-06-16 23:38", "parts": [{"t": "t", "v": "案例感受：\n这些案例证明已经让AI深入到我们的工作和生活当中，无论是在软件生成，或者其他信息领域，在未来我们所需要做的事情。已经不是去敲代码，而是更多的用自然语言去描述我们的要求，让 AI 去帮助我们完成对应的工作。\nVibe coding：\n它是一个很强大的转化工具，可以将自然语言转化成生成对应软件所需要的代码。\n但是，它本身需要引导。如果缺乏引导，它生成的东西可能达不到我们人类一开始想要达成的目的。\n人只负责提需求、验收效果、迭代调整，底层语法、API、逻辑实现全部交给 AI 处理。"}], "txt": "案例感受：\n这些案例证明已经让AI深入到我们的工作和生活当中，无论是在软件生成，或者其他信息领域，在未来我们所需要做的事情。已经不是去敲代码，而是更多的用自然语言去描述我们的要求，让 AI 去帮助我们完成对应的工作。\nVibe coding：\n它是一个很强大的转化工具，可以将自然语言转化成生成对应软件所需要的代码。\n但是，它本身需要引导。如果缺乏引导，它生成的东西可能达不到我们人类一开始想要达成的目的。\n人只负责提需求、验收效果、迭代调整，底层语法、API、逻辑实现全部交给 AI 处理。"}, {"seq": 14, "day": 1, "name": "geekqiao", "login": "geekqiao", "time": "2026-06-16 23:40", "parts": [{"t": "t", "v": "案例感受（≥50 字）\n\n你印象最深的一个案例是什么？为什么它打动你？\n\n《从 Game Boy 到 3D Tetris：GLM-4.5帮我重构童年幻想》\n工具的门槛变低了，想象力反而显得更重要。\n一个大家都知道的俄罗斯方块，都可以有不同的变种。\n生活中一些习以为常的东西，都会有一些值得挖掘的点。\n\n概念理解（≥50 字）\n\n用自己的话，给一个完全不懂的朋友解释”什么是 Vibe Coding”\n\n自然语言编程，由人通过语言来描述需求，有ai来完成编码。\n人需要把要做的事情，想清楚，说明白。"}], "txt": "案例感受（≥50 字）\n\n你印象最深的一个案例是什么？为什么它打动你？\n\n《从 Game Boy 到 3D Tetris：GLM-4.5帮我重构童年幻想》\n工具的门槛变低了，想象力反而显得更重要。\n一个大家都知道的俄罗斯方块，都可以有不同的变种。\n生活中一些习以为常的东西，都会有一些值得挖掘的点。\n\n概念理解（≥50 字）\n\n用自己的话，给一个完全不懂的朋友解释”什么是 Vibe Coding”\n\n自然语言编程，由人通过语言来描述需求，有ai来完成编码。\n人需要把要做的事情，想清楚，说明白。"}, {"seq": 15, "day": 1, "name": "墨子龙", "login": "mozilong", "time": "2026-06-17 10:28", "parts": [{"t": "t", "v": "案例感受（≥50 字）\n这些案例证明 AI 已经深入到我们的学习、工作与生活之中。从点餐、备课、网页生成到批改、翻译，AI 不再是\"工具栏里的一个 App\"，而是嵌入流程的一个环节。我们需要的不再是敲代码的能力，而是把模糊需求翻译成清晰指令的能力——自然语言，正在成为新的\"编程语言\"。\n概念理解（≥50 字）\n它是一个强大的\"转化工具\"，把自然语言需求直接转成可运行的软件代码。但它本身需要引导——缺乏上下文、缺乏约束，生成结果往往偏离预期。人的角色从\"写代码\"变成\"提需求、验效果、迭代调整\"，底层语法、API、逻辑实现全部交给 AI。"}], "txt": "案例感受（≥50 字）\n这些案例证明 AI 已经深入到我们的学习、工作与生活之中。从点餐、备课、网页生成到批改、翻译，AI 不再是\"工具栏里的一个 App\"，而是嵌入流程的一个环节。我们需要的不再是敲代码的能力，而是把模糊需求翻译成清晰指令的能力——自然语言，正在成为新的\"编程语言\"。\n概念理解（≥50 字）\n它是一个强大的\"转化工具\"，把自然语言需求直接转成可运行的软件代码。但它本身需要引导——缺乏上下文、缺乏约束，生成结果往往偏离预期。人的角色从\"写代码\"变成\"提需求、验效果、迭代调整\"，底层语法、API、逻辑实现全部交给 AI。"}, {"seq": 16, "day": 1, "name": "zykysyb", "login": "zykysyb", "time": "2026-06-17 11:46", "parts": [{"t": "t", "v": "1. 案例感受\n我印象最深的是“3D 俄罗斯方块”。它让我看到 Vibe Coding 不仅能做网页应用，还能快速原型出立体交互游戏。把经典玩法升维到三维空间后，视觉冲击力和策略性都大大增强，而且整个过程通过自然语言描述就能生成可运行的代码，这让我觉得普通人也完全可以用 AI 实现自己脑洞大开的创意，编程不再是程序员的专利。\n\n2. 概念理解\nVibe Coding 就是“跟着感觉写代码”——你不需要一开始就想好完整架构，而是用自然语言（比如中文）给 AI 描述你想要的界面或功能，AI 生成代码，你复制、运行、看效果，然后继续用话术调整：“按钮再大一点”“颜色换成暖色”“加上动画”……像在和设计师聊天一样迭代。它不追求一次完美，而是让编程变成一种对话式的创作游戏，门槛极低，适合普通人快速把想法变成可用的网页或小应用。"}], "txt": "1. 案例感受\n我印象最深的是“3D 俄罗斯方块”。它让我看到 Vibe Coding 不仅能做网页应用，还能快速原型出立体交互游戏。把经典玩法升维到三维空间后，视觉冲击力和策略性都大大增强，而且整个过程通过自然语言描述就能生成可运行的代码，这让我觉得普通人也完全可以用 AI 实现自己脑洞大开的创意，编程不再是程序员的专利。\n\n2. 概念理解\nVibe Coding 就是“跟着感觉写代码”——你不需要一开始就想好完整架构，而是用自然语言（比如中文）给 AI 描述你想要的界面或功能，AI 生成代码，你复制、运行、看效果，然后继续用话术调整：“按钮再大一点”“颜色换成暖色”“加上动画”……像在和设计师聊天一样迭代。它不追求一次完美，而是让编程变成一种对话式的创作游戏，门槛极低，适合普通人快速把想法变成可用的网页或小应用。"}, {"seq": 17, "day": 2, "name": "李晓峰", "login": "lixiaofeng", "time": "2026-06-13 16:08", "parts": [{"t": "i", "v": "images/982d56b4-6cd9-4413-9ba2-a855d5ddfdb5.jpg"}, {"t": "i", "v": "images/1c83211f-a7e7-424c-8166-a79b257f4c17.jpg"}], "txt": ""}, {"seq": 18, "day": 2, "name": "V58111MQ", "login": "V58111MQ", "time": "2026-06-13 19:27", "parts": [{"t": "t", "v": "Issue 2 打卡\n\n我使用的是Windows系统，根据第二章的指引，我安装的是VS Code + Cline。我没有使用Claude Code。\n\n平台注册成功截图"}, {"t": "i", "v": "images/270fab32-5a32-402d-923c-dd2ab855eebb.jpg"}, {"t": "t", "v": "API Key 获取成功截图\n\nAPI名称： ai-work-buddy-study"}, {"t": "i", "v": "images/2489b179-10cd-4529-b2f0-39a4e9c0275c.jpg"}, {"t": "t", "v": "环境部署成功截图\n\nVSCode中的环境配置"}, {"t": "i", "v": "images/e055bc5a-7db9-468b-96c5-8255ac099f3a.jpg"}, {"t": "t", "v": "部署完成后的Cline界面"}, {"t": "i", "v": "images/6ee8611d-37d5-4eb3-9363-fc85b0ffa67e.jpg"}, {"t": "t", "v": "环境配置好之后，我写一句简单的prompt，让cline使用智谱的大模型开发一个python程序，用来merge和压缩多个PDF files。 任务完成成功，一共消耗了48K的token。\n\n我的prompt是：\n\nwrite a python script to merge multiple PDF files into a single file and compress the final merged file.\n\nToken消耗（out of free 200K tokens)"}, {"t": "i", "v": "images/dfa14a4d-6fda-4ed1-ab0a-aa6982e8ce87.jpg"}, {"t": "t", "v": "任务完成列表："}, {"t": "i", "v": "images/9de73fed-541e-40dd-9784-9126b54ec4c8.jpg"}, {"t": "t", "v": "最终cline生成的文件，如下："}, {"t": "i", "v": "images/3642c218-47a9-429c-9aed-61a95d3c2a5b.jpg"}], "txt": "Issue 2 打卡\n\n我使用的是Windows系统，根据第二章的指引，我安装的是VS Code + Cline。我没有使用Claude Code。\n\n平台注册成功截图 API Key 获取成功截图\n\nAPI名称： ai-work-buddy-study 环境部署成功截图\n\nVSCode中的环境配置 部署完成后的Cline界面 环境配置好之后，我写一句简单的prompt，让cline使用智谱的大模型开发一个python程序，用来merge和压缩多个PDF files。 任务完成成功，一共消耗了48K的token。\n\n我的prompt是：\n\nwrite a python script to merge multiple PDF files into a single file and compress the final merged file.\n\nToken消耗（out of free 200K tokens) 任务完成列表： 最终cline生成的文件，如下："}, {"seq": 19, "day": 2, "name": "V58111MQ", "login": "V58111MQ", "time": "2026-06-13 19:37", "parts": [{"t": "t", "v": "请问老师：\n\n在Windows中使用Cline的时候，有一个选项是Compact Task。\n\n请问这个有什么用呢？\n\n谢谢。"}, {"t": "i", "v": "images/161641de-64c0-4d6b-9ad0-6e538791a752.jpg"}, {"t": "t", "v": "另外一个问题是：\n\n在cline里面看到这个红色的报错，checkpoints 是干什么用的呢？\n\n我的working direcotory是在一个叫住playgound-one的文件夹里面，不在Desktop direcoty呀。为什么会报错这个呢？"}, {"t": "i", "v": "images/bcd0de0b-9390-4f6f-8efe-7ebbb1cd5e49.jpg"}, {"t": "t", "v": "谢谢老师的帮助。"}], "txt": "请问老师：\n\n在Windows中使用Cline的时候，有一个选项是Compact Task。\n\n请问这个有什么用呢？\n\n谢谢。 另外一个问题是：\n\n在cline里面看到这个红色的报错，checkpoints 是干什么用的呢？\n\n我的working direcotory是在一个叫住playgound-one的文件夹里面，不在Desktop direcoty呀。为什么会报错这个呢？ 谢谢老师的帮助。"}, {"seq": 20, "day": 2, "name": "赖峰明", "login": "laifengming", "time": "2026-06-15 19:07", "parts": [{"t": "t", "v": "Issue 2 截图"}], "txt": "Issue 2 截图"}, {"seq": 21, "day": 2, "name": "qijixingyuan", "login": "qijixingyuan", "time": "2026-06-15 23:21", "parts": [{"t": "i", "v": "images/a5fd167a-015e-46e2-ab7b-9f6b64752b89.jpg"}, {"t": "t", "v": "](/api/attachments/50ecaf36-98d8-49e3-a878-2be363b95562)"}, {"t": "i", "v": "images/1adce2cf-a6b7-4cf2-a6fe-22e00cc2dea1.jpg"}, {"t": "i", "v": "images/531bb17e-7550-4db8-ba38-4e41cd66cc57.jpg"}], "txt": "](/api/attachments/50ecaf36-98d8-49e3-a878-2be363b95562)"}, {"seq": 22, "day": 2, "name": "BlueFox", "login": "BlueFox", "time": "2026-06-16 08:39", "parts": [{"t": "t", "v": "平台注册成功截图"}, {"t": "i", "v": "images/a3cf4d9a-9ad6-4e7f-b1ac-0c26562c1312.jpg"}, {"t": "t", "v": "API Key 获取成功截图"}, {"t": "i", "v": "images/8781f81c-790d-4b 。"}, {"t": "i", "v": "images/ea75dfc2-673f-47ab-8abf-2fb805b57573.jpg"}, {"t": "t", "v": "联网模式\n\nZ.ai提供非常详细的内容，有天气现象，气温体感，生活提示等模块。见截图。"}, {"t": "i", "v": "images/61aec65e-2229-457b-b165-45ab5e1c6327.jpg"}, {"t": "t", "v": "对比组二： 问题：2026年端午节放假具体安排\n\n无联网模式\n\n在不联网的情况下，z.ai仍然能够回答这个问题。见截图。"}, {"t": "i", "v": "images/b77568f3-3441-4471-bca1-5389b351c9bd.jpg"}, {"t": "t", "v": "联网模式\n\nZ.ai提供了更加详细的内容和放假建议，比如调休安排，和高速路的收费政策。这些额外的信息在无联网的情况下并没有涉及。\n\n另外，联网模式下还提高了更加生动的视觉表达，用图表的方法帮助阐述文字内容，更加易懂。\n\n见截图。"}, {"t": "i", "v": "images/1b764c21-ef3d-41fd-8397-7c4dd30282f1.jpg"}, {"t": "t", "v": "TAKS TWO - 对比分析\n\n根据以上的测试，联网搜索对信息的时效性有更好的帮助。比如当问到北京今天的天气，无联网的模式根本无法回答这个问题，因为其背后的训练数据集还没有办法合并当下的数据信息。因此，当我们需要知道最近几天才发生的事情，使用联网搜索更加有帮助。\n\n如果我们需要知道的信息是发生在过去，比如询问2026年的端午节放假情况，这类信息尽管还未发生，但是相关部门在年初，甚至去年就已经指定了放假计划，所以不是特别需要联网模式，也能得到有价值的信息。但如果想要知道今年端午节北京、上海、或者其它城市相关的纪念活动，就需要打开联网模式更加可靠了。\n\n综上，我更加信任打开联网模式的回答，因为可以收集到更加全面、时效性更及时的信息，与此同时，大模型底层的训练数据集也会做一个基础的补充，出现新旧信息交替，相互补充的回答集。如上面的两组对比可见，打开联网模式后，回答往往更加丰富、饱满、且生动、及时。更加有现实生活的指导价值。"}], "txt": "第三阶段打卡\n\n使用的模型是：GLM-5.1， 2026年6月15日\n\nTAKS ONE - 联网模式 vs. 无联网模式\n\n对比组一： 问题：今天北京的天气\n\n无联网模式\n\n在不联网的情况下，z.ai无法回答这个问题。见截图。 联网模式\n\nZ.ai提供非常详细的内容，有天气现象，气温体感，生活提示等模块。见截图。 对比组二： 问题：2026年端午节放假具体安排\n\n无联网模式\n\n在不联网的情况下，z.ai仍然能够回答这个问题。见截图。 联网模式\n\nZ.ai提供了更加详细的内容和放假建议，比如调休安排，和高速路的收费政策。这些额外的信息在无联网的情况下并没有涉及。\n\n另外，联网模式下还提高了更加生动的视觉表达，用图表的方法帮助阐述文字内容，更加易懂。\n\n见截图。 TAKS TWO - 对比分析\n\n根据以上的测试，联网搜索对信息的时效性有更好的帮助。比如当问到北京今天的天气，无联网的模式根本无法回答这个问题，因为其背后的训练数据集还没有办法合并当下的数据信息。因此，当我们需要知道最近几天才发生的事情，使用联网搜索更加有帮助。\n\n如果我们需要知道的信息是发生在过去，比如询问2026年的端午节放假情况，这类信息尽管还未发生，但是相关部门在年初，甚至去年就已经指定了放假计划，所以不是特别需要联网模式，也能得到有价值的信息。但如果想要知道今年端午节北京、上海、或者其它城市相关的纪念活动，就需要打开联网模式更加可靠了。\n\n综上，我更加信任打开联网模式的回答，因为可以收集到更加全面、时效性更及时的信息，与此同时，大模型底层的训练数据集也会做一个基础的补充，出现新旧信息交替，相互补充的回答集。如上面的两组对比可见，打开联网模式后，回答往往更加丰富、饱满、且生动、及时。更加有现实生活的指导价值。"}, {"seq": 29, "day": 3, "name": "qijixingyuan", "login": "qijixingyuan", "time": "2026-06-16 10:31", "parts": [{"t": "t", "v": "对比分析（≥100 字）\n1. 联网搜索在什么情况下更可靠？\n不联网，他会直接给结果。联网，会有详细的测算指标，会有对比的表格。不联网，就是纯文字输出。联网，会有信息来源链接。联网搜索，特别适合需要强时效性的，或者新闻资讯内容。\n\n2. 什么时候完全没必要联网？\n简单的、已有非常成熟的知识体系，比如简单数学问题。\n或者聊天闲谈，或者简单的本地文件处理工作。\n\n3.你更信任哪种模式的回答？为什么？\n更信任联网的模式，因为联网输出的信息时效性更强，信息来源更可靠。联网会"}, {"t": "i", "v": "images/e510fe24-d940-44de-9671-0cd8c678e3a2.jpg"}, {"t": "i", "v": "images/3313a227-fba2-4b97-9160-077dfd5a00b8.jpg"}, {"t": "i", "v": "images/27c56b93-0c62-4eb2-bf6c-cd7b75aae401.jpg"}, {"t": "t", "v": "随便问问，会更考验提问者的表达准确度，我的想法是要做实际应用，它以为是一个网页界面。赋予角色之后，他的回答则更严谨，甚至还有点批判性思维和灵活变通。"}, {"t": "i", "v": "images/fbcaa225-f0ca-45fb-a759-9692f83adcbd.jpg"}, {"t": "i", "v": "images/86d5112b-0794-4c11-a146-48196ebe0060.jpg"}, {"t": "i", "v": "images/e9ecd5b6-84a8-46e1-84a3-d29d313e4de2.jpg"}], "txt": "对比分析（≥100 字）\n1. 联网搜索在什么情况下更可靠？\n不联网，他会直接给结果。联网，会有详细的测算指标，会有对比的表格。不联网，就是纯文字输出。联网，会有信息来源链接。联网搜索，特别适合需要强时效性的，或者新闻资讯内容。\n\n2. 什么时候完全没必要联网？\n简单的、已有非常成熟的知识体系，比如简单数学问题。\n或者聊天闲谈，或者简单的本地文件处理工作。\n\n3.你更信任哪种模式的回答？为什么？\n更信任联网的模式，因为联网输出的信息时效性更强，信息来源更可靠。联网会 随便问问，会更考验提问者的表达准确度，我的想法是要做实际应用，它以为是一个网页界面。赋予角色之后，他的回答则更严谨，甚至还有点批判性思维和灵活变通。"}, {"seq": 30, "day": 3, "name": "赖峰明", "login": "laifengming", "time": "2026-06-16 14:19", "parts": [{"t": "t", "v": "今日打卡\n\n1.联网搜索在什么情况下更可靠？\n在搜索实时变化的数据的情况下会更可靠，比如：搜寻北京今日的天气、游戏的最新过关攻略。因为联网搜索能查询到最新的消息或者AI不知道的东西，这可以给予它们一种补充\n\n2.什么时候完全没必要联网？\n当解决一些十分基础的题目的时候可以不需要联网，比如：查单词、解数学题的啥时候，这些没有必要搜寻\n\n3.你更信任哪种模式的回答？为什么？\n我可能会更信任搜索模式下的回答，因为它可以将网上的资料作为参考再结合自己的观点来得出结论"}], "txt": "今日打卡\n\n1.联网搜索在什么情况下更可靠？\n在搜索实时变化的数据的情况下会更可靠，比如：搜寻北京今日的天气、游戏的最新过关攻略。因为联网搜索能查询到最新的消息或者AI不知道的东西，这可以给予它们一种补充\n\n2.什么时候完全没必要联网？\n当解决一些十分基础的题目的时候可以不需要联网，比如：查单词、解数学题的啥时候，这些没有必要搜寻\n\n3.你更信任哪种模式的回答？为什么？\n我可能会更信任搜索模式下的回答，因为它可以将网上的资料作为参考再结合自己的观点来得出结论"}, {"seq": 31, "day": 3, "name": "lsh", "login": "linshenghao", "time": "2026-06-16 16:35", "parts": [{"t": "i", "v": "images/6c7df4df-da13-41ca-8a42-ead4b68ff83d.jpg"}, {"t": "i", "v": "images/70f35ff6-9b3b-4a52-a92e-d15f5bdaa699.jpg"}, {"t": "t", "v": "联网搜索在什么情况下更可靠？\n需要实时获取的，当下或者近期内的信息的时候\n什么时候完全没必要联网？\n如果根据的信息是既定的事实或者很久之前的事情的时候\n你更信任哪种模式的回答？为什么？\n相对更加信任带联网搜索的，但是也要辩证得看，联网搜索的也容易被投毒"}], "txt": "联网搜索在什么情况下更可靠？\n需要实时获取的，当下或者近期内的信息的时候\n什么时候完全没必要联网？\n如果根据的信息是既定的事实或者很久之前的事情的时候\n你更信任哪种模式的回答？为什么？\n相对更加信任带联网搜索的，但是也要辩证得看，联网搜索的也容易被投毒"}, {"seq": 32, "day": 3, "name": "geekqiao", "login": "geekqiao", "time": "2026-06-17 00:00", "parts": [{"t": "t", "v": "两种模式输出对比截图（至少 2 组）\n\n一组截图 = 同一个问题 ×（无联网 + 有联网）两种回答"}, {"t": "i", "v": "images/aa4e9bf7-3fba-407e-a06b-aabed83f33b0.jpg"}, {"t": "i", "v": "images/a853724a-9785-454b-b3b4-f5e1de429a69.jpg"}, {"t": "t", "v": "对比分析（≥100 字）\n受限于模型训练数据的截止日期，非联网模式不能很好的获取实时信息，甚至无法知道当前的年份，信息滞后严重。\n\n联网搜索在什么情况下更可靠？\n需要有实时性的信息。\n\n什么时候完全没必要联网？\n不会有太多更新的信息或知识。\n\n你更信任哪种模式的回答？为什么？\n更相信无联网模式，因为互联网上垃圾信息过多，质量低于模型训练数据质量。"}], "txt": "两种模式输出对比截图（至少 2 组）\n\n一组截图 = 同一个问题 ×（无联网 + 有联网）两种回答 对比分析（≥100 字）\n受限于模型训练数据的截止日期，非联网模式不能很好的获取实时信息，甚至无法知道当前的年份，信息滞后严重。\n\n联网搜索在什么情况下更可靠？\n需要有实时性的信息。\n\n什么时候完全没必要联网？\n不会有太多更新的信息或知识。\n\n你更信任哪种模式的回答？为什么？\n更相信无联网模式，因为互联网上垃圾信息过多，质量低于模型训练数据质量。"}, {"seq": 33, "day": 3, "name": "BlueFox", "login": "BlueFox", "time": "2026-06-17 09:58", "parts": [{"t": "t", "v": "两种模式输出对比截图（至少 2 组）\n一组截图 = 同一个问题 ×（无联网 + 有联网）两种回答\n组1：\n无联网"}, {"t": "i", "v": "images/f2864dc6-f754-4fca-91fa-942c40b0f9f2.jpg"}, {"t": "t", "v": "有联网"}, {"t": "i", "v": "images/b1f32885-6e39-4c80-a94e-c557026cab5a.jpg"}, {"t": "t", "v": "组2：\n无联网"}, {"t": "i", "v": "images/e8d86c7f-cb49-4a6f-a062-5af4080e3626.jpg"}, {"t": "t", "v": "有联网"}, {"t": "i", "v": "images/78b98a03-c32e-48ff-80ce-de310ed75e0b.jpg"}, {"t": "t", "v": "对比分析（≥100 字）\n联网搜索在什么情况下更可靠？\n实时的数据在联网搜索的时候更可靠，不联网的情况下要看模型涵盖的数据范围。\n\n什么时候完全没必要联网？\n纯粹的逻辑问题，不需要近期的数据补充。有些非公开的数据，即便联网也不能获取，可能需要购买收费的数据。\n\n你更信任哪种模式的回答？为什么？\n两种模式适用不同的模式，各有各适用的场景。如果需要了解最新的数据，或者外部数据参考，那么需要联网。"}], "txt": "两种模式输出对比截图（至少 2 组）\n一组截图 = 同一个问题 ×（无联网 + 有联网）两种回答\n组1：\n无联网 有联网 组2：\n无联网 有联网 对比分析（≥100 字）\n联网搜索在什么情况下更可靠？\n实时的数据在联网搜索的时候更可靠，不联网的情况下要看模型涵盖的数据范围。\n\n什么时候完全没必要联网？\n纯粹的逻辑问题，不需要近期的数据补充。有些非公开的数据，即便联网也不能获取，可能需要购买收费的数据。\n\n你更信任哪种模式的回答？为什么？\n两种模式适用不同的模式，各有各适用的场景。如果需要了解最新的数据，或者外部数据参考，那么需要联网。"}];
const DI={1:{label:'Day 1',hex:'#2563eb'},2:{label:'Day 2',hex:'#16a34a'},3:{label:'Day 3',hex:'#d97706'},4:{label:'Day 4',hex:'#6b7280'},5:{label:'Day 5',hex:'#ea580c'}};
const TOTAL=DATA.length;
const people={};DATA.forEach(c=>{(people[c.login]=people[c.login]||{name:c.name,login:c.login,days:new Set()}).days.add(c.day);});
let prog=Object.values(people).map(p=>({name:p.name,login:p.login,days:p.days,count:p.days.size}));
prog.sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name,'zh'));prog.forEach((p,i)=>p.rank=i+1);
const perDay={};for(let d=1;d<=5;d++)perDay[d]=prog.filter(p=>p.days.has(d)).length;
const NP=prog.length,avg=prog.reduce((s,p)=>s+p.count,0)/(NP||1);
mPeople.textContent=NP;mTotal.textContent=TOTAL;sPeople.textContent=NP;sTotal.textContent=TOTAL;sAvg.textContent=avg.toFixed(1)+' / 5';
const maxd=Math.max(...Object.values(perDay),1);
dayBars.innerHTML=[1,2,3,4,5].map(d=>{const n=perDay[d],w=Math.round(n/maxd*100);return `<div class="barrow"><span class="lab">${DI[d].label}</span><span class="track"><span class="fill" style="width:${w}%;background:${DI[d].hex}"></span></span><span class="lab" style="text-align:right">${n} 人</span></div>`;}).join('');
let mSort='count',mDir=-1;
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMatrix(){const arr=[...prog].sort((a,b)=>{let x,y;if(mSort==='name')return mDir*a.name.localeCompare(b.name,'zh');if(mSort==='rank'){x=a.rank;y=b.rank;}else if(mSort[0]==='d'){const d=+mSort[1];x=a.days.has(d)?1:0;y=b.days.has(d)?1:0;}else{x=a.count;y=b.count;}return mDir*(x-y);});
matrixBody.innerHTML=arr.map(p=>{const cells=[1,2,3,4,5].map(d=>p.days.has(d)?`<td><span class="dot on" style="background:${DI[d].hex}">✓</span></td>`:`<td><span class="dot off">·</span></td>`).join('');const w=Math.round(p.count/5*100);return `<tr class="person" data-login="${esc(p.login)}"><td class="l">${p.rank}</td><td class="l"><b>${esc(p.name)}</b> <span class="id">${esc(p.login)}</span></td>${cells}<td><div class="pbar"><span class="pt"><span class="pf" style="width:${w}%"></span></span><span class="pn">${p.count}/5</span></div></td></tr>`;}).join('');
document.querySelectorAll('tr.person').forEach(tr=>tr.onclick=()=>{const lg=tr.dataset.login;q.value=lg;state.q=lg;state.day=0;syncChips();renderList();switchTab('comments');});}
document.querySelectorAll('.matrix th[data-sort]').forEach(th=>th.onclick=()=>{const k=th.dataset.sort;if(mSort===k)mDir*=-1;else{mSort=k;mDir=(k==='name'||k==='rank')?1:-1;}renderMatrix();});
const state={q:'',day:0,sort:'seq'};
const chips=[{d:0,t:'全部'}].concat([1,2,3,4,5].map(d=>({d,t:DI[d].label+' ('+perDay[d]+')'})));
dayChips.innerHTML=chips.map(c=>`<span class="chip${c.d===0?' active':''}" data-day="${c.d}">${c.t}</span>`).join('');
function syncChips(){document.querySelectorAll('.chip').forEach(ch=>{const d=+ch.dataset.day,on=d===state.day;ch.classList.toggle('active',on);ch.style.background=on?(d?DI[d].hex:'var(--ink)'):'';ch.style.color=on?'#fff':'';});}
document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{state.day=+ch.dataset.day;syncChips();renderList();});
q.oninput=e=>{state.q=e.target.value.trim();renderList();};
document.getElementById('sort').onchange=e=>{state.sort=e.target.value;renderList();};
function bodyHtml(parts){return parts.map(p=>p.t==='i'?`<img class="shot" loading="lazy" src="${p.v}" alt="截图" referrerpolicy="no-referrer">`:`<div class="ptext">${esc(p.v)}</div>`).join('');}
function renderList(){let arr=DATA.filter(c=>{if(state.day&&c.day!==state.day)return false;if(state.q){const x=state.q.toLowerCase();if(!((c.name||'').toLowerCase().includes(x)||(c.login||'').toLowerCase().includes(x)||(c.txt||'').toLowerCase().includes(x)))return false;}return true;});
const s=state.sort;arr=[...arr].sort((a,b)=>s==='time_desc'?(b.time||'').localeCompare(a.time||''):s==='time_asc'?(a.time||'').localeCompare(b.time||''):s==='name'?a.name.localeCompare(b.name,'zh'):s==='day'?a.day-b.day||a.seq-b.seq:a.seq-b.seq);
cCount.textContent=`显示 ${arr.length} / ${TOTAL} 条`;
cList.innerHTML=arr.length?arr.map(c=>`<div class="card"><div class="chead"><span class="badge" style="background:${DI[c.day].hex}">${DI[c.day].label}</span><span class="who">${esc(c.name)}</span><span class="uid">${esc(c.login)}</span><span class="when">${esc(c.time||'')}</span></div><div class="body">${bodyHtml(c.parts)}</div></div>`).join(''):'<div class="empty">没有匹配的评论</div>';}
function switchTab(n){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===n));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===n));window.scrollTo({top:0,behavior:'smooth'});}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
const root=document.documentElement,tb=document.getElementById('themeBtn');
function applyTheme(t){if(t==='dark'){root.setAttribute('data-theme','dark');tb.textContent='☀ 浅色';}else{root.removeAttribute('data-theme');tb.textContent='🌙 深色';}}
applyTheme(localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));
tb.onclick=()=>{const t=root.getAttribute('data-theme')==='dark'?'light':'dark';localStorage.setItem('theme',t);applyTheme(t);};
renderMatrix();syncChips();renderList();
</script>
</body>
</html>
